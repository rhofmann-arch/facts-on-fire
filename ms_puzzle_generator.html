<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MS Puzzle Generator — Facts on Fire</title>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Archivo:wght@400;500;600;700;800&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#FAFAF7;--surf:#FFF;--ink:#0E1117;--ink2:#3A4150;
  --muted:#8A94A0;--border:#E4E6EA;
  --fire:#FF4F00;--fire2:#FF9000;--ember:#FFF0E8;
  --teal:#007A6E;--teal-lt:#E6F4F2;
  --blue:#1B4FCC;--blue-lt:#EBF0FF;
  --purple:#7C3FA0;--purple-lt:#F2EAF9;
  --r:12px;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Archivo',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh}

/* ── Header ── */
header{background:var(--ink);padding:0 28px;border-bottom:3px solid var(--fire);position:sticky;top:0;z-index:100}
.hdr{max-width:1300px;margin:0 auto;display:flex;align-items:center;gap:12px;height:54px}
.logo{font-family:'Archivo Black',sans-serif;font-size:17px;color:#fff;display:flex;align-items:center;gap:7px;text-decoration:none}
.logo em{color:var(--fire);font-style:normal}
.sep{color:#444;font-size:18px}
.hdr-sub{font-size:14px;color:#aaa;font-weight:500}
.back{margin-left:auto;color:#aaa;font-size:12px;font-weight:600;text-decoration:none;padding:5px 12px;border:1px solid #333;border-radius:6px;transition:.15s}
.back:hover{color:#fff;border-color:#666}

/* ── Layout ── */
.wrap{max-width:1300px;margin:0 auto;padding:20px;display:grid;grid-template-columns:280px 1fr;gap:20px;align-items:start}

/* ── Sidebar ── */
.sb{background:var(--surf);border:1px solid var(--border);border-radius:var(--r);padding:18px 16px;display:flex;flex-direction:column;gap:16px;position:sticky;top:74px}
.sb-label{font-size:10px;font-weight:700;letter-spacing:1.3px;text-transform:uppercase;color:var(--muted);margin-bottom:8px;display:block}
.sb-div{border:none;border-top:1px solid var(--border);margin:0 -4px}

/* Type buttons */
.type-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px}
.tbtn{background:var(--bg);border:2px solid var(--border);border-radius:9px;padding:10px 6px;cursor:pointer;text-align:center;transition:.15s;font-family:'Archivo',sans-serif}
.tbtn:hover{border-color:var(--fire);background:var(--ember)}
.tbtn.on{background:var(--ember);border-color:var(--fire)}
.tbtn .ico{font-size:22px;display:block;margin-bottom:4px}
.tbtn .lbl{font-size:10.5px;font-weight:700;color:var(--ink2);line-height:1.2}
.tbtn.on .lbl{color:var(--fire)}

/* Difficulty radios */
.diffs{display:flex;flex-direction:column;gap:4px}
.diffs label{display:flex;align-items:flex-start;gap:8px;cursor:pointer;font-size:12.5px;padding:6px 8px;border-radius:7px;transition:.1s;line-height:1.35}
.diffs label:hover{background:var(--bg)}
.diffs input[type=radio]{accent-color:var(--fire);margin-top:2px;flex-shrink:0}
.dl{font-weight:700}.dd{color:var(--muted)}

/* Inputs & buttons */
.title-inp{width:100%;padding:7px 10px;border:1px solid var(--border);border-radius:7px;font-family:'Archivo',sans-serif;font-size:13px;background:var(--bg);color:var(--ink)}
.title-inp:focus{outline:none;border-color:var(--fire)}
.hint{font-size:10.5px;color:var(--muted);margin-top:4px}
.btn-gen{background:var(--fire);color:#fff;border:none;border-radius:9px;padding:12px 16px;font-family:'Archivo Black',sans-serif;font-size:14px;cursor:pointer;width:100%;transition:.15s;letter-spacing:.3px}
.btn-gen:hover{background:#e03900}
.btn-gen:active{transform:scale(.98)}
.pdf-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
.pbtn{padding:9px 4px;border-radius:7px;font-family:'Archivo',sans-serif;font-size:11px;font-weight:700;cursor:pointer;border:2px solid;background:var(--surf);transition:.15s;display:flex;flex-direction:column;align-items:center;gap:3px}
.pbtn span{font-size:16px}
.pbtn.ps{border-color:var(--teal);color:var(--teal)}.pbtn.ps:hover{background:var(--teal-lt)}
.pbtn.pk{border-color:var(--blue);color:var(--blue)}.pbtn.pk:hover{background:var(--blue-lt)}
.pbtn.pb{border-color:var(--purple);color:var(--purple)}.pbtn.pb:hover{background:var(--purple-lt)}

/* ── Preview ── */
.preview{background:var(--surf);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.pv-top{padding:11px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--bg)}
.pv-top h3{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--ink2)}
.view-tog{display:flex;gap:4px}
.vtbtn{padding:4px 12px;border-radius:5px;font-size:11.5px;font-weight:700;cursor:pointer;border:1.5px solid var(--border);background:#fff;font-family:'Archivo',sans-serif;transition:.1s}
.vtbtn.on{background:var(--ink);color:#fff;border-color:var(--ink)}
.pv-body{padding:24px 20px;background:#E8E8E2;min-height:540px;display:flex;justify-content:center;align-items:flex-start}

/* ── Puzzle Sheet ── */
.sheet{background:#fff;border:1px solid #ccc;border-radius:3px;padding:22px 28px 28px;box-shadow:0 2px 16px rgba(0,0,0,.12);width:100%;font-family:'Nunito',sans-serif}
.sheet.wide{max-width:860px}
.sheet.narrow{max-width:680px}
.sh-hdr{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:3px}
.sh-title{font-size:12px;font-weight:800;color:#1a1a1a;font-family:'Archivo Black',sans-serif}
.sh-src{font-size:9px;font-weight:700;color:#aaa;letter-spacing:.4px;text-transform:uppercase}
.key-badge{display:inline-block;background:#1B4FCC;color:#fff;font-size:8px;font-weight:800;letter-spacing:.5px;padding:1px 6px;border-radius:3px;margin-left:6px;vertical-align:middle}
.sh-meta{font-size:9.5px;font-weight:600;color:#444;margin-bottom:3px}
.sh-dir{font-size:9.5px;font-weight:700;color:#333;padding-bottom:7px;border-bottom:2px solid #e0e0e0;margin-bottom:10px}
.sh-svg svg{width:100%;height:auto;display:block}

/* ── Generating state ── */
.gen-msg{text-align:center;padding:80px 20px;color:var(--muted);font-size:14px;font-weight:600}
.gen-msg .spin{display:inline-block;animation:spin .8s linear infinite;font-size:28px;margin-bottom:12px}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Maze Escape (matches elementary Multiple Maze) ── */
.maze-grid{display:inline-grid;gap:3px;background:#b0b4b8;padding:3px;border:2px solid #444;border-radius:3px}
.mc{width:46px;height:46px;display:flex;align-items:center;justify-content:center;font-family:'Archivo',sans-serif;font-weight:800;font-size:14px;background:#f5f5f5;border-radius:2px;color:#1a1a1a}
.mc.mc-s{background:#D0F0DB;outline:2.5px solid #1A7A3A;outline-offset:-1px;z-index:1}
.mc.mc-f{background:#FFE2D0;outline:2.5px solid #FF4F00;outline-offset:-1px;z-index:1}
.mc.mc-p{background:#FFF0E0;outline:2px solid #FF9000;outline-offset:-1px}
.mc.mc-d{background:#E8EEFF;outline:1.5px solid #9AAAE0;outline-offset:-1px}
.mc.mc-trap{color:#888}
.me-outer{display:flex;flex-direction:column;align-items:center;gap:2px}
.mleg{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;font-size:9px;font-weight:700;font-family:'Archivo',sans-serif;color:#555;margin-top:4px}
.mli{display:flex;align-items:center;gap:3px}
.msw{width:10px;height:10px;border-radius:2px;flex-shrink:0}
/* Arranging Boxes */
.ab-wrap{display:flex;flex-direction:column;align-items:center;gap:7px}
.ab-lbl{font-size:8.5px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:#888;font-family:'Archivo',sans-serif;text-align:center}
.ab-row{display:flex;gap:5px;justify-content:center}
.ab-box{width:46px;height:42px;border:2px solid #1a1a1a;border-radius:3px;display:flex;align-items:center;justify-content:center;font-family:'Archivo',sans-serif;font-size:17px;font-weight:800;color:#1a1a1a;background:#f5f5f5;box-shadow:2px 2px 0 #aaa}
.ab-empty{background:#e0e0e0;color:transparent;border-color:#bbb;box-shadow:2px 2px 0 #ccc}
.ab-sol{border-color:#b83000;color:#b83000;box-shadow:2px 2px 0 #e8b0a0;background:#fff}
.ab-sol-row{display:flex;gap:0;justify-content:center;align-items:flex-start}
.ab-slot{display:flex;flex-direction:column;align-items:center}
.ab-conn{width:18px;padding-top:6px;text-align:center;font-size:9px;font-weight:800;font-family:'Archivo',sans-serif;color:#0F6E56}
/* Two Step */
.ts-steps-area{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.ts-steps-label{font-family:'Archivo',sans-serif;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#888;white-space:nowrap}
.ts-steps-box{display:flex;align-items:center;gap:8px;flex-wrap:wrap;background:#f5f5f2;border:2px solid #2a2a2a;border-radius:8px;padding:7px 14px}
.ts-step-chip{background:#fff;border:1.5px solid #ccc;border-radius:6px;padding:4px 13px;font-size:14px;font-family:'Archivo Black',sans-serif;color:#1a1a1a;white-space:nowrap}
/* Puzzle cell grid (shared by Two Step and other types) */
.pc{background:#fff;border:1.5px solid #e0e0e0;border-radius:8px;padding:12px 8px;display:flex;align-items:center;justify-content:center;position:relative;min-height:148px}
.pc-n{position:absolute;top:6px;left:8px;font-size:10px;font-weight:700;color:#bbb;font-family:'Archivo',sans-serif}
@media print{
  header,.sb,.pv-top,.pv-body{display:none!important}
  .wrap{display:block;padding:0}
  .preview{border:none;border-radius:0}
  .sheet{border:none;box-shadow:none;padding:18px 28px 24px;max-width:100%!important}
  body{background:#fff}
}
</style>
</head>
<body>

<header>
  <div class="hdr">
    <a class="logo" href="index.html">🔥 Facts on <em>Fire</em></a>
    <span class="sep">›</span>
    <span class="hdr-sub">Middle School</span>
    <span class="sep">›</span>
    <span class="hdr-sub" id="hdr-type-label">Puzzle Generator</span>
    <a class="back" href="index.html">← Back to Hub</a>
  </div>
</header>

<div class="wrap">

  <aside class="sb">

    <!-- ── Puzzle Type ── -->
    <div>
      <span class="sb-label">Puzzle Type</span>
      <div class="type-grid">
        <button class="tbtn on" id="tbtn-sixlegs" onclick="selType('sixlegs',this)">
          <span class="ico">⬡</span><span class="lbl">Six Legs</span>
        </button>
        <button class="tbtn" id="tbtn-sankaku" onclick="selType('sankaku',this)">
          <span class="ico">△</span><span class="lbl">Sankaku</span>
        </button>
        <button class="tbtn" id="tbtn-zukei" onclick="selType('zukei',this)">
          <span class="ico">◇</span><span class="lbl">Zukei</span>
        </button>
        <button class="tbtn" id="tbtn-mazeescape" onclick="selType('mazeescape',this)">
          <span class="ico">⊞</span><span class="lbl">Maze Escape</span>
        </button>
        <button class="tbtn" id="tbtn-arrangingboxes" onclick="selType('arrangingboxes',this)">
          <span class="ico">▣</span><span class="lbl">Arranging Boxes</span>
        </button>
        <button class="tbtn" id="tbtn-fourthpoint" onclick="selType('fourthpoint',this)">
          <span class="ico">▱</span><span class="lbl">Fourth Point</span>
        </button>
        <button class="tbtn" id="tbtn-digitdiv" onclick="selType('digitdiv',this)">
          <span class="ico">÷</span><span class="lbl">Digit Division</span>
        </button>
        <button class="tbtn" id="tbtn-divpyramid" onclick="selType('divpyramid',this)">
          <span class="ico">△÷</span><span class="lbl">Div Pyramid</span>
        </button>
        <button class="tbtn" id="tbtn-fracpyramid" onclick="selType('fracpyramid',this)">
          <span class="ico">△½</span><span class="lbl">Frac Pyramid</span>
        </button>
        <button class="tbtn" id="tbtn-placedecimal" onclick="selType('placedecimal',this)">
          <span class="ico">0.0</span><span class="lbl">Place Decimal</span>
        </button>
        <button class="tbtn" id="tbtn-frackenken" onclick="selType('frackenken',this)">
          <span class="ico">⊞½</span><span class="lbl">Frac KenKen</span>
        </button>
        <button class="tbtn" id="tbtn-twostep" onclick="selType('twostep',this)">
          <span class="ico">➡</span><span class="lbl">Two Step</span>
        </button>
      </div>
    </div>

    <!-- ── Two Step Number Type (shown only for twostep) ── -->
    <div id="ts-nt-panel" style="display:none">
      <span class="sb-label">Number Type</span>
      <div style="display:flex;flex-direction:column;gap:4px">
        <label style="display:flex;align-items:flex-start;gap:8px;cursor:pointer;font-size:12.5px;padding:6px 8px;border-radius:7px;transition:.1s;line-height:1.35">
          <input type="radio" name="tsnt" value="fractions" checked onchange="TS_NT=this.value;generate()" style="accent-color:var(--fire);margin-top:2px;flex-shrink:0">
          <span><span class="dl">Fractions</span></span>
        </label>
        <label style="display:flex;align-items:flex-start;gap:8px;cursor:pointer;font-size:12.5px;padding:6px 8px;border-radius:7px;transition:.1s;line-height:1.35">
          <input type="radio" name="tsnt" value="decimals" onchange="TS_NT=this.value;generate()" style="accent-color:var(--fire);margin-top:2px;flex-shrink:0">
          <span><span class="dl">Decimals</span></span>
        </label>
        <label style="display:flex;align-items:flex-start;gap:8px;cursor:pointer;font-size:12.5px;padding:6px 8px;border-radius:7px;transition:.1s;line-height:1.35">
          <input type="radio" name="tsnt" value="integers" onchange="TS_NT=this.value;generate()" style="accent-color:var(--fire);margin-top:2px;flex-shrink:0">
          <span><span class="dl">Integers</span></span>
        </label>
      </div>
    </div>
    <div id="kk-ops-panel" style="display:none">
      <span class="sb-label">Operations</span>
      <div style="display:flex;flex-direction:column;gap:4px" id="kk-ops-opts">
        <label style="display:flex;align-items:flex-start;gap:8px;cursor:pointer;font-size:12.5px;padding:6px 8px;border-radius:7px;transition:.1s;line-height:1.35">
          <input type="radio" name="kkop" value="addsub" checked onchange="KK_OP=this.value;generate()" style="accent-color:var(--fire);margin-top:2px;flex-shrink:0">
          <span><span class="dl">Add &amp; Subtract</span></span>
        </label>
        <label style="display:flex;align-items:flex-start;gap:8px;cursor:pointer;font-size:12.5px;padding:6px 8px;border-radius:7px;transition:.1s;line-height:1.35">
          <input type="radio" name="kkop" value="mult" onchange="KK_OP=this.value;generate()" style="accent-color:var(--fire);margin-top:2px;flex-shrink:0">
          <span><span class="dl">Multiply only</span></span>
        </label>
        <label style="display:flex;align-items:flex-start;gap:8px;cursor:pointer;font-size:12.5px;padding:6px 8px;border-radius:7px;transition:.1s;line-height:1.35">
          <input type="radio" name="kkop" value="multdiv" onchange="KK_OP=this.value;generate()" style="accent-color:var(--fire);margin-top:2px;flex-shrink:0">
          <span><span class="dl">Multiply &amp; Divide</span></span>
        </label>
        <label style="display:flex;align-items:flex-start;gap:8px;cursor:pointer;font-size:12.5px;padding:6px 8px;border-radius:7px;transition:.1s;line-height:1.35">
          <input type="radio" name="kkop" value="all" onchange="KK_OP=this.value;generate()" style="accent-color:var(--fire);margin-top:2px;flex-shrink:0">
          <span><span class="dl">All operations</span></span>
        </label>
      </div>
    </div>

    <hr class="sb-div">

    <!-- ── Difficulty ── -->
    <div>
      <span class="sb-label">Difficulty</span>
      <div class="diffs" id="diff-opts"></div>
    </div>

    <hr class="sb-div">

    <!-- ── Custom Title ── -->
    <div>
      <span class="sb-label">Custom Title <span style="font-weight:400;text-transform:none;letter-spacing:0;color:var(--muted)">(optional)</span></span>
      <input class="title-inp" id="pg-title" type="text" placeholder="e.g. Warm-Up #3">
      <div class="hint">Leave blank for the default name.</div>
    </div>

    <hr class="sb-div">

    <button class="btn-gen" id="btn-gen" onclick="generate()">↻&ensp;Generate</button>

    <hr class="sb-div">

    <div>
      <span class="sb-label">Download PDF</span>
      <div class="pdf-grid">
        <button class="pbtn ps" onclick="downloadPDF('student')"><span>📄</span>Student</button>
        <button class="pbtn pk" onclick="downloadPDF('key')"><span>🗝</span>Key</button>
        <button class="pbtn pb" onclick="downloadPDF('both')"><span>⬇</span>Both</button>
      </div>
      <div class="hint" style="margin-top:6px">Opens a print dialog for PDF saving.</div>
    </div>

  </aside>

  <!-- ── Preview ── -->
  <div class="preview">
    <div class="pv-top">
      <h3>Preview</h3>
      <div class="view-tog">
        <button class="vtbtn on" id="vt-s" onclick="setView('student')">Student</button>
        <button class="vtbtn"    id="vt-k" onclick="setView('key')">Answer Key</button>
      </div>
    </div>
    <div class="pv-body">
      <div id="out" style="width:100%">
        <div class="gen-msg"><div class="spin">⬡</div><br>Select a puzzle type and click Generate.</div>
      </div>
    </div>
  </div>

</div><!-- .wrap -->

<script>
'use strict';

// ═══════════════════════════════════════════════════════════════════════════════
// SHARED STATE & UTILITIES
// ═══════════════════════════════════════════════════════════════════════════════

let TYPE = 'sixlegs';   // 'sixlegs' | 'sankaku' | 'zukei' | 'mazeescape' | 'arrangingboxes'
let DIFF = 0;
let VIEW = 'student';

// Six Legs state
let SL_PUZZLE = null;

// Sankaku state
let SK_PUZZLES = [];

// Zukei state
let ZK_PUZZLES = [];

// Maze Escape state
let ME_PUZZLES = [];

// Arranging Boxes state
let AB_PUZZLES = [];

// Fourth Point state
let FP_PUZZLES = [];

// Digit Division state
let DD_PUZZLES = [];

// Division Pyramid state
let DP_PUZZLES = [];

// Fraction Pyramid state
let FRAC_PUZZLES = [];

// Place Decimal state
let PD_PUZZLES = [];

// Fraction KenKen state
let KK_PUZZLES = [];
let KK_OP = 'addsub';

// Two Step state
let TS_SET = null;
let TS_NT  = 'fractions';

const ri       = (a, b) => Math.floor(Math.random() * (b - a + 1)) + a;
const f        = n => n.toFixed(1);

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = ri(0, i); [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// ── Difficulty configs per type ───────────────────────────────────────────────
const DIFF_OPTS = {
  sixlegs: [
    { l:'Beginner',     d:'Find the missing operations' },
    { l:'Intermediate', d:'Find the missing expressions' },
    { l:'Challenge',    d:'Multi-step — fill in all blanks' },
  ],
  sankaku: [
    { l:'Beginner',     d:'3×3 grid · areas 1–3 · 6 dots' },
    { l:'Intermediate', d:'4×4 grid · areas 1–8 · 7 dots' },
    { l:'Challenge',    d:'4×4 grid · larger areas · 8 dots' },
  ],
  zukei: [
    { l:'Beginner',     d:'Squares & rectangles · 4×4 grid' },
    { l:'Intermediate', d:'Triangles & trapezoids · 4×4 grid' },
    { l:'Advanced',     d:'Mixed shapes · 5×5 grid' },
  ],
  mazeescape: [
    { l:'Beginner',     d:'5×5 grid · short path · 2–3 dead ends' },
    { l:'Intermediate', d:'5×5 grid · longer path · 3–5 dead ends' },
    { l:'Challenge',    d:'5×5 grid · long path · 4–7 dead ends' },
  ],
  arrangingboxes: [
    { l:'Beginner',     d:'3 boxes to arrange' },
    { l:'Intermediate', d:'4 boxes to arrange' },
    { l:'Challenge',    d:'5 boxes to arrange' },
  ],
  fourthpoint: [
    { l:'Beginner',     d:'5×5 grid · complete the parallelogram' },
    { l:'Intermediate', d:'5×5 grid · rectangles & rhombuses' },
    { l:'Challenge',    d:'5×5 grid · squares & isosceles trapezoids' },
  ],
  digitdiv: [
    { l:'Beginner',     d:'2 blanks · unique solution' },
    { l:'Intermediate', d:'3 blanks · unique solution' },
    { l:'Challenge',    d:'4 blanks · one or two answers' },
  ],
  divpyramid: [
    { l:'Beginner',     d:'÷2 & ÷5 · 4-row pyramids' },
    { l:'Intermediate', d:'÷2, ÷4, ÷5 · 5-row pyramids' },
    { l:'Challenge',    d:'÷3, ÷4, ÷5 · 5-row pyramids' },
  ],
  fracpyramid: [
    { l:'Beginner',     d:'Addition · denominators to 24' },
    { l:'Intermediate', d:'Addition & subtraction · to 60' },
    { l:'Challenge',    d:'Mixed · larger denominators' },
  ],
  placedecimal: [
    { l:'Beginner',     d:'1-decimal + integer · addition or subtraction' },
    { l:'Intermediate', d:'Both addends 1 decimal place' },
    { l:'Challenge',    d:'Both addends 2 decimal places' },
  ],
  frackenken: [
    { l:'Easy',         d:'3×3 · simple fractions' },
    { l:'Medium',       d:'3×3 · lesson-level fractions' },

// SIX LEGS
// ═══════════════════════════════════════════════════════════════════════════════

const SL_TITLES = [
  'Six Legs — Missing Operations',
  'Six Legs — Missing Expressions',
  'Six Legs — Multi-Step Challenge',
];
const SL_DIRS = [
  'Start in the middle. Apply operations along each arm outward. Find the <strong>missing operations</strong> in the blank circles.',
  'Start in the middle. Apply operations along each arm outward. Find the <strong>missing expression</strong> at the end of each arm.',
  'Start in the middle. Apply operations along each arm outward. Fill in <strong>all missing expressions</strong> along each arm.',
];

// ── Expression helpers ────────────────────────────────────────────────────────
function sl_exprStr(a, b) {
  const coef = a === 1 ? 't' : `${a}t`;
  if (b === 0) return coef;
  if (b > 0)   return `${coef} + ${b}`;
  return `${coef} \u2212 ${Math.abs(b)}`;
}
function sl_opLabel(type, n) {
  const sym = {'+':'+','-':'\u2212','\u00d7':'\u00d7','\u00f7':'\u00f7'}[type] ?? type;
  return `${sym} ${n}`;
}
function sl_applyOp(a, b, type, n) {
  if (type === '+')      return { a, b: b + n };
  if (type === '-')      return b - n >= 0 ? { a, b: b - n } : null;
  if (type === '\u00d7') return { a: a*n, b: b*n };
  if (type === '\u00f7') return (a%n===0 && b%n===0) ? { a:a/n, b:b/n } : null;
  return null;
}
function sl_validOps(a, b, level) {
  const pool = [];
  const addNs = level < 2 ? [5,10,15,20] : [1,2,3,4,5,6];
  const mulNs = level < 2 ? [2,3,4,5]    : [2,3,4,5,6];
  const divNs = [2,3,4,5,6,10];
  for (const n of addNs) { pool.push({type:'+',n}); if(b-n>=0) pool.push({type:'-',n}); }
  for (const n of mulNs) pool.push({type:'\u00d7',n});
  for (const n of divNs) if(a%n===0 && b%n===0 && a/n>=1) pool.push({type:'\u00f7',n});
  return pool;
}
function sl_pickOpPair(a, b, level, usedKeys) {
  for (const op1 of shuffle(sl_validOps(a, b, level))) {
    const mid = sl_applyOp(a, b, op1.type, op1.n);
    if (!mid) continue;
    for (const op2 of shuffle(sl_validOps(mid.a, mid.b, level))) {
      const end = sl_applyOp(mid.a, mid.b, op2.type, op2.n);
      if (!end) continue;
      if (end.a===a && end.b===b) continue;
      if (mid.a===a && mid.b===b) continue;
      const key = `${op1.type}${op1.n}|${op2.type}${op2.n}`;
      if (usedKeys.has(key)) continue;
      usedKeys.add(key);
      return { op1, op2, mid, end };
    }
  }
  return null;
}

// ── Generators ────────────────────────────────────────────────────────────────
function sl_genBeginner() {
  const centers = shuffle([
    {a:10,b:30},{a:12,b:24},{a:6,b:18},{a:8,b:24},
    {a:10,b:20},{a:12,b:36},{a:6,b:12},{a:8,b:16},
    {a:4,b:20},{a:10,b:40},{a:15,b:30},{a:6,b:30},
  ]);
  for (const {a,b} of centers) {
    const usedKeys = new Set(), arms = [];
    let ok = true;
    for (let i = 0; i < 6; i++) {
      const r = sl_pickOpPair(a, b, 0, usedKeys);
      if (!r) { ok=false; break; }
      const bf = (i%2===0);
      arms.push([
        {t: bf?'blank-op':'op', v:sl_opLabel(r.op1.type,r.op1.n), a:sl_opLabel(r.op1.type,r.op1.n)},
        {t: bf?'op':'blank-op', v:sl_opLabel(r.op2.type,r.op2.n), a:sl_opLabel(r.op2.type,r.op2.n)},
        {t:'expr', v:sl_exprStr(r.end.a,r.end.b)},
      ]);
    }
    if (ok) return { center:sl_exprStr(a,b), arms };
  }
  return null;
}
function sl_genIntermediate() {
  const centers = shuffle([
    {a:6,b:12},{a:4,b:8},{a:8,b:16},{a:3,b:9},
    {a:5,b:15},{a:6,b:24},{a:4,b:12},{a:10,b:20},
    {a:6,b:18},{a:8,b:24},{a:4,b:16},{a:5,b:20},
  ]);
  for (const {a,b} of centers) {
    const usedKeys = new Set(), arms = [];
    let ok = true;
    for (let i = 0; i < 6; i++) {
      const r = sl_pickOpPair(a, b, 1, usedKeys);
      if (!r) { ok=false; break; }
      arms.push([
        {t:'op',        v:sl_opLabel(r.op1.type,r.op1.n)},
        {t:'op',        v:sl_opLabel(r.op2.type,r.op2.n)},
        {t:'blank-expr',a:sl_exprStr(r.end.a,r.end.b)},
      ]);
    }
    if (ok) return { center:sl_exprStr(a,b), arms };
  }
  return null;
}
function sl_genChallenge() {
  const centers = shuffle([
    {a:1,b:3},{a:2,b:4},{a:1,b:2},{a:2,b:6},
    {a:1,b:4},{a:3,b:6},{a:2,b:2},{a:1,b:5},
    {a:2,b:8},{a:3,b:3},{a:1,b:6},{a:2,b:10},
  ]);
  for (const {a,b} of centers) {
    const usedKeys = new Set(), arms = [];
    let ok = true;
    for (let i = 0; i < 6; i++) {
      let found = false;
      for (const op1 of shuffle(sl_validOps(a, b, 2))) {
        const mid = sl_applyOp(a, b, op1.type, op1.n);
        if (!mid || (mid.a===a && mid.b===b)) continue;
        for (const op2 of shuffle(sl_validOps(mid.a, mid.b, 2))) {
          const end = sl_applyOp(mid.a, mid.b, op2.type, op2.n);
          if (!end || (end.a===mid.a && end.b===mid.b) || (end.a===a && end.b===b)) continue;
          const key = `${op1.type}${op1.n}|${op2.type}${op2.n}`;
          if (usedKeys.has(key)) continue;
          usedKeys.add(key);
          arms.push([
            {t:'op',         v:sl_opLabel(op1.type,op1.n)},
            {t:'blank-expr', a:sl_exprStr(mid.a,mid.b)},
            {t:'op',         v:sl_opLabel(op2.type,op2.n)},
            {t:'blank-expr', a:sl_exprStr(end.a,end.b)},
          ]);
          found = true; break;
        }
        if (found) break;
      }
      if (!found) { ok=false; break; }
    }
    if (ok) return { center:sl_exprStr(a,b), arms };
  }
  return null;
}

// ── SVG Renderer ──────────────────────────────────────────────────────────────
const SL_DIRS_VEC = [
  { dx:1,    dy:0   }, { dx:Math.SQRT1_2, dy:-Math.SQRT1_2 },
  { dx:-Math.SQRT1_2, dy:-Math.SQRT1_2 }, { dx:-1, dy:0 },
  { dx:-Math.SQRT1_2, dy:Math.SQRT1_2  }, { dx:Math.SQRT1_2, dy:Math.SQRT1_2 },
];
function sl_ellipseEdge(rx, ry, dx, dy) {
  const a=dx/rx, b=dy/ry; return (a===0&&b===0)?rx:1/Math.sqrt(a*a+b*b);
}
function sl_shapeEdge(node, dx, dy, OR, ER) {
  return (node.t==='op'||node.t==='blank-op') ? OR : sl_ellipseEdge(ER.rx,ER.ry,dx,dy);
}
function sl_svgText(x,y,text,size,fill,weight) {
  return `<text x="${f(x)}" y="${f(y)}" text-anchor="middle" dominant-baseline="central" font-family="Archivo,sans-serif" font-size="${size}" fill="${fill}" font-weight="${weight}">${text}</text>`;
}
function sl_svgArrow(x1,y1,x2,y2) {
  return `<line x1="${f(x1)}" y1="${f(y1)}" x2="${f(x2)}" y2="${f(y2)}" stroke="#444" stroke-width="1.6" marker-end="url(#sl-ah)"/>`;
}
function sl_renderSVG(puzzle, showAnswers) {
  const armLen = puzzle.arms[0].length;
  const isCh   = armLen === 4;
  const W = isCh ? 980 : 760, H = isCh ? 780 : 620;
  const CX = W/2, CY = H/2;
  const CR = {rx:60,ry:32}, OR = 22, ER = {rx:50,ry:26}, GAP = 26, APAD = 4;

  const armNodes = puzzle.arms.map((arm, ai) => {
    const {dx,dy} = SL_DIRS_VEC[ai];
    let dist = sl_ellipseEdge(CR.rx,CR.ry,dx,dy);
    return arm.map(node => {
      const edge = sl_shapeEdge(node,dx,dy,OR,ER);
      dist += GAP + edge;
      const pos = {...node, x:CX+dist*dx, y:CY+dist*dy, edge};
      dist += edge; return pos;
    });
  });

  let lines='', shapes='';
  puzzle.arms.forEach((_,ai) => {
    const {dx,dy} = SL_DIRS_VEC[ai], an = armNodes[ai];
    const ce = sl_ellipseEdge(CR.rx,CR.ry,dx,dy);
    lines += sl_svgArrow(CX+(ce+APAD)*dx, CY+(ce+APAD)*dy,
      an[0].x-(an[0].edge+APAD)*dx, an[0].y-(an[0].edge+APAD)*dy);
    for (let j=0;j<an.length-1;j++) {
      const from=an[j], to=an[j+1];
      lines += sl_svgArrow(from.x+(from.edge+APAD)*dx, from.y+(from.edge+APAD)*dy,
        to.x-(to.edge+APAD)*dx, to.y-(to.edge+APAD)*dy);
    }
  });

  shapes += `<ellipse cx="${f(CX)}" cy="${f(CY)}" rx="${CR.rx}" ry="${CR.ry}" fill="white" stroke="#111" stroke-width="3.5"/>`;
  shapes += sl_svgText(CX,CY,puzzle.center,15,'#111','800');

  puzzle.arms.forEach((_,ai) => {
    armNodes[ai].forEach(node => {
      const isCircle = node.t==='op'||node.t==='blank-op';
      const isBlank  = node.t==='blank-op'||node.t==='blank-expr';
      const showAns  = isBlank && showAnswers;
      const fill   = showAns ? '#E0F5F2' : 'white';
      const stroke = isBlank&&!showAns ? '#BBBBBB' : '#333';
      const dash   = isBlank&&!showAns ? 'stroke-dasharray="5,3"' : '';
      if (isCircle) {
        shapes += `<circle cx="${f(node.x)}" cy="${f(node.y)}" r="${OR}" fill="${fill}" stroke="${stroke}" stroke-width="1.5" ${dash}/>`;
        const lbl = isBlank?(showAns?node.a:''):node.v;
        if (lbl) shapes += sl_svgText(node.x,node.y,lbl,12,showAns?'#005A52':'#111','700');
      } else {
        shapes += `<ellipse cx="${f(node.x)}" cy="${f(node.y)}" rx="${ER.rx}" ry="${ER.ry}" fill="${fill}" stroke="${stroke}" stroke-width="1.5" ${dash}/>`;
        const lbl = isBlank?(showAns?node.a:''):node.v;
        if (lbl) shapes += sl_svgText(node.x,node.y,lbl,13,showAns?'#005A52':'#111',showAns?'700':'600');
      }
    });
  });

  return `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:auto">
    <defs><marker id="sl-ah" markerWidth="9" markerHeight="7" refX="8.5" refY="3.5" orient="auto">
      <polygon points="0,0 9,3.5 0,7" fill="#444"/></marker></defs>
    ${lines}${shapes}</svg>`;
}

// ═══════════════════════════════════════════════════════════════════════════════

const SK_TITLES = [
  'Sankaku — 3×3 Grid',
  'Sankaku — 4×4 Grid',
  'Sankaku — 4×4 Challenge',
];
const SK_DIRS = [
  'Connect three dots to form a triangle with the given area. Each grid square = 1 square unit.',
  'Connect three dots to form a triangle with the given area. Each grid square = 1 square unit.',
  'Connect three dots to form a triangle with the given area. Each grid square = 1 square unit.',
];

const SK_CONFIGS = [
  { gridSize:3, cellPx:52, numDots:6,  getAreas:()=>shuffle([1,1,2,2,3,3]) },
  { gridSize:4, cellPx:40, numDots:7,  getAreas:()=>shuffle([1,2,3,4,6,8]) },
  { gridSize:4, cellPx:40, numDots:8,  getAreas:()=>shuffle([3,4,5,6,7,8]).slice(0,6) },
];

// ── Triangle helpers ──────────────────────────────────────────────────────────
const sk_triArea = ([x1,y1],[x2,y2],[x3,y3]) =>
  Math.abs(x1*(y2-y3)+x2*(y3-y1)+x3*(y1-y2))/2;

function sk_genPuzzle(gridSize, targetArea, numDots, maxTries=1000) {
  const all=[];
  for (let r=0;r<=gridSize;r++) for (let c=0;c<=gridSize;c++) all.push([c,r]);
  const valid=[];
  for (let i=0;i<all.length;i++)
    for (let j=i+1;j<all.length;j++)
      for (let k=j+1;k<all.length;k++)
        if (sk_triArea(all[i],all[j],all[k])===targetArea) valid.push([i,j,k]);
  if (!valid.length) return null;

  for (let t=0;t<maxTries;t++) {
    const trip = valid[ri(0,valid.length-1)];
    const solSet = new Set(trip);
    const solPts = trip.map(i=>all[i]);
    const remain = shuffle(all.filter((_,i)=>!solSet.has(i)));
    const dots = [...solPts];
    for (const d of remain) {
      if (dots.length>=numDots) break;
      let conflict=false;
      for (let a=0;a<dots.length&&!conflict;a++)
        for (let b=a+1;b<dots.length&&!conflict;b++)
          if (sk_triArea(dots[a],dots[b],d)===targetArea) conflict=true;
      if (!conflict) dots.push(d);
    }
    if (dots.length>=Math.min(numDots,5)) {
      shuffle(dots);
      return {dots, solution:solPts, targetArea, gridSize};
    }
  }
  return null;
}

// ── SVG Renderer ──────────────────────────────────────────────────────────────
const SK_PAGE_COLS=3, SK_PAGE_ROWS=2;
const SK_PUZ_W=190, SK_PUZ_H=230;
const SK_COL_GAP=10, SK_ROW_GAP=14, SK_MX=8, SK_MY=8;
const SK_SVG_W = SK_PAGE_COLS*SK_PUZ_W + (SK_PAGE_COLS-1)*SK_COL_GAP + 2*SK_MX;
const SK_SVG_H = SK_PAGE_ROWS*SK_PUZ_H + (SK_PAGE_ROWS-1)*SK_ROW_GAP + 2*SK_MY;

function sk_renderPage(puzzles, cellPx, isKey) {
  let s=`<svg viewBox="0 0 ${SK_SVG_W} ${SK_SVG_H}" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:auto;display:block">`;
  for (let i=0;i<SK_PAGE_COLS*SK_PAGE_ROWS;i++) {
    const col=i%SK_PAGE_COLS, row=Math.floor(i/SK_PAGE_COLS);
    const px=SK_MX+col*(SK_PUZ_W+SK_COL_GAP), py=SK_MY+row*(SK_PUZ_H+SK_ROW_GAP);
    s += sk_renderOne(puzzles[i]||null, px, py, cellPx, isKey, i+1);
  }
  return s+'</svg>';
}

function sk_renderOne(puz, px, py, cellPx, isKey, num) {
  if (!puz||!puz.dots||!puz.dots.length)
    return `<text x="${px+SK_PUZ_W/2}" y="${py+SK_PUZ_H/2}" text-anchor="middle"
      font-family="Archivo,sans-serif" font-size="11" fill="#ccc">—</text>`;
  const N=puz.gridSize, GRID_PX=N*cellPx, DASH_PAD=8;
  const gx=px+(SK_PUZ_W-GRID_PX)/2, gy=py+22;
  let s='';
  s+=`<text x="${px+6}" y="${py+15}" font-family="Archivo,sans-serif" font-size="11" fill="#888" font-weight="600">(${num})</text>`;
  const fx=gx-DASH_PAD, fy=gy-DASH_PAD, fw=GRID_PX+2*DASH_PAD, fh=GRID_PX+2*DASH_PAD;
  s+=`<rect x="${fx}" y="${fy}" width="${fw}" height="${fh}" fill="none" stroke="#bbb" stroke-width="1.1" stroke-dasharray="5,3.5" rx="3"/>`;
  s+=`<rect x="${gx}" y="${gy}" width="${GRID_PX}" height="${GRID_PX}" fill="white" stroke="#2a2a2a" stroke-width="1.6"/>`;
  for (let r=1;r<N;r++) { const y=gy+r*cellPx; s+=`<line x1="${gx}" y1="${y}" x2="${gx+GRID_PX}" y2="${y}" stroke="#aaa" stroke-width="0.75" stroke-dasharray="4,3"/>`; }
  for (let c=1;c<N;c++) { const x=gx+c*cellPx; s+=`<line x1="${x}" y1="${gy}" x2="${x}" y2="${gy+GRID_PX}" stroke="#aaa" stroke-width="0.75" stroke-dasharray="4,3"/>`; }
  if (isKey && puz.solution) {
    const pts=puz.solution.map(([c,r])=>`${gx+c*cellPx},${gy+r*cellPx}`).join(' ');
    s+=`<polygon points="${pts}" fill="rgba(27,79,204,0.14)" stroke="#1B4FCC" stroke-width="2.2" stroke-linejoin="round"/>`;
  }
  for (const [c,r] of puz.dots) s+=`<circle cx="${gx+c*cellPx}" cy="${gy+r*cellPx}" r="5" fill="#111"/>`;
  s+=`<text x="${gx+GRID_PX/2}" y="${gy+GRID_PX+22}" text-anchor="middle" font-family="Archivo,sans-serif" font-size="15" font-weight="700" fill="#111">Area = ${puz.targetArea}</text>`;
  return s;
}

// ── Sheet builders ────────────────────────────────────────────────────────────
function sk_sheetHTML(isKey, title) {
  const cfg   = SK_CONFIGS[DIFF];
  const badge = isKey ? `<span class="key-badge">ANSWER KEY</span>` : '';
  return `<div class="sheet narrow">

    <div class="sh-meta">Name: ____________________________ &nbsp;&nbsp; Date: ____________</div>

}

// ZUKEI
// ═══════════════════════════════════════════════════════════════════════════════

const ZK_TITLES = [
  'Zukei — Squares & Rectangles',
  'Zukei — Triangles & Trapezoids',
  'Zukei — Mixed Shapes',
];
const ZK_DIRS = [
  'Find and circle the dots that form the named shape. Each puzzle has exactly one correct answer.',
  'Find and circle the dots that form the named shape. Each puzzle has exactly one correct answer.',
  'Find and circle the dots that form the named shape. Each puzzle has exactly one correct answer.',
];

const ZK_CONFIGS = [
  { gridSize:4, cellPx:44, numDots:6,  shapes:['square','rectangle'] },
  { gridSize:4, cellPx:44, numDots:7,  shapes:['rightTriangle','isoscelesTriangle','isoscelesRightTriangle','trapezoid'] },
  { gridSize:5, cellPx:36, numDots:9,  shapes:['rightTriangle','isoscelesTriangle','isoscelesRightTriangle','trapezoid','rhombus','parallelogram'] },
];

const ZK_SHAPE_K = {
  square:4, rectangle:4, rhombus:4, parallelogram:4, trapezoid:4,
  rightTriangle:3, isoscelesTriangle:3, isoscelesRightTriangle:3,
};

const ZK_LABEL_LINES = {
  square:               ['Square'],
  rectangle:            ['Rectangle'],
  rightTriangle:        ['Right Triangle'],
  isoscelesTriangle:    ['Isosceles Triangle'],
  isoscelesRightTriangle:['Isosceles Right', 'Triangle'],
  trapezoid:            ['Trapezoid'],
  rhombus:              ['Rhombus'],
  parallelogram:        ['Parallelogram'],
};

// ── Math helpers ──────────────────────────────────────────────────────────────
const zk_d2    = (a,b) => (b[0]-a[0])**2 + (b[1]-a[1])**2;
const zk_sub   = (b,a) => [b[0]-a[0], b[1]-a[1]];
const zk_dot   = (u,v) => u[0]*v[0] + u[1]*v[1];
const zk_cr2   = (u,v) => u[0]*v[1] - u[1]*v[0];
const zk_col3  = (a,b,c) => zk_cr2(zk_sub(b,a), zk_sub(c,a)) === 0;

// Return 4 points in convex (CCW or CW) order, or null if not convex.
function zk_convex4(p) {
  const orderings = [
    [p[0],p[1],p[2],p[3]],
    [p[0],p[1],p[3],p[2]],
    [p[0],p[2],p[1],p[3]],
  ];
  for (const o of orderings) {
    const [A,B,C,D] = o;
    const crosses = [
      zk_cr2(zk_sub(B,A), zk_sub(C,B)),
      zk_cr2(zk_sub(C,B), zk_sub(D,C)),
      zk_cr2(zk_sub(D,C), zk_sub(A,D)),
      zk_cr2(zk_sub(A,D), zk_sub(B,A)),
    ];
    if (crosses.every(c=>c>0) || crosses.every(c=>c<0)) return o;
  }
  return null;
}

// ── Shape classifiers ─────────────────────────────────────────────────────────
// Returns shape kind string for 3 non-collinear points.
function zk_triKind(pts) {
  const [A,B,C] = pts;
  if (zk_col3(A,B,C)) return null;
  const rightA = zk_dot(zk_sub(B,A), zk_sub(C,A)) === 0;
  const rightB = zk_dot(zk_sub(A,B), zk_sub(C,B)) === 0;
  const rightC = zk_dot(zk_sub(A,C), zk_sub(B,C)) === 0;
  const isRight = rightA || rightB || rightC;
  const ab=zk_d2(A,B), bc=zk_d2(B,C), ca=zk_d2(C,A);
  const isIso = ab===bc || bc===ca || ca===ab;
  if (isRight && isIso) return 'isoscelesRightTriangle';
  if (isRight)          return 'rightTriangle';
  if (isIso)            return 'isoscelesTriangle';
  return 'scalene';
}

// Returns shape kind string for 4 points (requires convex, no 3 collinear).
function zk_quadKind(pts) {
  for (let i=0;i<4;i++) for (let j=i+1;j<4;j++) for (let k=j+1;k<4;k++)
    if (zk_col3(pts[i],pts[j],pts[k])) return null;
  const ord = zk_convex4(pts);
  if (!ord) return null;
  const [A,B,C,D] = ord;
  // Parallelogram: diagonals (AC and BD) bisect each other
  const isPara = (A[0]+C[0]===B[0]+D[0]) && (A[1]+C[1]===B[1]+D[1]);
  if (isPara) {
    const sidesEq = zk_d2(A,B) === zk_d2(B,C);
    const diagEq  = zk_d2(A,C) === zk_d2(B,D);
    if (sidesEq && diagEq) return 'square';
    if (diagEq)            return 'rectangle';
    if (sidesEq)           return 'rhombus';
    return 'parallelogram';
  }
  // Trapezoid: exactly one pair of parallel opposite sides
  const AB=zk_sub(B,A), BC=zk_sub(C,B), CD=zk_sub(D,C), DA=zk_sub(A,D);
  const p1 = zk_cr2(AB,CD) === 0;  // AB ∥ CD
  const p2 = zk_cr2(BC,DA) === 0;  // BC ∥ DA
  if (p1 !== p2) return 'trapezoid';
  return 'irregular';
}

// ── Shape predicates (mutually exclusive) ────────────────────────────────────
const ZK_CHECKERS = {
  square:                pts => zk_quadKind(pts) === 'square',
  rectangle:             pts => zk_quadKind(pts) === 'rectangle',
  rhombus:               pts => zk_quadKind(pts) === 'rhombus',
  parallelogram:         pts => zk_quadKind(pts) === 'parallelogram',
  trapezoid:             pts => zk_quadKind(pts) === 'trapezoid',
  rightTriangle:         pts => zk_triKind(pts)  === 'rightTriangle',
  isoscelesTriangle:     pts => zk_triKind(pts)  === 'isoscelesTriangle',
  isoscelesRightTriangle:pts => zk_triKind(pts)  === 'isoscelesRightTriangle',
};

// ── Combo helper ──────────────────────────────────────────────────────────────
function zk_kCombos(arr, k) {
  const result = [];
  (function go(start, combo) {
    if (combo.length === k) { result.push([...combo]); return; }
    for (let i=start; i<=arr.length-(k-combo.length); i++) {
      combo.push(arr[i]); go(i+1, combo); combo.pop();
    }
  })(0, []);
  return result;
}

const zk_ptKey = p => p[0]*100 + p[1];

// ── Puzzle generator ──────────────────────────────────────────────────────────
function zk_genPuzzle(gridSize, shapeType, numDots, maxTries=600) {
  const all = [];
  for (let r=0; r<=gridSize; r++)
    for (let c=0; c<=gridSize; c++) all.push([c,r]);

  const k     = ZK_SHAPE_K[shapeType];
  const check = ZK_CHECKERS[shapeType];

  // Pre-compute all valid solution instances on this grid
  const valid = zk_kCombos(all, k).filter(check);
  if (!valid.length) return null;

  for (let t=0; t<maxTries; t++) {
    const sol     = valid[ri(0, valid.length-1)];
    const solKeys = new Set(sol.map(zk_ptKey));
    const remain  = shuffle(all.filter(p => !solKeys.has(zk_ptKey(p))));

    const dots = [...sol];

    for (const d of remain) {
      if (dots.length >= numDots) break;
      // Check all (k-1)-subsets of current dots + d for shape conflict
      let conflict = false;
      for (const sub of zk_kCombos(dots, k-1)) {
        if (check([...sub, d])) { conflict = true; break; }
      }
      if (!conflict) dots.push(d);
    }

    if (dots.length >= numDots - 1) {
      shuffle(dots);
      return { dots, solution:sol, shapeType, gridSize };
    }
  }
  return null;
}

// ── SVG constants ─────────────────────────────────────────────────────────────
const ZK_PAGE_COLS=3, ZK_PAGE_ROWS=2;
const ZK_PUZ_W=208, ZK_PUZ_H=248;
const ZK_COL_GAP=8, ZK_ROW_GAP=12, ZK_MX=8, ZK_MY=8;
const ZK_SVG_W = ZK_PAGE_COLS*ZK_PUZ_W + (ZK_PAGE_COLS-1)*ZK_COL_GAP + 2*ZK_MX;
const ZK_SVG_H = ZK_PAGE_ROWS*ZK_PUZ_H + (ZK_PAGE_ROWS-1)*ZK_ROW_GAP + 2*ZK_MY;

function zk_renderPage(puzzles, cellPx, isKey) {
  let s = `<svg viewBox="0 0 ${ZK_SVG_W} ${ZK_SVG_H}" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:auto;display:block">`;
  for (let i=0; i<ZK_PAGE_COLS*ZK_PAGE_ROWS; i++) {
    const col = i%ZK_PAGE_COLS, row = Math.floor(i/ZK_PAGE_COLS);
    const px = ZK_MX + col*(ZK_PUZ_W+ZK_COL_GAP);
    const py = ZK_MY + row*(ZK_PUZ_H+ZK_ROW_GAP);
    s += zk_renderOne(puzzles[i]||null, px, py, cellPx, isKey, i+1);
  }
  return s+'</svg>';
}

function zk_renderOne(puz, px, py, cellPx, isKey, num) {
  if (!puz || !puz.dots || !puz.dots.length)
    return `<text x="${px+ZK_PUZ_W/2}" y="${py+ZK_PUZ_H/2}" text-anchor="middle"
      font-family="Archivo,sans-serif" font-size="11" fill="#ccc">—</text>`;

  const N       = puz.gridSize;
  const GRID_PX = N * cellPx;
  const DASH_PAD = 8;
  const gx = px + Math.round((ZK_PUZ_W - GRID_PX) / 2);
  const gy = py + 22;
  let s = '';

  // Puzzle number
  s += `<text x="${px+6}" y="${py+15}" font-family="Archivo,sans-serif" font-size="11" fill="#888" font-weight="600">(${num})</text>`;

  // Dashed outer frame
  s += `<rect x="${gx-DASH_PAD}" y="${gy-DASH_PAD}" width="${GRID_PX+2*DASH_PAD}" height="${GRID_PX+2*DASH_PAD}"
    fill="none" stroke="#bbb" stroke-width="1.1" stroke-dasharray="5,3.5" rx="2"/>`;

  // Solid grid border
  s += `<rect x="${gx}" y="${gy}" width="${GRID_PX}" height="${GRID_PX}"
    fill="white" stroke="#2a2a2a" stroke-width="1.6"/>`;

  // Dashed interior grid lines
  for (let r=1; r<N; r++) {
    const y = gy + r*cellPx;
    s += `<line x1="${gx}" y1="${y}" x2="${gx+GRID_PX}" y2="${y}" stroke="#aaa" stroke-width="0.75" stroke-dasharray="4,3"/>`;
  }
  for (let c=1; c<N; c++) {
    const x = gx + c*cellPx;
    s += `<line x1="${x}" y1="${gy}" x2="${x}" y2="${gy+GRID_PX}" stroke="#aaa" stroke-width="0.75" stroke-dasharray="4,3"/>`;
  }

  // Answer key: filled solution polygon
  if (isKey && puz.solution && puz.solution.length) {
    let solPts = puz.solution.length === 3
      ? puz.solution
      : (zk_convex4(puz.solution) || puz.solution);
    const pts = solPts.map(([c,r]) => `${gx+c*cellPx},${gy+r*cellPx}`).join(' ');
    s += `<polygon points="${pts}" fill="rgba(27,79,204,0.14)" stroke="#1B4FCC" stroke-width="2.2" stroke-linejoin="round"/>`;
  }

  // Dots
  for (const [c,r] of puz.dots)
    s += `<circle cx="${gx+c*cellPx}" cy="${gy+r*cellPx}" r="4.5" fill="#111"/>`;

  // Shape label (supports 1 or 2 lines)
  const lines   = ZK_LABEL_LINES[puz.shapeType] || [puz.shapeType];
  const labelY  = gy + GRID_PX + 20;
  const fontSize = lines.length === 1 ? 14 : 13;
  s += `<text x="${gx+GRID_PX/2}" y="${labelY}" text-anchor="middle"
    font-family="Archivo,sans-serif" font-size="${fontSize}" font-weight="700" fill="#111">${lines[0]}</text>`;
  if (lines.length > 1)
    s += `<text x="${gx+GRID_PX/2}" y="${labelY+16}" text-anchor="middle"
      font-family="Archivo,sans-serif" font-size="${fontSize}" font-weight="700" fill="#111">${lines[1]}</text>`;

  return s;
}

// ═══════════════════════════════════════════════════════════════════════════════
// MAZE ESCAPE  (Perfect Squares — 4-direction, matches elementary Multiple Maze)
// ═══════════════════════════════════════════════════════════════════════════════

const ME_TITLES = [
  'Perfect Squares Maze Escape — Beginner',
  'Perfect Squares Maze Escape — Intermediate',
  'Perfect Squares Maze Escape — Challenge',
];
const ME_DIRS = [
  'Start at <b style="color:#1A7A3A">GO</b> (the cell containing 1). Move <strong>up, down, left, or right</strong> through perfect squares to reach <b style="color:#FF4F00">END</b>. There is exactly one correct path!',
  'Start at <b style="color:#1A7A3A">GO</b> (the cell containing 1). Move <strong>up, down, left, or right</strong> through perfect squares to reach <b style="color:#FF4F00">END</b>. Watch out for dead ends!',
  'Start at <b style="color:#1A7A3A">GO</b> (the cell containing 1). Move <strong>up, down, left, or right</strong> through perfect squares to reach <b style="color:#FF4F00">END</b>. Watch out for dead ends!',
];

function me_4nbrs(r,c,R,C){
  const o=[];
  if(r>0)   o.push([r-1,c]);
  if(r<R-1) o.push([r+1,c]);
  if(c>0)   o.push([r,c-1]);
  if(c<C-1) o.push([r,c+1]);
  return o;
}
function me_borderCells(R,C){
  const b=[];
  for(let c=0;c<C;c++){b.push([0,c]);b.push([R-1,c]);}
  for(let r=1;r<R-1;r++){b.push([r,0]);b.push([r,C-1]);}
  return b;
}
function me_edge(r,c,R,C){
  if(r===0)return'top';if(r===R-1)return'bottom';
  if(c===0)return'left';return'right';
}

// Returns all border cells reachable from (sr,sc) through isMult cells (≠ start).
// Border cells are treated as terminals — BFS does not continue THROUGH them.
function me_borderExits(isMult,sr,sc,R,C){
  const vis=Array.from({length:R},()=>Array(C).fill(false));
  vis[sr][sc]=true;
  const q=[[sr,sc]];const exits=[];
  while(q.length){
    const[r,c]=q.shift();
    for(const[nr,nc] of me_4nbrs(r,c,R,C)){
      if(vis[nr][nc]||!isMult[nr][nc])continue;
      vis[nr][nc]=true;
      const isBorder=(nr===0||nr===R-1||nc===0||nc===C-1);
      if(isBorder)exits.push([nr,nc]);
      else q.push([nr,nc]);
    }
  }
  return exits;
}

// Count all distinct simple paths from (sr,sc) to (er,ec) through isMult cells.
// Stops counting at 2 (we only care whether the answer is exactly 1).
function me_pathCount(isMult,sr,sc,er,ec,R,C){
  let count=0;
  const vis=Array.from({length:R},()=>Array(C).fill(false));
  vis[sr][sc]=true;
  function dfs(r,c){
    if(count>=2)return;
    for(const[nr,nc] of me_4nbrs(r,c,R,C)){
      if(!isMult[nr][nc]||vis[nr][nc])continue;
      if(nr===er&&nc===ec){count++;continue;}
      vis[nr][nc]=true;
      dfs(nr,nc);
      vis[nr][nc]=false;
      if(count>=2)return;
    }
  }
  dfs(sr,sc);
  return count;
}

// BFS shortest-path length (in cells) from (sr,sc) to (er,ec) through isMult cells.
function me_shortestLen(isMult,sr,sc,er,ec,R,C){
  const vis=Array.from({length:R},()=>Array(C).fill(false));
  vis[sr][sc]=true;
  const q=[[sr,sc,1]];
  while(q.length){
    const[r,c,len]=q.shift();
    for(const[nr,nc] of me_4nbrs(r,c,R,C)){
      if(!isMult[nr][nc]||vis[nr][nc])continue;
      if(nr===er&&nc===ec)return len+1;
      vis[nr][nc]=true;
      q.push([nr,nc,len+1]);
    }
  }
  return Infinity;
}

// DFS that finds one simple path from (sr,sc) to (er,ec) whose length is in [minLen,maxLen].
function me_buildPath(sr,sc,er,ec,R,C,minLen,maxLen){
  const vis=Array.from({length:R},()=>Array(C).fill(false));
  vis[sr][sc]=true;
  const path=[[sr,sc]];
  const stack=[{nbs:shuffle(me_4nbrs(sr,sc,R,C)),ni:0}];
  while(stack.length){
    const[cr,cc]=path[path.length-1];
    if(cr===er&&cc===ec){
      if(path.length>=minLen)return path;
      vis[cr][cc]=false;path.pop();stack.pop();continue;
    }
    if(path.length>=maxLen){vis[cr][cc]=false;path.pop();stack.pop();continue;}
    const fr=stack[stack.length-1];let pushed=false;
    while(fr.ni<fr.nbs.length){
      const[nr,nc]=fr.nbs[fr.ni++];
      if(vis[nr][nc])continue;
      vis[nr][nc]=true;path.push([nr,nc]);
      stack.push({nbs:shuffle(me_4nbrs(nr,nc,R,C)),ni:0});
      pushed=true;break;
    }
    if(!pushed){vis[cr][cc]=false;path.pop();stack.pop();}
  }
  return null;
}

function me_gen(diff){
  const R=5,C=5;
  const sqArr=[4,9,16,25,36,49,64,81,100,121,144];
  const nonSq=[];
  for(let n=2;n<=150;n++){const s=Math.round(Math.sqrt(n));if(s*s!==n)nonSq.push(n);}
  const cfg=[
    {minLen:5,maxLen:9, deadMin:1,deadMax:2},
    {minLen:7,maxLen:12,deadMin:2,deadMax:4},
    {minLen:9,maxLen:15,deadMin:3,deadMax:5},
  ][Math.min(diff,2)];
  const borderCells=me_borderCells(R,C);

  for(let att=0;att<8000;att++){
    // ── Pick GO and END on different edges, min distance 4 apart ──
    const[sr,sc]=borderCells[ri(0,borderCells.length-1)];
    const startEdge=me_edge(sr,sc,R,C);
    const endCands=borderCells.filter(([r,c])=>{
      if(r===sr&&c===sc)return false;
      if(me_edge(r,c,R,C)===startEdge)return false;
      return Math.abs(r-sr)+Math.abs(c-sc)>=4;
    });
    if(!endCands.length)continue;
    const[er,ec]=endCands[ri(0,endCands.length-1)];

    // ── Build a path of the right length ──
    const path=me_buildPath(sr,sc,er,ec,R,C,cfg.minLen,cfg.maxLen);
    if(!path||path.length<cfg.minLen)continue;

    // ── Assign perfect-square values to path cells ──
    const grid=Array.from({length:R},()=>Array(C).fill(0));
    const isMult=Array.from({length:R},()=>Array(C).fill(false));
    const isPath=Array.from({length:R},()=>Array(C).fill(false));
    const ps=new Set(path.map(([r,c])=>r+','+c));
    const sqP=shuffle([...sqArr]);
    grid[sr][sc]=1;isMult[sr][sc]=true;isPath[sr][sc]=true;
    for(let i=1;i<path.length;i++){
      const[r,c]=path[i];grid[r][c]=sqP[i-1];isMult[r][c]=true;isPath[r][c]=true;
    }
    if(path.some(([r,c])=>!grid[r][c]))continue;

    // ── Baseline checks (path squares only) ──
    // 1. END is the only reachable border cell
    {const exits=me_borderExits(isMult,sr,sc,R,C);
    if(exits.length!==1||exits[0][0]!==er||exits[0][1]!==ec)continue;}
    // 2. Exactly one simple path GO→END (no shortcut through grid-adjacent path cells)
    if(me_pathCount(isMult,sr,sc,er,ec,R,C)!==1)continue;
    // 3. Shortest path ≥ 5 cells (GO counts as cell 1)
    if(me_shortestLen(isMult,sr,sc,er,ec,R,C)<5)continue;

    // ── Add dead-end perfect squares (interior cells only) ──
    // Each candidate must keep: (a) END as only border exit, (b) unique path, (c) len ≥ 5
    const usedSq=new Set(path.map((_,i)=>i===0?1:sqP[i-1]));
    const availSq=shuffle(sqArr.filter(s=>!usedSq.has(s)));
    let dIdx=0,deadAdded=0;
    const adjPath=[];
    for(const[pr,pc] of path)
      for(const[nr,nc] of me_4nbrs(pr,pc,R,C))
        if(!isPath[nr][nc]&&!isMult[nr][nc]&&
           !(nr===0||nr===R-1||nc===0||nc===C-1)) // interior only
          adjPath.push([nr,nc]);
    shuffle(adjPath);
    for(const[r,c] of adjPath){
      if(deadAdded>=cfg.deadMax||dIdx>=availSq.length)break;
      grid[r][c]=availSq[dIdx];isMult[r][c]=true;
      const exits=me_borderExits(isMult,sr,sc,R,C);
      const stillUnique=me_pathCount(isMult,sr,sc,er,ec,R,C)===1;
      const stillLong=me_shortestLen(isMult,sr,sc,er,ec,R,C)>=5;
      if(exits.length===1&&exits[0][0]===er&&exits[0][1]===ec&&stillUnique&&stillLong){
        deadAdded++;dIdx++;
      } else {
        isMult[r][c]=false;grid[r][c]=0;
      }
    }
    if(deadAdded<cfg.deadMin)continue;

    // ── Fill remaining cells with non-squares ──
    const nsP=shuffle([...nonSq]);let ni=0;
    for(let r=0;r<R;r++)for(let c=0;c<C;c++)if(!grid[r][c])grid[r][c]=nsP[ni++];

    // ── Final verification ──
    const finalExits=me_borderExits(isMult,sr,sc,R,C);
    if(finalExits.length!==1||finalExits[0][0]!==er||finalExits[0][1]!==ec)continue;
    if(me_pathCount(isMult,sr,sc,er,ec,R,C)!==1)continue;
    if(me_shortestLen(isMult,sr,sc,er,ec,R,C)<5)continue;

    return{grid,sr,sc,er,ec,pathSet:ps,isMult,isPath,R,C};
  }
  return null;
}

function me_renderOne(puz, isKey){
  if(!puz)return'<div style="font-size:11px;color:#c00;padding:8px">⚠ Generation failed</div>';
  const{grid,sr,sc,er,ec,isMult,isPath,R,C}=puz;
  const csz=46,gap=3;
  const colT=`grid-template-columns:repeat(${C},${csz}px)`;
  const lStyle=(col)=>`height:${csz}px;display:flex;align-items:center;font-size:8px;font-weight:800;font-family:'Archivo',sans-serif;color:${col};white-space:nowrap`;
  const wStyle=`width:${csz}px;text-align:center;font-size:8px;font-weight:800;font-family:'Archivo',sans-serif`;

  // Build label rows/cols — GO and END always shown (needed to solve the puzzle)
  let topCells='';
  for(let c=0;c<C;c++){
    const isGO=(sr===0&&sc===c), isEND=(er===0&&ec===c);
    topCells+= isGO ? `<div style="${wStyle};color:#1A7A3A">&#9660; GO</div>`
             : isEND? `<div style="${wStyle};color:#FF4F00">&#9660; END</div>`
             :         `<div style="${wStyle}"></div>`;
  }
  let botCells='';
  for(let c=0;c<C;c++){
    const isGO=(sr===R-1&&sc===c), isEND=(er===R-1&&ec===c);
    botCells+= isGO ? `<div style="${wStyle};color:#1A7A3A">&#9650; GO</div>`
             : isEND? `<div style="${wStyle};color:#FF4F00">&#9650; END</div>`
             :         `<div style="${wStyle}"></div>`;
  }
  let leftCells='',rightCells='';
  for(let r=0;r<R;r++){
    const isGoL=(sc===0&&sr===r), isEndL=(ec===0&&er===r);
    const isGoR=(sc===C-1&&sr===r), isEndR=(ec===C-1&&er===r);
    leftCells += isGoL ?`<div style="${lStyle('#1A7A3A')}">GO&#9658;</div>`
               : isEndL?`<div style="${lStyle('#FF4F00')}">END&#9658;</div>`
               :         `<div style="height:${csz}px"></div>`;
    rightCells+= isGoR ?`<div style="${lStyle('#1A7A3A')}">&#9668;GO</div>`
               : isEndR?`<div style="${lStyle('#FF4F00')}">&#9668;END</div>`
               :         `<div style="height:${csz}px"></div>`;
  }

  // Grid cells
  let cells='';
  for(let r=0;r<R;r++){
    for(let c=0;c<C;c++){
      const v=grid[r][c];
      const isGO=r===sr&&c===sc;
      const isEND=r===er&&c===ec;
      const onPath=isPath[r][c]&&!isGO&&!isEND;
      const isDead=isMult[r][c]&&!isPath[r][c]&&!isGO&&!isEND;
      let cls='mc';
      if(isGO)                   cls+=' mc-s';
      else if(isEND)             cls+=' mc-f';
      else if(isKey&&onPath)     cls+=' mc-p';
      else if(isKey&&isDead)     cls+=' mc-d';
      // no mc-trap — all cells same color so perfect squares aren't visually obvious
      cells+=`<div class="${cls}" style="font-size:${v>=100?12:14}px">${v}</div>`;
    }
  }

  const keyLeg=isKey?`<div class="mleg">
    <div class="mli"><div class="msw" style="background:#D0F0DB;outline:2px solid #1A7A3A"></div>GO (start)</div>
    <div class="mli"><div class="msw" style="background:#FFF0E0;outline:2px solid #FF9000"></div>Path</div>
    <div class="mli"><div class="msw" style="background:#FFE2D0;outline:2px solid #FF4F00"></div>END (exit)</div>
    <div class="mli"><div class="msw" style="background:#E8EEFF;outline:1.5px solid #9AAAE0"></div>Dead end</div>
  </div>`:'';

  return`<div class="me-outer">
    <div style="display:flex;gap:${gap}px;margin-left:26px;margin-right:26px">${topCells}</div>
    <div style="display:flex;align-items:center;gap:0">
      <div style="display:flex;flex-direction:column;gap:${gap}px;width:26px;align-items:flex-end;padding-right:3px">${leftCells}</div>
      <div class="maze-grid" style="--mcsz:${csz}px;--mgap:${gap}px;${colT}">${cells}</div>
      <div style="display:flex;flex-direction:column;gap:${gap}px;width:26px;align-items:flex-start;padding-left:3px">${rightCells}</div>
    </div>
    <div style="display:flex;gap:${gap}px;margin-left:26px;margin-right:26px">${botCells}</div>
    ${keyLeg}
  </div>`;
}

function me_sheetHTML(isKey, title){
  const badge = isKey ? `<span class="key-badge">ANSWER KEY</span>` : '';
  const puzzles = ME_PUZZLES.slice(0,4);

// ARRANGING BOXES  (Perfect Squares)

const AB_TITLES = [
  'Arranging Boxes — Beginner',
  'Arranging Boxes — Intermediate',
  'Arranging Boxes — Challenge',
];
const AB_DIRS = [
  'Rearrange the <strong>3 boxes</strong> so that every pair of neighboring boxes sums to a perfect square. Write your answer in the empty boxes.',
  'Rearrange the <strong>4 boxes</strong> so that every pair of neighboring boxes sums to a perfect square. Write your answer in the empty boxes.',
  'Rearrange the <strong>5 boxes</strong> so that every pair of neighboring boxes sums to a perfect square. Write your answer in the empty boxes.',
];

function ab_gen(diff){
  const cfg=[{num:3,max:20},{num:4,max:25},{num:5,max:30}][Math.min(diff,2)];
  const PSUMS=new Set([4,9,16,25,36,49,64,81,100]);
  for(let att=0;att<300000;att++){
    const start=ri(1,cfg.max);const chain=[start];const used=new Set([start]);let ok=true;
    for(let i=1;i<cfg.num;i++){
      const prev=chain[chain.length-1];
      const cands=[];for(let n=1;n<=cfg.max;n++){if(!used.has(n)&&PSUMS.has(prev+n))cands.push(n);}
      if(!cands.length){ok=false;break;}
      const next=cands[ri(0,cands.length-1)];chain.push(next);used.add(next);
    }
    if(ok&&chain.length===cfg.num)return{numbers:shuffle([...chain]),solution:chain};
  }
  return null;
}

function ab_renderOne(puz, isKey){
  if(!puz)return'<div style="font-size:11px;color:#c00;padding:8px">⚠ Generation failed</div>';
  const{numbers,solution}=puz;
  const given=numbers.map(n=>`<div class="ab-box">${n}</div>`).join('');
  let ansHTML;
  if(isKey){
    const parts=[];
    for(let i=0;i<solution.length;i++){
      parts.push(`<div class="ab-slot"><div class="ab-box ab-sol">${solution[i]}</div></div>`);
      if(i<solution.length-1){
        const s=solution[i]+solution[i+1];
        parts.push(`<div class="ab-conn">${s}</div>`);
      }
    }
    ansHTML=`<div class="ab-sol-row">${parts.join('')}</div>`;
  }else{
    ansHTML=`<div class="ab-row">${solution.map(()=>`<div class="ab-box ab-empty"></div>`).join('')}</div>`;
  }
  return`<div class="ab-wrap">
    <div class="ab-lbl">Given</div>
    <div class="ab-row">${given}</div>
    <div style="text-align:center;font-size:13px;color:#bbb;line-height:1.2">&#8595;</div>
    <div class="ab-lbl">Arrange</div>
    ${ansHTML}
  </div>`;
}

function ab_sheetHTML(isKey, title){
  const badge = isKey ? `<span class="key-badge">ANSWER KEY</span>` : '';
  const puzzles = AB_PUZZLES.slice(0,4);
  const cells = puzzles.map((p,i) => `
    <div class="pc" style="min-height:0;padding:14px 10px">
      <div class="pc-n">${i+1}</div>
      ${ab_renderOne(p, isKey)}
    </div>`).join('');
  return `<div class="sheet narrow">
    <div class="sh-hdr"><div class="sh-title">${title}${badge}</div><div class="sh-src">Facts on Fire</div></div>
    <div class="sh-meta">Name: ____________________________ &nbsp;&nbsp; Date: ____________</div>
    <div class="sh-dir">${AB_DIRS[DIFF]}</div>
    <div class="pgrid" style="display:grid;grid-template-columns:repeat(2,1fr);gap:10px">${cells}</div>
  </div>`;
}

// FOURTH POINT
// Three corners of a named quadrilateral are shown on a 5×5 dot grid.
// Find and mark the unique 4th corner.
// Uniqueness is verified by exhaustive search: no other grid point completes
// the same shape type.  Shape classification reuses the zk_* helpers.
// ═══════════════════════════════════════════════════════════════════════════════

const FP_TITLES = [
  'Fourth Point — Parallelogram',
  'Fourth Point — Rectangles & Rhombuses',
  'Fourth Point — Squares & Isosceles Trapezoids',
];
const FP_DIRS = [
  'Three corners of a <strong>parallelogram</strong> are shown. Find and mark the 4th corner on each grid.',
  'Three corners of the named quadrilateral are shown. Find and mark the 4th corner on each grid.',
  'Three corners of the named quadrilateral are shown. Find and mark the 4th corner on each grid.',
];
const FP_CONFIGS = [
  { shapes:['parallelogram'],                 N:4, cellPx:28, numPuz:9 },
  { shapes:['rectangle','rhombus'],           N:4, cellPx:28, numPuz:9 },
  { shapes:['square','isoscelesTrapezoid'],   N:4, cellPx:28, numPuz:9 },
];

const FP_LABEL_LINES = {
  parallelogram:     ['Parallelogram'],
  rectangle:         ['Rectangle'],
  rhombus:           ['Rhombus'],
  square:            ['Square'],
  isoscelesTrapezoid:['Isosceles','Trapezoid'],
};

// ── Grid helpers ──────────────────────────────────────────────────────────────
const fp_eq   = (a, b) => a[0]===b[0] && a[1]===b[1];

function fp_gridPts(N) {
  const pts=[];
  for (let r=0;r<=N;r++) for (let c=0;c<=N;c++) pts.push([c,r]);
  return pts;
}

// ── Shape classifier (exclusive hierarchy: square ≠ rectangle ≠ rhombus) ──────
// Returns: 'parallelogram' | 'rectangle' | 'rhombus' | 'square' |
//          'isoscelesTrapezoid' | 'trapezoid' | 'irregular' | null (degenerate)
function fp_quadKind(pts) {
  // Reject any three collinear
  for (let i=0;i<4;i++) for (let j=i+1;j<4;j++) for (let k=j+1;k<4;k++)
    if (zk_col3(pts[i],pts[j],pts[k])) return null;
  // Require convex
  const ord = zk_convex4(pts);
  if (!ord) return null;
  const [A,B,C,D] = ord;
  // ── Parallelogram family: midpoints of diagonals coincide ──
  if (A[0]+C[0]===B[0]+D[0] && A[1]+C[1]===B[1]+D[1]) {
    const sidesEq = zk_d2(A,B)===zk_d2(B,C);
    const diagEq  = zk_d2(A,C)===zk_d2(B,D);
    if (sidesEq && diagEq) return 'square';
    if (diagEq)            return 'rectangle';
    if (sidesEq)           return 'rhombus';
    return 'parallelogram';
  }
  // ── Trapezoid family: exactly one pair of parallel sides ──
  const AB=zk_sub(B,A), BC=zk_sub(C,B), CD=zk_sub(D,C), DA=zk_sub(A,D);
  const p1=zk_cr2(AB,CD)===0, p2=zk_cr2(BC,DA)===0;
  if (p1!==p2) {
    // Isosceles: equal legs
    const legsEq = p1 ? zk_d2(B,C)===zk_d2(D,A) : zk_d2(A,B)===zk_d2(C,D);
    return legsEq ? 'isoscelesTrapezoid' : 'trapezoid';
  }
  return 'irregular';
}

// ── Pool builder ──────────────────────────────────────────────────────────────
// Returns array of {given:[pt,pt,pt], answer:pt, shapeType, N} with unique solutions.
function fp_buildPool(shapeType, N) {
  const all  = fp_gridPts(N);
  const raw  = [];
  const seen = new Set(); // deduplicate by canonical set-key + which point is missing

  const isPara = ['parallelogram','rectangle','rhombus','square'].includes(shapeType);

  if (isPara) {
    // Algebraic approach: for each unordered triple, compute all 3 possible
    // parallelogram 4th points (one for each "opposite vertex" assignment).
    for (let i=0;i<all.length;i++)
    for (let j=i+1;j<all.length;j++)
    for (let k=j+1;k<all.length;k++) {
      const [A,B,C] = [all[i],all[j],all[k]];
      if (zk_col3(A,B,C)) continue;
      // Three possible D's: one for each point acting as the diagonal partner to D
      const tries = [
        [B[0]+C[0]-A[0], B[1]+C[1]-A[1], [A,B,C]],  // A & D are diagonal pair
        [A[0]+C[0]-B[0], A[1]+C[1]-B[1], [A,B,C]],  // B & D are diagonal pair
        [A[0]+B[0]-C[0], A[1]+B[1]-C[1], [A,B,C]],  // C & D are diagonal pair
      ];
      for (const [dx,dy,given] of tries) {
        if (dx<0||dx>N||dy<0||dy>N) continue;           // off-grid
        const D=[dx,dy];
        if (given.some(p=>fp_eq(p,D))) continue;          // duplicate
        if (fp_quadKind([A,B,C,D])!==shapeType) continue; // wrong shape
        const setKey=[A,B,C,D].map(p=>p[0]*100+p[1]).sort().join(',');
        const puzKey=setKey+'|'+dx*100+dy;
        if (seen.has(puzKey)) continue;
        seen.add(puzKey);
        raw.push({given:[A,B,C], answer:D, shapeType, N});
      }
    }
  } else {
    // Brute-force: enumerate all 4-combos, classify, then try each as missing
    for (let i=0;i<all.length;i++)
    for (let j=i+1;j<all.length;j++)
    for (let k=j+1;k<all.length;k++)
    for (let l=k+1;l<all.length;l++) {
      if (fp_quadKind([all[i],all[j],all[k],all[l]])!==shapeType) continue;
      for (let m=0;m<4;m++) {
        const four=[all[i],all[j],all[k],all[l]];
        const given=four.filter((_,idx)=>idx!==m);
        const answer=four[m];
        const puzKey=four.map(p=>p[0]*100+p[1]).sort().join(',')+'|'+answer[0]*100+answer[1];
        if (seen.has(puzKey)) continue;
        seen.add(puzKey);
        raw.push({given, answer, shapeType, N});
      }
    }
  }

  // ── Uniqueness filter: exactly one grid point completes this shape ──────────
  return raw.filter(puz => {
    let cnt=0;
    for (const d of all) {
      if (puz.given.some(g=>fp_eq(g,d))) continue;
      if (fp_quadKind([...puz.given, d])===shapeType) { if(++cnt>1) return false; }
    }
    return cnt===1;
  });
}

// ── Sheet generator ───────────────────────────────────────────────────────────
function fp_genSheet(diff) {
  const cfg     = FP_CONFIGS[diff];
  const puzzles = [];

  // Build shuffled pools per shape type (done once per generate() call)
  const pools = {};
  for (const st of cfg.shapes) {
    pools[st] = shuffle(fp_buildPool(st, cfg.N));
  }

  const usedKeys = new Set();
  let si = 0; // index into shapes cycle

  for (let attempt=0; puzzles.length < cfg.numPuz && attempt < cfg.numPuz*6; attempt++) {
    const shapeType = cfg.shapes[si % cfg.shapes.length];
    si++;
    const pool = pools[shapeType];
    if (!pool || !pool.length) continue;

    // Pick a random entry from the pool
    const idx = ri(0, pool.length-1);
    const puz = pool.splice(idx,1)[0]; // remove to avoid repeats

    const key = [...puz.given, puz.answer].map(p=>p[0]*100+p[1]).join(',');
    if (usedKeys.has(key)) continue;
    usedKeys.add(key);
    puzzles.push(puz);
  }

  return puzzles;
}

// ── SVG layout constants ──────────────────────────────────────────────────────
const FP_PAGE_COLS=3, FP_PAGE_ROWS=3;
const FP_PUZ_W=164, FP_PUZ_H=186;
const FP_COL_GAP=8, FP_ROW_GAP=8, FP_MX=6, FP_MY=6;
const FP_SVG_W = FP_PAGE_COLS*FP_PUZ_W + (FP_PAGE_COLS-1)*FP_COL_GAP + 2*FP_MX;
const FP_SVG_H = FP_PAGE_ROWS*FP_PUZ_H + (FP_PAGE_ROWS-1)*FP_ROW_GAP + 2*FP_MY;

function fp_renderPage(puzzles, isKey) {
  const cfg=FP_CONFIGS[DIFF];
  let s=`<svg viewBox="0 0 ${FP_SVG_W} ${FP_SVG_H}" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:auto;display:block">`;
  for (let i=0;i<FP_PAGE_COLS*FP_PAGE_ROWS;i++) {
    const col=i%FP_PAGE_COLS, row=Math.floor(i/FP_PAGE_COLS);
    const px=FP_MX+col*(FP_PUZ_W+FP_COL_GAP), py=FP_MY+row*(FP_PUZ_H+FP_ROW_GAP);
    s+=fp_renderOne(puzzles[i]||null, px, py, cfg.cellPx, isKey, i+1);
  }
  return s+'</svg>';
}

function fp_renderOne(puz, px, py, cellPx, isKey, num) {
  if (!puz) return `<text x="${px+FP_PUZ_W/2}" y="${py+FP_PUZ_H/2}" text-anchor="middle" font-family="Archivo,sans-serif" font-size="11" fill="#ccc">—</text>`;

  const N=puz.N, GRID_PX=N*cellPx, DP=7; // DP = dashed-border padding
  const gx=px+Math.round((FP_PUZ_W-GRID_PX)/2), gy=py+22;
  let s='';

  // ── Puzzle number ──
  s+=`<text x="${px+6}" y="${py+15}" font-family="Archivo,sans-serif" font-size="11" fill="#888" font-weight="600">(${num})</text>`;

  // ── Dashed outer frame ──
  s+=`<rect x="${gx-DP}" y="${gy-DP}" width="${GRID_PX+2*DP}" height="${GRID_PX+2*DP}" fill="none" stroke="#bbb" stroke-width="1.1" stroke-dasharray="5,3.5" rx="2"/>`;

  // ── Solid grid border + white background ──
  s+=`<rect x="${gx}" y="${gy}" width="${GRID_PX}" height="${GRID_PX}" fill="white" stroke="#2a2a2a" stroke-width="1.6"/>`;

  // ── Dashed interior grid lines ──
  for (let r=1;r<N;r++) { const y=gy+r*cellPx; s+=`<line x1="${gx}" y1="${y}" x2="${gx+GRID_PX}" y2="${y}" stroke="#ccc" stroke-width="0.8" stroke-dasharray="4,3"/>`; }
  for (let c=1;c<N;c++) { const x=gx+c*cellPx; s+=`<line x1="${x}" y1="${gy}" x2="${x}" y2="${gy+GRID_PX}" stroke="#ccc" stroke-width="0.8" stroke-dasharray="4,3"/>`; }

  // ── Key: filled quadrilateral ──
  if (isKey) {
    const all4=[...puz.given, puz.answer];
    const ord=zk_convex4(all4)||all4;
    const poly=ord.map(([c,r])=>`${gx+c*cellPx},${gy+r*cellPx}`).join(' ');
    s+=`<polygon points="${poly}" fill="rgba(184,48,0,0.10)" stroke="#b83000" stroke-width="1.8" stroke-linejoin="round"/>`;
  }

  // ── Background dots (all grid points not given/answer) ──
  for (let r=0;r<=N;r++) for (let c=0;c<=N;c++) {
    if (puz.given.some(g=>g[0]===c&&g[1]===r)) continue;
    if (isKey && puz.answer[0]===c && puz.answer[1]===r) continue;
    s+=`<circle cx="${gx+c*cellPx}" cy="${gy+r*cellPx}" r="2.5" fill="#333"/>`;
  }

  // ── Given points: bullseye style (matches PDF) ──
  for (const [c,r] of puz.given) {
    const x=gx+c*cellPx, y=gy+r*cellPx;
    s+=`<circle cx="${x}" cy="${y}" r="8" fill="white" stroke="#1a1a1a" stroke-width="1.8"/>`;
    s+=`<circle cx="${x}" cy="${y}" r="3.5" fill="#1a1a1a"/>`;
  }

  // ── Answer point (key): red bullseye ──
  if (isKey) {
    const [ac,ar]=puz.answer, ax=gx+ac*cellPx, ay=gy+ar*cellPx;
    s+=`<circle cx="${ax}" cy="${ay}" r="8" fill="white" stroke="#b83000" stroke-width="2.5"/>`;
    s+=`<circle cx="${ax}" cy="${ay}" r="3.5" fill="#b83000"/>`;
  }

  // ── Shape label (one or two lines) ──
  const lines=FP_LABEL_LINES[puz.shapeType]||[puz.shapeType];
  const lx=gx+GRID_PX/2, ly0=gy+GRID_PX+17;
  const fsz=lines.length>1?11:13;
  lines.forEach((ln,i)=>{ s+=`<text x="${lx}" y="${ly0+i*14}" text-anchor="middle" font-family="Archivo,sans-serif" font-size="${fsz}" font-weight="700" fill="#111">${ln}</text>`; });

  return s;
}

// ── Sheet builders ────────────────────────────────────────────────────────────
function fp_sheetHTML(isKey, title) {
  const badge = isKey ? `<span class="key-badge">ANSWER KEY</span>` : '';
  return `<div class="sheet narrow">
    <div class="sh-hdr"><div class="sh-title">${title}${badge}</div><div class="sh-src">Facts on Fire</div></div>
    <div class="sh-meta">Name: ____________________________ &nbsp;&nbsp; Date: ____________</div>
    <div class="sh-dir">${FP_DIRS[DIFF]}</div>
    <div class="sh-svg">${fp_renderPage(FP_PUZZLES, isKey)}</div>
  </div>`;
}
function fp_buildSheet(isKey) {
  const title = document.getElementById('pg-title').value.trim() || FP_TITLES[DIFF];
  return fp_sheetHTML(isKey, title);
}

// ═══════════════════════════════════════════════════════════════════════════════
// DIGIT DIVISION
// Format: D × Q = A  (1-digit divisor × 3-digit quotient = 4-digit dividend)
// All 8 positions use distinct digits from 1–9 (no zeros).
// Some digits are shown in boxes; student fills blanks using the listed pool.
// Divisor is always pre-given (shown). Blanks are among the 7 other positions.
// ═══════════════════════════════════════════════════════════════════════════════

const DD_TITLES = [
  'Digit Division — Beginner',
  'Digit Division — Intermediate',
  'Digit Division — Challenge',
];
const DD_DIRS = [
  'Use the given digits to make each division correct. Each puzzle has a unique solution.',
  'Use the given digits to make each division correct. Each puzzle has a unique solution.',
  'Use the given digits to make each division correct.',
];
const DD_CONFIGS = [
  { numBlanks:2, numPuz:9 },
  { numBlanks:3, numPuz:9 },
  { numBlanks:4, numPuz:9 },
];

// ── Pool of valid triples (lazy, cached) ──────────────────────────────────────
let DD_POOL = null;
function dd_buildPool() {
  if (DD_POOL) return DD_POOL;
  DD_POOL = [];
  for (let d = 2; d <= 9; d++) {
    for (let q = 100; q <= 999; q++) {
      const a = d * q;
      if (a > 9999) break;
      const digs = [
        d,
        (q/100|0), (q/10|0)%10, q%10,
        (a/1000|0), (a/100|0)%10, (a/10|0)%10, a%10
      ];
      // Only reject if leading digit is 0 (divisor/quotient hundreds/dividend thousands)
      // Interior zeros are fine and make interesting puzzles
      if (digs[4] === 0) continue; // dividend thousands can't be 0 (impossible anyway)
      if (new Set(digs).size !== 8) continue;
      DD_POOL.push({ d, q, a, digits: digs });
    }
  }
  return DD_POOL;
}

// ── Permutations of small arrays ──────────────────────────────────────────────
function dd_perms(arr) {
  if (arr.length <= 1) return [[...arr]];
  const r = [];
  for (let i = 0; i < arr.length; i++) {
    const rest = arr.filter((_, j) => j !== i);
    for (const p of dd_perms(rest)) r.push([arr[i], ...p]);
  }
  return r;
}

// ── Count/collect solutions for a given blank mask ────────────────────────────
// blanks: sorted array of position indices (0=divisor, 1-3=quotient, 4-7=dividend)
function dd_solutions(entry, blanks) {
  const givenSet = new Set(entry.digits.filter((_, i) => !blanks.includes(i)));
  const free     = entry.digits.filter(x => !givenSet.has(x));
  const sols     = [];
  for (const perm of dd_perms(free)) {
    const t = [...entry.digits];
    blanks.forEach((pos, i) => { t[pos] = perm[i]; });
    const tD = t[0], tQ = t[1]*100 + t[2]*10 + t[3];
    const tA = t[4]*1000 + t[5]*100 + t[6]*10 + t[7];
    if (tD * tQ === tA) { sols.push(t); if (sols.length > 2) return sols; }
  }
  return sols;
}

// ── Puzzle generator ──────────────────────────────────────────────────────────
function dd_genPuzzle(diff, usedKeys) {
  const cfg = DD_CONFIGS[diff];
  const pool = shuffle([...dd_buildPool()]);
  const positions = [1, 2, 3, 4, 5, 6, 7]; // positions that can be blank (not divisor)

  for (const entry of pool) {
    const key = entry.d + ',' + entry.q;
    if (usedKeys.has(key)) continue;
    for (let att = 0; att < 60; att++) {
      const blanks = shuffle([...positions]).slice(0, cfg.numBlanks).sort((a,b)=>a-b);
      // Require at least 1 quotient blank (pos 1-3) — makes puzzle more engaging
      if (!blanks.some(p => p <= 3)) continue;
      const sols = dd_solutions(entry, blanks);
      if (!sols.length || sols.length > 2) continue;
      if (diff < 2 && sols.length !== 1) continue; // beginner/intermediate: unique only
      usedKeys.add(key);
      return { ...entry, blanks, sols, numAnswers: sols.length };
    }
  }
  return null;
}

function dd_genSheet(diff) {
  const cfg = DD_CONFIGS[diff];
  const used = new Set();
  const puzzles = [];
  let attempts = 0;
  while (puzzles.length < cfg.numPuz && attempts < cfg.numPuz * 40) {
    attempts++;
    const p = dd_genPuzzle(diff, used);
    if (p) puzzles.push(p);
  }
  return puzzles;
}

// ── SVG layout ────────────────────────────────────────────────────────────────
const DD_PAGE_COLS = 3, DD_PAGE_ROWS = 3;
const DD_PUZ_W = 176, DD_PUZ_H = 162;
const DD_COL_GAP = 8, DD_ROW_GAP = 6, DD_MX = 8, DD_MY = 8;
const DD_SVG_W = DD_PAGE_COLS*DD_PUZ_W + (DD_PAGE_COLS-1)*DD_COL_GAP + 2*DD_MX;
const DD_SVG_H = DD_PAGE_ROWS*DD_PUZ_H + (DD_PAGE_ROWS-1)*DD_ROW_GAP + 2*DD_MY;

const DD_B = 27; // box size
const DD_S = 29; // box step (size + 2px gap)

function dd_renderPage(puzzles, isKey) {
  let s = `<svg viewBox="0 0 ${DD_SVG_W} ${DD_SVG_H}" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:auto;display:block">`;
  for (let i = 0; i < 9; i++) {
    const col = i%3, row = (i/3|0);
    s += dd_renderOne(
      puzzles[i]||null,
      DD_MX + col*(DD_PUZ_W+DD_COL_GAP),
      DD_MY + row*(DD_PUZ_H+DD_ROW_GAP),
      isKey, i+1
    );
  }
  return s + '</svg>';
}

function dd_renderOne(puz, px, py, isKey, num) {
  if (!puz) return `<text x="${px+DD_PUZ_W/2}" y="${py+DD_PUZ_H/2}" text-anchor="middle" font-family="Archivo,sans-serif" font-size="11" fill="#ccc">—</text>`;

  // Figure geometry
  // Total figure width: DD_B(divisor) + 7(bracket gap) + 4*DD_S−2(dividend) = 27+7+114 = 148
  const figW = DD_B + 7 + 4*DD_S - 2;
  const figX = px + ((DD_PUZ_W - figW) >> 1);
  const bracketX = figX + DD_B + 4;   // left edge of division bracket
  const a0X = bracketX + 3;           // left edge of first dividend box
  const q0X = a0X + DD_S;            // left edge of first quotient box (above a[1])

  const qY     = py + 24;             // quotient boxes top
  const lineY  = qY + DD_B + 4;       // horizontal division line
  const aY     = lineY + 4;           // dividend boxes top (= divisor top)
  const bottomY = aY + DD_B;          // bottom of dividend row

  let s = '';

  // Puzzle number
  s += `<text x="${px+5}" y="${py+13}" font-family="Archivo,sans-serif" font-size="11" fill="#999" font-weight="600">(${num})</text>`;

  // Dashed outer frame
  s += `<rect x="${px+4}" y="${py+16}" width="${DD_PUZ_W-8}" height="${DD_PUZ_H-20}" fill="none" stroke="#ddd" stroke-width="1" stroke-dasharray="5,3.5" rx="2"/>`;

  // Division bracket: horizontal line above dividend, vertical line at left
  s += `<line x1="${bracketX}" y1="${lineY}" x2="${a0X+4*DD_S-2}" y2="${lineY}" stroke="#1a1a1a" stroke-width="1.8"/>`;
  s += `<line x1="${bracketX}" y1="${lineY}" x2="${bracketX}" y2="${aY+DD_B+1}" stroke="#1a1a1a" stroke-width="1.8"/>`;

  // Helper: one digit box
  const box = (bx, by, val, keyAns) => {
    let r = `<rect x="${bx}" y="${by}" width="${DD_B}" height="${DD_B}" fill="white" stroke="#1a1a1a" stroke-width="1.7" rx="1"/>`;
    if (val !== null) {
      const fill = keyAns ? '#b83000' : '#1a1a1a';
      r += `<text x="${bx+DD_B/2}" y="${by+DD_B*0.74}" text-anchor="middle" font-family="Archivo,sans-serif" font-size="17" font-weight="800" fill="${fill}">${val}</text>`;
    }
    return r;
  };

  // Divisor box (pos 0 — always shown)
  s += box(figX, aY, puz.d, false);

  // Quotient boxes (pos 1,2,3) — above dividend positions 1,2,3
  for (let i = 0; i < 3; i++) {
    const blank = puz.blanks.includes(i+1);
    s += box(q0X + i*DD_S, qY,
      blank ? (isKey ? puz.sols[0][i+1] : null) : puz.digits[i+1],
      isKey && blank);
  }

  // Dividend boxes (pos 4,5,6,7)
  for (let i = 0; i < 4; i++) {
    const blank = puz.blanks.includes(i+4);
    s += box(a0X + i*DD_S, aY,
      blank ? (isKey ? puz.sols[0][i+4] : null) : puz.digits[i+4],
      isKey && blank);
  }

  // "uses all of" label
  const cx = px + DD_PUZ_W/2;
  s += `<text x="${cx}" y="${bottomY+13}" text-anchor="middle" font-family="Archivo,sans-serif" font-size="9.5" fill="#888">uses all of</text>`;

  // Digit list: given digits struck through, blanks bolded
  const allDigits = [...puz.digits].sort((a,b)=>a-b);
  const givenSet  = new Set(puz.digits.filter((_,i) => !puz.blanks.includes(i)));
  const parts = allDigits.map((d, i) => {
    const struck = givenSet.has(d);
    const comma  = i < allDigits.length-1 ? `<tspan fill="#999" font-weight="400">, </tspan>` : '';
    const stk    = struck ? ` text-decoration="line-through"` : '';
    const fill   = struck ? '#aaa' : '#1a1a1a';
    const wt     = struck ? '500'  : '800';
    return `<tspan${stk} fill="${fill}" font-weight="${wt}">${d}</tspan>${comma}`;
  }).join('');
  s += `<text x="${cx}" y="${bottomY+26}" text-anchor="middle" font-family="Archivo,sans-serif" font-size="13">${parts}</text>`;

  // "two answers" note
  if (puz.numAnswers > 1)
    s += `<text x="${cx}" y="${bottomY+41}" text-anchor="middle" font-family="Archivo,sans-serif" font-size="10" font-weight="700" fill="#b83000">two answers</text>`;

  return s;
}

// ── Sheet builders ────────────────────────────────────────────────────────────
function dd_sheetHTML(isKey, title) {
  const badge = isKey ? `<span class="key-badge">ANSWER KEY</span>` : '';
  return `<div class="sheet narrow">

}
