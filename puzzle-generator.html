<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Puzzle Generator — Facts on Fire</title>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Archivo:wght@400;500;600;700;800&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#FAFAF7;--surf:#FFF;--ink:#0E1117;--ink2:#3A4150;
  --muted:#8A94A0;--border:#E4E6EA;
  --fire:#FF4F00;--fire2:#FF9000;--ember:#FFF0E8;
  --teal:#007A6E;--teal-lt:#E6F4F2;
  --blue:#1B4FCC;--blue-lt:#EBF0FF;
  --purple:#7C3FA0;--purple-lt:#F2EAF9;
  --r:12px;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Archivo',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh}

/* Header */
header{background:var(--ink);padding:0 28px;border-bottom:3px solid var(--fire);position:sticky;top:0;z-index:100}
.hdr{max-width:1300px;margin:0 auto;display:flex;align-items:center;gap:12px;height:54px}
.logo{font-family:'Archivo Black',sans-serif;font-size:17px;color:#fff;display:flex;align-items:center;gap:7px;text-decoration:none}
.logo em{color:var(--fire);font-style:normal}
.sep{color:#444;font-size:18px}
.sub{font-size:14px;color:#aaa;font-weight:500}
.back{margin-left:auto;color:#aaa;font-size:12px;font-weight:600;text-decoration:none;padding:5px 12px;border:1px solid #333;border-radius:6px;transition:.15s}
.back:hover{color:#fff;border-color:#666}

/* Page layout */
.wrap{max-width:1300px;margin:0 auto;padding:20px;display:grid;grid-template-columns:280px 1fr;gap:20px;align-items:start}

/* Sidebar */
.sb{background:var(--surf);border:1px solid var(--border);border-radius:var(--r);padding:18px 16px;display:flex;flex-direction:column;gap:16px;position:sticky;top:74px}
.sb-label{font-size:10px;font-weight:700;letter-spacing:1.3px;text-transform:uppercase;color:var(--muted);margin-bottom:8px;display:block}

.type-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.tbtn{background:var(--bg);border:2px solid var(--border);border-radius:9px;padding:10px 6px;cursor:pointer;text-align:center;transition:.15s;font-family:'Archivo',sans-serif}
.tbtn:hover{border-color:var(--fire);background:var(--ember)}
.tbtn.on{background:var(--ember);border-color:var(--fire)}
.tbtn .ico{font-size:22px;display:block;margin-bottom:4px}
.tbtn .lbl{font-size:10.5px;font-weight:700;color:var(--ink2);line-height:1.2}
.tbtn.on .lbl{color:var(--fire)}

.diffs{display:flex;flex-direction:column;gap:4px}
.diffs label{display:flex;align-items:flex-start;gap:8px;cursor:pointer;font-size:12.5px;padding:6px 8px;border-radius:7px;transition:.1s;line-height:1.35}
.diffs label:hover{background:var(--bg)}
.diffs input[type=radio]{accent-color:var(--fire);margin-top:2px;flex-shrink:0}
.dl{font-weight:700}.dd{color:var(--muted)}

.count-row{display:flex;gap:6px}
.cbtn{flex:1;padding:7px 0;border:2px solid var(--border);border-radius:7px;background:var(--bg);font-family:'Archivo',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:.15s;color:var(--ink)}
.cbtn:hover{border-color:var(--fire)}
.cbtn.on{background:var(--fire);border-color:var(--fire);color:#fff}

.title-inp{width:100%;padding:7px 10px;border:1px solid var(--border);border-radius:7px;font-family:'Archivo',sans-serif;font-size:13px;background:var(--bg);color:var(--ink)}
.title-inp:focus{outline:none;border-color:var(--fire)}
.hint{font-size:10.5px;color:var(--muted);margin-top:4px}

.btn-gen{background:var(--fire);color:#fff;border:none;border-radius:9px;padding:12px 16px;font-family:'Archivo Black',sans-serif;font-size:14px;cursor:pointer;width:100%;transition:.15s;letter-spacing:.3px}
.btn-gen:hover{background:#e03900}
.btn-gen:active{transform:scale(.98)}

.print-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
.pbtn{padding:9px 4px;border-radius:7px;font-family:'Archivo',sans-serif;font-size:11px;font-weight:700;cursor:pointer;border:2px solid;background:var(--surf);transition:.15s;display:flex;flex-direction:column;align-items:center;gap:3px}
.pbtn span{font-size:16px}
.pbtn.ps{border-color:var(--teal);color:var(--teal)}.pbtn.ps:hover{background:var(--teal-lt)}
.pbtn.pk{border-color:var(--blue);color:var(--blue)}.pbtn.pk:hover{background:var(--blue-lt)}
.pbtn.pb{border-color:var(--purple);color:var(--purple)}.pbtn.pb:hover{background:var(--purple-lt)}

.sb-div{border:none;border-top:1px solid var(--border);margin:0 -4px}

/* Preview */
.preview{background:var(--surf);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.pv-top{padding:11px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--bg)}
.pv-top h3{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--ink2)}
.view-tog{display:flex;gap:4px}
.vtbtn{padding:4px 12px;border-radius:5px;font-size:11.5px;font-weight:700;cursor:pointer;border:1.5px solid var(--border);background:#fff;font-family:'Archivo',sans-serif;transition:.1s}
.vtbtn.on{background:var(--ink);color:#fff;border-color:var(--ink)}
.pv-body{padding:24px 20px;background:#E8E8E2;min-height:500px;display:flex;justify-content:center;align-items:flex-start}

/* Puzzle sheet */
.sheet{background:#fff;border:1px solid #ccc;border-radius:3px;padding:28px 32px 32px;box-shadow:0 2px 16px rgba(0,0,0,.12);width:100%;max-width:720px;font-family:'Nunito',sans-serif}
.sh-hdr{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px}
.sh-title{font-size:21px;font-weight:800;color:#1a1a1a}
.sh-src{font-size:11px;font-weight:700;color:#aaa;letter-spacing:.4px}
.sh-dir{font-size:13px;font-weight:700;color:#333;padding-bottom:10px;border-bottom:2px solid #e0e0e0;margin-bottom:18px}
.key-badge{display:inline-block;background:#1B4FCC;color:#fff;font-size:10px;font-weight:800;letter-spacing:.5px;padding:2px 8px;border-radius:3px;margin-left:8px;vertical-align:middle}
.pg{display:grid;gap:16px}
.pc{border:2.5px solid #2a2a2a;border-radius:8px;padding:18px 14px;display:flex;align-items:center;justify-content:center;position:relative;min-height:150px}
.pc-n{font-size:10px;font-weight:800;color:#ccc;position:absolute;top:7px;left:9px}

/* Cross-Number */
table.cn{border-collapse:collapse}
table.cn td{text-align:center;vertical-align:middle;padding:0;height:50px}
.cn-num{width:68px;font-size:22px;font-weight:800;color:#1a1a1a}
.cn-op{width:28px;font-size:22px;font-weight:800;color:#1a1a1a}
.cn-mop{height:12px!important;font-size:14px;font-weight:800;color:#bbb;width:28px}
.cn-given{width:76px;font-size:22px;font-weight:800;color:#1a1a1a}
.cn-miss{width:68px}
.cn-ans{width:76px}
.miss-box{display:inline-block;width:60px;height:36px;border:2px solid #555;border-radius:4px;background:#f5f5f5}
.ans-box{display:inline-block;width:66px;height:36px;border:2px solid #555;border-radius:4px}
.miss-box.show,.ans-box.show{background:#fff8f5;border-color:#FF4F00;display:inline-flex;align-items:center;justify-content:center;font-size:19px;font-weight:800;color:#b83000}

/* Two-Out */
.to-wrap{text-align:center}
table.to{border-collapse:separate;border-spacing:5px;margin:0 auto}
table.to td{width:52px;height:52px;text-align:center;vertical-align:middle;font-size:22px;font-weight:800;border-radius:6px;background:#efefef;position:relative}
table.to td.cx{background:#ffe5e5;color:#ccc}
.cx-mark{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:900;color:#cc2200;line-height:1}
.to-target{margin-top:9px;font-size:12px;font-weight:700;color:#555}
.to-target strong{color:#1a1a1a;font-size:14px}

/* Cryptarithm */
.cr-wrap{display:inline-block;text-align:center}
table.cr{border-collapse:collapse;margin:0 auto}
table.cr td{width:30px;height:34px;text-align:center;vertical-align:middle;font-size:21px;font-weight:800;color:#1a1a1a}
.cr-bar{border-top:2.5px solid #1a1a1a;margin:2px auto 0}
.cr-box{display:inline-flex;align-items:center;justify-content:center;width:24px;height:28px;border-radius:3px;font-size:14px;font-weight:800}
.cr-blank{background:#fff;border:1.5px solid #aaa;color:#ccc}
.cr-filled{background:#fff8f5;border:1.5px solid #FF4F00;color:#b83000}
.cr-blanks{margin-top:11px;text-align:center;font-size:12px;font-weight:700}
.cr-eq{margin:0 10px;display:inline-flex;align-items:center;gap:4px}
.cr-line{display:inline-block;width:22px;border-bottom:1.5px solid #333;margin-bottom:1px}

/* Mismo */
.ms-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:4px}
.ms-cell{display:flex;align-items:center;justify-content:center;height:40px}
.ms-num{width:32px;height:30px;background:#efefef;border-radius:5px;border:1.5px solid #ccc;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800}
.ms-circ{width:26px;height:26px;border-radius:50%;border:1.5px solid #666;background:#fff;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;color:transparent}
.ms-circ.show{color:#b83000}
</style>
</head>
<body>

<header>
  <div class="hdr">
    <a href="index.html" class="logo">🔥 <em>Facts on Fire</em></a>
    <span class="sep">|</span>
    <span class="sub">Puzzle Generator</span>
    <a href="index.html" class="back">← Back to Hub</a>
  </div>
</header>

<div class="wrap">

  <!-- Sidebar -->
  <aside class="sb">

    <div>
      <span class="sb-label">Puzzle Type</span>
      <div class="type-grid">
        <button class="tbtn on" data-type="crossnumber" onclick="selType(this)">
          <span class="ico">➕</span><span class="lbl">Cross-Number</span>
        </button>
        <button class="tbtn" data-type="mismo" onclick="selType(this)">
          <span class="ico">⭕</span><span class="lbl">Mismo</span>
        </button>
        <button class="tbtn" data-type="twoout" onclick="selType(this)">
          <span class="ico">✕</span><span class="lbl">Two-Out</span>
        </button>
        <button class="tbtn" data-type="crypto" onclick="selType(this)">
          <span class="ico">🔤</span><span class="lbl">Cryptarithms</span>
        </button>
      </div>
    </div>

    <hr class="sb-div">

    <div>
      <span class="sb-label">Difficulty</span>
      <div class="diffs" id="diff-opts"></div>
    </div>

    <hr class="sb-div">

    <div>
      <span class="sb-label">Number of Puzzles</span>
      <div class="count-row">
        <button class="cbtn" data-n="2" onclick="selCount(this)">2</button>
        <button class="cbtn on" data-n="4" onclick="selCount(this)">4</button>
        <button class="cbtn" data-n="6" onclick="selCount(this)">6</button>
        <button class="cbtn" data-n="8" onclick="selCount(this)">8</button>
      </div>
    </div>

    <hr class="sb-div">

    <div>
      <span class="sb-label">Custom Title <span style="font-weight:400;text-transform:none;letter-spacing:0;color:var(--muted)">(optional)</span></span>
      <input class="title-inp" id="pg-title" type="text" placeholder="e.g. Week 3 — Bell Ringer">
      <div class="hint">Leave blank to use the default puzzle name.</div>
    </div>

    <hr class="sb-div">

    <button class="btn-gen" onclick="generate()">↻&ensp;Generate New Puzzles</button>

    <hr class="sb-div">

    <div>
      <span class="sb-label">Print / Save PDF</span>
      <div class="print-grid">
        <button class="pbtn ps" onclick="doPrint('student')"><span>🖨</span>Student</button>
        <button class="pbtn pk" onclick="doPrint('key')"><span>🗝</span>Key</button>
        <button class="pbtn pb" onclick="doPrint('both')"><span>📋</span>Both</button>
      </div>
      <div class="hint" style="margin-top:6px">Opens print dialog — use "Save as PDF".</div>
    </div>

  </aside>

  <!-- Preview -->
  <div class="preview">
    <div class="pv-top">
      <h3>Preview</h3>
      <div class="view-tog">
        <button class="vtbtn on" id="vt-s" onclick="setView('student')">Student</button>
        <button class="vtbtn" id="vt-k" onclick="setView('key')">Answer Key</button>
      </div>
    </div>
    <div class="pv-body">
      <div id="out" style="width:100%;max-width:720px"></div>
    </div>
  </div>

</div>

<script>
'use strict';
// ─── State ───────────────────────────────────────────────────
let TYPE='crossnumber', DIFF=0, COUNT=4, PUZZLES=[], SHOW_KEY=false, cryptoPool=null;

// ─── Config ──────────────────────────────────────────────────
const DIFFS={
  crossnumber:[
    {l:'Beginner',    d:'Single-digit addends, 1–9'},
    {l:'Grade Level', d:'2-digit, no regrouping'},
    {l:'Challenge',   d:'2-digit, with regrouping'},
    {l:'Advanced',    d:'3-digit addends'},
  ],
  mismo:[
    {l:'Beginner',    d:'Values 1–5'},
    {l:'Grade Level', d:'Values 1–10'},
    {l:'Challenge',   d:'Values 1–15'},
  ],
  twoout:[
    {l:'Beginner',    d:'Target 3–8, values 1–4'},
    {l:'Grade Level', d:'Target 5–14, values 1–8'},
    {l:'Challenge',   d:'Target 8–20, values 1–12'},
  ],
  crypto:[
    {l:'Beginner',    d:'Same tens digit (A? + A? = BA)'},
    {l:'Grade Level', d:'Shifting letter (A? + ?A = B?)'},
    {l:'Challenge',   d:'Two unknowns (AB + A? = BA)'},
  ],
};
const DIRS={
  crossnumber:'Complete each Cross-Number Puzzle. Find the missing addend, then fill in all remaining sums.',
  mismo:'Fill each empty circle with +, −, or = so every row and column forms a true equation reading left-to-right and top-to-bottom.',
  twoout:'Cross out exactly two numbers so that the remaining numbers in every row and column add up to the target sum.',
  crypto:'Find the digit each letter stands for. Each letter represents a different digit.',
};
const PTITLES={crossnumber:'Cross-Number Puzzles',mismo:'Mismo Puzzles',twoout:'Two-Out Puzzles',crypto:'Cryptarithms'};

// ─── Utilities ───────────────────────────────────────────────
const ri=(a,b)=>Math.floor(Math.random()*(b-a+1))+a;
const eh=s=>s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

// ─── CROSS-NUMBER ────────────────────────────────────────────
function noReg(a,b){return(a%10)+(b%10)<10&&Math.floor(a/10)+Math.floor(b/10)<10}
function hasReg(a,b){return(a%10)+(b%10)>=10||Math.floor(a/10)+Math.floor(b/10)>=10}

function genCN(lv){
  for(let t=0;t<200000;t++){
    let a,b,c,d;
    if(lv===0){a=ri(1,9);b=ri(1,9);c=ri(1,9);d=ri(1,9);}
    else if(lv===1){
      a=ri(11,48);b=ri(11,48);c=ri(11,48);d=ri(11,48);
      if(!noReg(a,b)||!noReg(c,d)||!noReg(a,c)||!noReg(b,d))continue;
    }else if(lv===2){
      a=ri(13,78);b=ri(13,78);c=ri(13,78);d=ri(13,78);
      if(!hasReg(a,b)&&!hasReg(c,d))continue;
    }else{a=ri(102,450);b=ri(102,450);c=ri(102,450);d=ri(102,450);}
    const R1=a+b,R2=c+d,C1=a+c,C2=b+d,Tot=R1+R2;
    const m=ri(0,3);
    // Give the row sum that directly constrains the missing addend
    let hintSlot;
    if(m===0||m===1)hintSlot='R1';
    else if(m===2)hintSlot='R2';
    else hintSlot='C2';
    return{a,b,c,d,R1,R2,C1,C2,Tot,m,hintSlot};
  }
  return null;
}

function renderCN(p,key){
  const{a,b,c,d,R1,R2,C1,C2,Tot,m,hintSlot}=p;
  const num=v=>`<td class="cn-num">${v}</td>`;
  const miss=v=>key?`<td class="cn-miss"><span class="miss-box show">${v}</span></td>`:`<td class="cn-miss"><span class="miss-box"></span></td>`;
  const givenSum=v=>`<td class="cn-given">${v}</td>`;
  const ansBox=v=>key?`<td class="cn-ans"><span class="ans-box show">${v}</span></td>`:`<td class="cn-ans"><span class="ans-box"></span></td>`;
  const ansSlot=(v,slot)=>slot===hintSlot?givenSum(v):ansBox(v);
  const op=s=>`<td class="cn-op">${s}</td>`;
  const mop=s=>`<td class="cn-mop">${s}</td>`;
  const spa=()=>`<td class="cn-mop"></td>`;
  return`<table class="cn">
    <tr>${m===0?miss(a):num(a)}${op('+')}${m===1?miss(b):num(b)}${op('=')}${ansSlot(R1,'R1')}</tr>
    <tr>${mop('+')}${spa()}${mop('+')}${spa()}${mop('+')}</tr>
    <tr>${m===2?miss(c):num(c)}${op('+')}${m===3?miss(d):num(d)}${op('=')}${ansSlot(R2,'R2')}</tr>
    <tr>${mop('=')}${spa()}${mop('=')}${spa()}${mop('=')}</tr>
    <tr>${ansSlot(C1,'C1')}${op('+')}${ansSlot(C2,'C2')}${op('=')}${ansSlot(Tot,'Tot')}</tr>
  </table>`;
}

// ─── TWO-OUT ─────────────────────────────────────────────────
const VP2=[];
(()=>{for(let r1=0;r1<3;r1++)for(let c1=0;c1<3;c1++)for(let r2=r1+1;r2<3;r2++)for(let c2=0;c2<3;c2++)if(c1!==c2)VP2.push([[r1,c1],[r2,c2]]);})();

function solve2Out(g,T){
  const sols=[];
  for(const[[r1,c1],[r2,c2]]of VP2){
    let ok=true;
    for(let r=0;r<3&&ok;r++){let s=0;for(let c=0;c<3;c++)if(!(r===r1&&c===c1)&&!(r===r2&&c===c2))s+=g[r][c];if(s!==T)ok=false;}
    for(let c=0;c<3&&ok;c++){let s=0;for(let r=0;r<3;r++)if(!(r===r1&&c===c1)&&!(r===r2&&c===c2))s+=g[r][c];if(s!==T)ok=false;}
    if(ok)sols.push([[r1,c1],[r2,c2]]);
  }
  return sols;
}

function gen2Out(lv){
  const cfgs=[[3,8,1,4],[5,14,1,8],[8,20,1,12]];
  const[Tlo,Thi,Vlo,Vhi]=cfgs[lv];
  for(let t=0;t<500000;t++){
    const T=ri(Tlo,Thi);
    const g=Array.from({length:3},()=>Array.from({length:3},()=>ri(Vlo,Vhi)));
    const sols=solve2Out(g,T);
    if(sols.length!==1)continue;
    const cx=new Set(sols[0].map(([r,c])=>`${r},${c}`));
    const rows=new Set();
    for(let r=0;r<3;r++){const k=[0,1,2].filter(c=>!cx.has(`${r},${c}`)).map(c=>g[r][c]).sort().join(',');rows.add(k);}
    if(rows.size<2)continue;
    return{grid:g,T,sol:sols[0]};
  }
  return null;
}

function render2Out(p,key){
  const{grid,T,sol}=p;
  const cx=key?new Set(sol.map(([r,c])=>`${r},${c}`)):new Set();
  let h=`<div class="to-wrap"><table class="to">`;
  for(let r=0;r<3;r++){
    h+='<tr>';
    for(let c=0;c<3;c++){
      const isCx=cx.has(`${r},${c}`);
      h+=`<td class="${isCx?'cx':''}">${grid[r][c]}${isCx?'<span class="cx-mark">✕</span>':''}</td>`;
    }
    h+='</tr>';
  }
  h+=`</table><div class="to-target">Target Sum: <strong>${T}</strong></div></div>`;
  return h;
}

// ─── CRYPTARITHMS ────────────────────────────────────────────
function solveCrypto(top,bot,res){
  const ls=[...new Set([...top,...bot,...res].filter(x=>typeof x==='string'))].sort();
  if(ls.length>2)return[];
  const vr=(row,a)=>row.reduce((n,x)=>n*10+(typeof x==='number'?x:a[x]),0);
  const sols=[];
  for(let d0=0;d0<=9;d0++){
    const try1=(asn)=>{if([top,bot,res].some(r=>typeof r[0]==='string'&&asn[r[0]]===0))return;if(vr(top,asn)+vr(bot,asn)===vr(res,asn))sols.push({...asn});};
    if(ls.length===1){try1({[ls[0]]:d0});}
    else{for(let d1=0;d1<=9;d1++){if(d0!==d1)try1({[ls[0]]:d0,[ls[1]]:d1});}}
  }
  return sols;
}

function buildCryptoPool(){
  const pool=[],seen=new Set();
  function tryAdd(top,bot,res,typ){
    const k=JSON.stringify([top,bot,res]);if(seen.has(k))return;
    const sols=solveCrypto(top,bot,res);if(sols.length!==1)return;
    seen.add(k);pool.push({top,bot,res,assign:sols[0],typ});
  }
  for(let o1=0;o1<=9;o1++)for(let o2=0;o2<=9;o2++)tryAdd(['A',o1],['A',o2],['B','A'],1);
  for(let o1=1;o1<=9;o1++)for(let t2=1;t2<=9;t2++)for(let or=0;or<=9;or++)tryAdd(['A',o1],[t2,'A'],['B',or],2);
  for(let o2=0;o2<=9;o2++)tryAdd(['A','B'],['A',o2],['B','A'],3);
  for(let t2=1;t2<=9;t2++)tryAdd(['A','B'],[t2,'B'],['B','A'],4);
  return pool;
}

function pickCrypto(lv,usedSet){
  if(!cryptoPool)cryptoPool=buildCryptoPool();
  const typs=lv===0?[1]:lv===1?[1,2]:[2,3,4];
  let cands=cryptoPool.filter(p=>typs.includes(p.typ)&&!usedSet.has(JSON.stringify([p.top,p.bot,p.res])));
  if(!cands.length)cands=cryptoPool.filter(p=>!usedSet.has(JSON.stringify([p.top,p.bot,p.res])));
  if(!cands.length)return null;
  const p=cands[ri(0,cands.length-1)];
  usedSet.add(JSON.stringify([p.top,p.bot,p.res]));return p;
}

function renderCrypto(p,key){
  const{top,bot,res,assign}=p;
  const n=Math.max(top.length,bot.length,res.length);
  const pad=r=>[...Array(n-r.length).fill(null),...r];
  const[tP,bP,rP]=[pad(top),pad(bot),pad(res)];
  const cell=v=>{
    if(v===null)return`<td style="width:30px;height:34px;visibility:hidden">0</td>`;
    if(typeof v==='string'){
      const cls=key?'cr-box cr-filled':'cr-box cr-blank';
      return`<td style="width:30px;height:34px;text-align:center"><span class="${cls}">${key?assign[v]:v}</span></td>`;
    }
    return`<td style="width:30px;height:34px;text-align:center;font-size:21px;font-weight:800">${v}</td>`;
  };
  const tw=22+n*30;
  const ls=[...new Set([...top,...bot,...res].filter(x=>typeof x==='string'))].sort();
  const blanks=ls.map(l=>key
    ?`<span class="cr-eq">${l} = <strong style="color:#b83000">${assign[l]}</strong></span>`
    :`<span class="cr-eq">${l} = <span class="cr-line"></span></span>`).join('');
  return`<div class="cr-wrap">
    <table class="cr"><tr><td style="width:22px;height:34px"></td>${tP.map(cell).join('')}</tr>
    <tr><td style="width:22px;height:34px;text-align:center;font-size:21px;font-weight:800">+</td>${bP.map(cell).join('')}</tr></table>
    <div class="cr-bar" style="width:${tw}px"></div>
    <table class="cr"><tr><td style="width:22px;height:34px"></td>${rP.map(cell).join('')}</tr></table>
    <div class="cr-blanks">${blanks}</div>
  </div>`;
}

// ─── MISMO ───────────────────────────────────────────────────
const MC=[];
(()=>{
  for(const o00 of['+','-','='])for(const o01 of['+','-','='])
  for(const o10 of['+','-','='])for(const o11 of['+','-','=']){
    if([o00,o01].filter(x=>x==='=').length===1&&[o10,o11].filter(x=>x==='=').length===1&&
       [o00,o10].filter(x=>x==='=').length===1&&[o01,o11].filter(x=>x==='=').length===1)
      MC.push([o00,o01,o10,o11]);
  }
})();
const mET=(a,p,b,q,c)=>p==='='&&q!=='='?a===(q==='+'?b+c:b-c):p!=='='&&q==='='?(p==='+'?a+b:a-b)===c:false;
const mCA=(ops,a,b,c,d,e,f,v1t,v1m,v1b,v2t,v2m,v2b)=>{
  const[o00,o01,o10,o11]=ops;
  return mET(a,o00,b,o01,c)&&mET(d,o10,e,o11,f)&&mET(v1t,o00,v1m,o10,v1b)&&mET(v2t,o01,v2m,o11,v2b);
};

function genMismo(lv){
  const rngs=[[1,5],[1,10],[1,15]];const[lo,hi]=rngs[lv];
  for(let t=0;t<300000;t++){
    const ops=MC[ri(0,MC.length-1)];const[o00,o01,o10,o11]=ops;
    const a=ri(lo,hi),b=ri(lo,hi),d=ri(lo,hi),e=ri(lo,hi);
    let c=o01==='='?(o00==='+'?a+b:a-b):(o01==='+'?a-b:b-a);
    let f=o11==='='?(o10==='+'?d+e:d-e):(o11==='+'?d-e:e-d);
    if(c<lo||c>hi||f<lo||f>hi)continue;
    const v1t=ri(lo,hi),v1m=ri(lo,hi),v2t=ri(lo,hi),v2m=ri(lo,hi);
    let v1b=o10==='='?(o00==='+'?v1t+v1m:v1t-v1m):(o10==='+'?v1t-v1m:v1m-v1t);
    let v2b=o11==='='?(o01==='+'?v2t+v2m:v2t-v2m):(o11==='+'?v2t-v2m:v2m-v2t);
    if(v1b<lo||v1b>hi||v2b<lo||v2b>hi)continue;
    if(!mCA(ops,a,b,c,d,e,f,v1t,v1m,v1b,v2t,v2m,v2b))continue;
    if(MC.some(alt=>!alt.every((op,i)=>op===ops[i])&&mCA(alt,a,b,c,d,e,f,v1t,v1m,v1b,v2t,v2m,v2b)))continue;
    return{ops,a,b,c,d,e,f,v1t,v1m,v1b,v2t,v2m,v2b};
  }
  return null;
}

function renderMismo(p,key){
  const{ops,a,b,c,d,e,f,v1t,v1m,v1b,v2t,v2m,v2b}=p;
  const[o00,o01,o10,o11]=ops;
  const N=v=>`<div class="ms-num">${v}</div>`;
  const C=op=>`<div class="ms-circ${key?' show':''}">${key?(op==='-'?'−':op):''}</div>`;
  const E=()=>`<div></div>`;
  // 5×5 grid: [emp,v1t,emp,v2t,emp], [a,O00,b,O01,c], [emp,v1m,emp,v2m,emp], [d,O10,e,O11,f], [emp,v1b,emp,v2b,emp]
  const rows=[[E(),N(v1t),E(),N(v2t),E()],[N(a),C(o00),N(b),C(o01),N(c)],[E(),N(v1m),E(),N(v2m),E()],[N(d),C(o10),N(e),C(o11),N(f)],[E(),N(v1b),E(),N(v2b),E()]];
  return`<div class="ms-grid" style="width:210px">${rows.flatMap(r=>r.map(cell=>`<div class="ms-cell">${cell}</div>`)).join('')}</div>`;
}

// ─── Build page HTML ─────────────────────────────────────────
function renderPuz(p,key){
  if(TYPE==='crossnumber')return renderCN(p,key);
  if(TYPE==='twoout')return render2Out(p,key);
  if(TYPE==='crypto')return renderCrypto(p,key);
  if(TYPE==='mismo')return renderMismo(p,key);
  return'';
}

function buildSheet(isKey){
  const title=document.getElementById('pg-title').value.trim()||PTITLES[TYPE];
  const cols=COUNT<=4?2:COUNT<=6?3:4;
  const minH={crossnumber:165,twoout:165,crypto:165,mismo:210}[TYPE]||165;
  const badge=isKey?`<span class="key-badge">ANSWER KEY</span>`:'';
  const cells=PUZZLES.map((p,i)=>`<div class="pc" style="min-height:${minH}px"><div class="pc-n">${i+1}</div>${renderPuz(p,isKey)}</div>`).join('');
  return`<div class="sheet">
    <div class="sh-hdr"><div class="sh-title">${eh(title)}${badge}</div><div class="sh-src">M.I.N.D. — Facts on Fire</div></div>
    <div class="sh-dir">${DIRS[TYPE]}</div>
    <div class="pg" style="grid-template-columns:repeat(${cols},1fr)">${cells}</div>
  </div>`;
}

// ─── Generate ────────────────────────────────────────────────
function generate(){
  if(TYPE==='crypto'&&!cryptoPool){
    document.getElementById('out').innerHTML=`<div style="padding:60px;text-align:center;color:#888;font-weight:600">Building puzzle bank…</div>`;
    cryptoPool=buildCryptoPool();
  }
  const used=new Set();
  PUZZLES=[];
  for(let i=0;i<COUNT;i++){
    let p=null;
    if(TYPE==='crossnumber')p=genCN(DIFF);
    else if(TYPE==='twoout')p=gen2Out(DIFF);
    else if(TYPE==='crypto')p=pickCrypto(DIFF,used);
    else if(TYPE==='mismo')p=genMismo(DIFF);
    if(p)PUZZLES.push(p);
  }
  refresh();
}

function refresh(){
  document.getElementById('out').innerHTML=PUZZLES.length
    ?buildSheet(SHOW_KEY)
    :`<div style="padding:60px;text-align:center;color:#888;font-weight:600">No puzzles generated — try again.</div>`;
}

// ─── Print ───────────────────────────────────────────────────
function doPrint(mode){
  const title=document.getElementById('pg-title').value.trim()||PTITLES[TYPE];
  let css='';
  for(const s of document.styleSheets){try{for(const r of s.cssRules)css+=r.cssText+'\n';}catch(e){}}
  const stu=mode!=='key'?buildSheet(false):'';
  const key=mode!=='student'?buildSheet(true):'';
  const pb=stu&&key?'<div style="page-break-before:always"></div>':'';
  const w=window.open('','_blank','width=900,height=1100');
  w.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>${eh(title)}</title>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Archivo:wght@400;600;700;800&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
    <style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Archivo',sans-serif;padding:24px;background:#fff}
    ${css}
    .sheet{box-shadow:none!important;border:none!important;max-width:100%!important;padding:18px 22px 24px}
    @media print{*{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}body{padding:10px}}
    </style></head><body>${stu}${pb}${key}
    <script>document.fonts.ready.then(()=>setTimeout(()=>window.print(),350));<\/script>
    </body></html>`);
  w.document.close();
}

// ─── UI ──────────────────────────────────────────────────────
function selType(btn){
  document.querySelectorAll('.tbtn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');TYPE=btn.dataset.type;DIFF=0;buildDiffUI();generate();
}
function selCount(btn){
  document.querySelectorAll('.cbtn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');COUNT=parseInt(btn.dataset.n);generate();
}
function setView(v){
  SHOW_KEY=v==='key';
  document.getElementById('vt-s').classList.toggle('on',!SHOW_KEY);
  document.getElementById('vt-k').classList.toggle('on',SHOW_KEY);
  refresh();
}
function buildDiffUI(){
  document.getElementById('diff-opts').innerHTML=DIFFS[TYPE].map((d,i)=>`
    <label><input type="radio" name="diff" value="${i}" ${i===DIFF?'checked':''}
      onchange="DIFF=${i};generate()">
    <span><span class="dl">${d.l}</span>&ensp;<span class="dd">${d.d}</span></span></label>`).join('');
}

// Init
buildDiffUI();
requestAnimationFrame(()=>setTimeout(()=>{cryptoPool=buildCryptoPool();},100));
generate();
</script>
