// ─── SKIP-COUNTING CROSSWORDS ────────────────────────────────
// Each puzzle: {cells, rows, cols}
// cells map 'r,c' -> {v:number, given:bool}; missing keys = void/spacer cell
function sc_ri(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function sc_pick(arr){return arr[sc_ri(0,arr.length-1)];}

// PLUS: horizontal row at row=2, vertical col at col=2, 5×5
function scGenPlus(diff){
  const SKIP=[[2,5],[3,8],[4,12]][diff];
  for(let t=0;t<60;t++){
    const rs=sc_ri(SKIP[0],SKIP[1]),cs=sc_ri(SKIP[0],SKIP[1]);
    const rStart=sc_ri(1,4)*rs,inter=rStart+2*rs,cStart=inter-2*cs;
    if(cStart<=0)continue;
    const cells={};
    for(let j=0;j<5;j++)cells[`2,${j}`]={v:rStart+j*rs,given:false};
    for(let i=0;i<5;i++)if(i!==2)cells[`${i},2`]={v:cStart+i*cs,given:false};
    if(diff===0)[[2,0],[2,1],[0,2],[1,2]].forEach(([r,c])=>cells[`${r},${c}`].given=true);
    else if(diff===1)[[2,0],[2,4],[0,2],[4,2]].forEach(([r,c])=>cells[`${r},${c}`].given=true);
    else[[2,0],[2,2],[0,2],[3,2]].forEach(([r,c])=>cells[`${r},${c}`].given=true);
    return{cells,rows:5,cols:5};
  }return null;
}
// T-DOWN: row at row=0 (len 5), col from (0,2) to (3,2)
function scGenTDown(diff){
  const SKIP=[[2,5],[3,8],[4,12]][diff];
  for(let t=0;t<60;t++){
    const rs=sc_ri(SKIP[0],SKIP[1]),cs=sc_ri(SKIP[0],SKIP[1]);
    const rStart=sc_ri(1,4)*rs,inter=rStart+2*rs,cStart=inter;
    const cells={};
    for(let j=0;j<5;j++)cells[`0,${j}`]={v:rStart+j*rs,given:false};
    for(let i=1;i<4;i++)cells[`${i},2`]={v:cStart+i*cs,given:false};
    if(diff===0)[[0,0],[0,1],[1,2],[2,2]].forEach(([r,c])=>cells[`${r},${c}`].given=true);
    else[[0,0],[0,4],[1,2],[3,2]].forEach(([r,c])=>cells[`${r},${c}`].given=true);
    return{cells,rows:4,cols:5};
  }return null;
}
// L-RIGHT: row at row=0 (len 5), col at col=4 rows 0-3
function scGenLRight(diff){
  const SKIP=[[2,5],[3,8]][Math.min(diff,1)];
  for(let t=0;t<60;t++){
    const rs=sc_ri(SKIP[0],SKIP[1]),cs=sc_ri(SKIP[0],SKIP[1]);
    const rStart=sc_ri(1,3)*rs,inter=rStart+4*rs,cStart=inter;
    const cells={};
    for(let j=0;j<5;j++)cells[`0,${j}`]={v:rStart+j*rs,given:false};
    for(let i=1;i<4;i++)cells[`${i},4`]={v:cStart+i*cs,given:false};
    if(diff===0)[[0,0],[0,1],[1,4],[2,4]].forEach(([r,c])=>cells[`${r},${c}`].given=true);
    else[[0,0],[0,2],[2,4],[3,4]].forEach(([r,c])=>cells[`${r},${c}`].given=true);
    return{cells,rows:4,cols:5};
  }return null;
}
// L-BOTTOM: col at col=0 rows 0-3, row at row=3 len 5
function scGenLBottom(diff){
  const SKIP=[[2,5],[3,8]][Math.min(diff,1)];
  for(let t=0;t<60;t++){
    const rs=sc_ri(SKIP[0],SKIP[1]),cs=sc_ri(SKIP[0],SKIP[1]);
    const cStart=sc_ri(2,5)*cs,inter=cStart+3*cs,rStart=inter;
    const cells={};
    for(let i=0;i<4;i++)cells[`${i},0`]={v:cStart+i*cs,given:false};
    for(let j=1;j<5;j++)cells[`3,${j}`]={v:rStart+j*rs,given:false};
    if(diff===0)[[0,0],[1,0],[3,2],[3,3]].forEach(([r,c])=>cells[`${r},${c}`].given=true);
    else[[0,0],[2,0],[3,1],[3,4]].forEach(([r,c])=>cells[`${r},${c}`].given=true);
    return{cells,rows:4,cols:5};
  }return null;
}
// DOUBLE-T: row0+col(rows1-3)+row4, two row/col intersections
function scGenDoubleT(diff){
  const SKIP=diff===1?[3,8]:[4,11];
  for(let t=0;t<100;t++){
    const r0s=sc_ri(SKIP[0],SKIP[1]),r4s=sc_ri(SKIP[0],SKIP[1]),cs=sc_ri(SKIP[0],SKIP[1]);
    const r0Start=sc_ri(1,3)*r0s,inter0=r0Start+2*r0s,cStart=inter0;
    const inter4=cStart+4*cs,r4Start=inter4-2*r4s;
    if(r4Start<=0)continue;
    const cells={};
    for(let j=0;j<5;j++)cells[`0,${j}`]={v:r0Start+j*r0s,given:false};
    for(let i=1;i<4;i++)cells[`${i},2`]={v:cStart+i*cs,given:false};
    for(let j=0;j<5;j++)cells[`4,${j}`]={v:(j===2?inter4:r4Start+j*r4s),given:false};
    if(diff===1)[[0,0],[0,1],[2,2],[3,2],[4,3],[4,4]].forEach(([r,c])=>cells[`${r},${c}`].given=true);
    else[[0,0],[0,4],[1,2],[3,2],[4,0],[4,4]].forEach(([r,c])=>cells[`${r},${c}`].given=true);
    return{cells,rows:5,cols:5};
  }return null;
}
// STEP-3: 3-row staircase, v(i,j)=A+i*dr+j*dc+i*j*k
function scGenStep3(diff){
  const SKIP=diff===1?[2,5]:[3,8];
  for(let t=0;t<80;t++){
    const k=sc_ri(1,2),dr=sc_ri(SKIP[0],SKIP[1]),dc=sc_ri(SKIP[0],SKIP[1]),A=sc_ri(1,8);
    const active=[[0,0],[0,1],[0,2],[1,1],[1,2],[1,3],[2,2],[2,3],[2,4]];
    const cells={};let ok=true;
    for(const[i,j]of active){const v=A+i*dr+j*dc+i*j*k;if(v<=0||v>150){ok=false;break;}cells[`${i},${j}`]={v,given:false};}
    if(!ok)continue;
    [[0,0],[0,2],[1,1],[1,3],[2,2],[2,4]].forEach(([r,c])=>cells[`${r},${c}`].given=true);
    return{cells,rows:3,cols:5};
  }return null;
}
// RECT 3×4: full rectangle, v(i,j)=A+i*dr+j*dc+i*j*k
function scGenRect3x4(diff){
  for(let t=0;t<80;t++){
    const k=sc_ri(1,3),dr=sc_ri(2,6),dc=sc_ri(2,6),A=sc_ri(2,12);
    const cells={};let ok=true;
    for(let i=0;i<3;i++){for(let j=0;j<4;j++){const v=A+i*dr+j*dc+i*j*k;if(v<=0||v>200){ok=false;break;}cells[`${i},${j}`]={v,given:false};}if(!ok)break;}
    if(!ok)continue;
    [[0,0],[0,1],[1,0],[1,1],[2,0]].forEach(([r,c])=>cells[`${r},${c}`].given=true);
    return{cells,rows:3,cols:4};
  }return null;
}
// RECT 4×4: full rectangle, v(i,j)=A+i*dr+j*dc+i*j*k
function scGenRect4x4(diff){
  for(let t=0;t<80;t++){
    const k=sc_ri(1,2),dr=sc_ri(2,5),dc=sc_ri(2,5),A=sc_ri(2,10);
    const cells={};let ok=true;
    for(let i=0;i<4;i++){for(let j=0;j<4;j++){const v=A+i*dr+j*dc+i*j*k;if(v<=0||v>200){ok=false;break;}cells[`${i},${j}`]={v,given:false};}if(!ok)break;}
    if(!ok)continue;
    [[0,0],[0,1],[1,0],[1,1],[2,0],[3,0]].forEach(([r,c])=>cells[`${r},${c}`].given=true);
    return{cells,rows:4,cols:4};
  }return null;
}
function genSkipCross(diff){
  const pools=[
    [scGenPlus,scGenTDown,scGenLRight,scGenLBottom],
    [scGenPlus,scGenTDown,scGenDoubleT,scGenStep3],
    [scGenRect3x4,scGenRect4x4,scGenDoubleT,scGenStep3],
  ];
  for(let t=0;t<60;t++){const p=sc_pick(pools[diff])(diff);if(p)return p;}
  return null;
}
function renderSkipCross(puzzle,isKey){
  const{cells,rows,cols}=puzzle;
  const csz=48,W=cols*csz,H=rows*csz;
  let svg=`<svg width="${W}" height="${H}" xmlns="http://www.w3.org/2000/svg">`;
  for(let r=0;r<rows;r++){
    for(let c=0;c<cols;c++){
      const cell=cells[`${r},${c}`];if(!cell)continue;
      const x=c*csz,y=r*csz,p=1.5,fs=cell.v>=100?13:cell.v>=10?15:17;
      if(cell.given){
        svg+=`<rect x="${x+p}" y="${y+p}" width="${csz-2*p}" height="${csz-2*p}" rx="5" fill="#d8f3dc" stroke="#40916c" stroke-width="2.5"/>`;
        svg+=`<text x="${x+csz/2}" y="${y+csz/2}" text-anchor="middle" dominant-baseline="central" font-family="Nunito,Arial,sans-serif" font-weight="800" font-size="${fs}" fill="#1b4332">${cell.v}</text>`;
      }else if(isKey){
        svg+=`<rect x="${x+p}" y="${y+p}" width="${csz-2*p}" height="${csz-2*p}" rx="5" fill="#fff8f5" stroke="#FF4F00" stroke-width="2"/>`;
        svg+=`<text x="${x+csz/2}" y="${y+csz/2}" text-anchor="middle" dominant-baseline="central" font-family="Nunito,Arial,sans-serif" font-weight="800" font-size="${fs}" fill="#b83000">${cell.v}</text>`;
      }else{
        svg+=`<rect x="${x+p}" y="${y+p}" width="${csz-2*p}" height="${csz-2*p}" rx="5" fill="#ffffff" stroke="#bbbbbb" stroke-width="2"/>`;
      }
    }
  }
  svg+='</svg>';
  return`<div style="line-height:0">${svg}</div>`;
}

// ─── DIFFERENCE PYRAMIDS ─────────────────────────────────────
// pyramid[0]=bottom row (longest), pyramid[rows-1]=top (single cell)
// given[r][c]: true = pre-filled for student
// Rule: pyramid[r][c] = |pyramid[r-1][c] − pyramid[r-1][c+1]|

// Multiple clue templates per difficulty — picked randomly so every puzzle looks different.
// Each entry is an array of [row,col] pairs to mark as given (row 0 = bottom).
const DP_TEMPLATES=[
  // ── Beginner (3 rows, 6 cells total) — 3 given, 3 blank ──
  [
    [[2,0],[0,0],[0,2]],       // top + both bottom corners
    [[2,0],[1,0],[0,1]],       // top + mid-left + bottom-center
    [[2,0],[1,1],[0,1]],       // top + mid-right + bottom-center
    [[2,0],[0,0],[1,1]],       // top + bottom-left + mid-right
    [[2,0],[0,2],[1,0]],       // top + bottom-right + mid-left
  ],
  // ── Intermediate (4 rows, 10 cells total) — 5 given, 5 blank ──
  [
    [[3,0],[2,0],[2,1],[0,0],[0,3]],   // top + row2-left-pair + bottom corners
    [[3,0],[2,1],[2,0],[0,1],[0,2]],   // top + row2-left-pair + bottom inner pair
    [[3,0],[1,0],[1,1],[1,2],[0,0]],   // top + full row1 + bottom-left
    [[3,0],[2,0],[2,1],[0,2],[0,3]],   // top + row2-left-pair + bottom right-pair
    [[3,0],[1,0],[1,2],[0,0],[0,3]],   // top + row1 outer + bottom corners
  ],
  // ── Challenge (5 rows, 15 cells total) — 8 given, 7 blank ──
  [
    [[4,0],[3,0],[3,1],[2,0],[2,1],[2,2],[0,0],[0,4]],  // top + row3 left + row2 left-3 + bottom corners
    [[4,0],[3,0],[3,1],[1,0],[1,1],[1,2],[1,3],[0,0]],  // top + row3 left + full row1 + bottom-left
    [[4,0],[3,0],[2,0],[2,1],[2,2],[1,0],[1,1],[0,4]],  // top + left-spine + row2 left + row1 left + bottom-right
    [[4,0],[3,1],[2,1],[2,2],[1,1],[1,2],[1,3],[0,2]],  // top + right-leaning spine
    [[4,0],[3,0],[3,1],[2,0],[2,2],[1,0],[1,3],[0,2]],  // top + row3 + outer row2 + outer row1 + bottom-center
  ],
];

function dpBuild(bottom){
  const rows=bottom.length;
  const pyramid=[bottom.slice()];
  for(let r=1;r<rows;r++){
    const prev=pyramid[r-1],row=[];
    for(let c=0;c<prev.length-1;c++){
      const d=Math.abs(prev[c]-prev[c+1]);
      if(d===0)return null;
      row.push(d);
    }
    pyramid.push(row);
  }
  return pyramid;
}

function dpSolve(pyramid,given,rows){
  // Returns solution count, capped at 2 for speed.
  const grid=pyramid.map(r=>r.slice());
  // Order blanks top-first for tightest constraint propagation.
  const blanks=[];
  for(let r=rows-1;r>=0;r--)
    for(let c=0;c<pyramid[r].length;c++)
      if(!given[r][c])blanks.push([r,c]);
  const useVals=blanks.map(([r,c])=>pyramid[r][c]).sort((a,b)=>a-b);
  for(const[r,c]of blanks)grid[r][c]=0;

  function ok(r,c,v){
    // Parent above: grid[r+1][c] = |grid[r][c] − grid[r][c+1]|
    if(r+1<rows){
      const par=grid[r+1][c];
      if(par){const sib=grid[r][c+1];if(sib&&Math.abs(v-sib)!==par)return false;}
    }
    // Left-parent above: grid[r+1][c-1] = |grid[r][c-1] − grid[r][c]|
    if(r+1<rows&&c>0){
      const par=grid[r+1][c-1];
      if(par){const sib=grid[r][c-1];if(sib&&Math.abs(sib-v)!==par)return false;}
    }
    // Child below: grid[r-1][c] = |grid[r][c] − grid[r][c+1]| (only if both children known)
    if(r>0){
      const L=grid[r-1][c],R=grid[r-1][c+1];
      if(L&&R&&Math.abs(L-R)!==v)return false;
    }
    return true;
  }

  let solCount=0;
  function bt(idx,rem){
    if(solCount>1)return;
    if(idx===blanks.length){solCount++;return;}
    const[r,c]=blanks[idx];
    for(let i=0;i<rem.length;i++){
      const v=rem[i];
      if(!ok(r,c,v))continue;
      grid[r][c]=v;
      const next=[...rem.slice(0,i),...rem.slice(i+1)];
      bt(idx+1,next);
      grid[r][c]=0;
      if(solCount>1)return;
    }
  }
  bt(0,useVals);
  return solCount;
}

function genDiffPyramid(diff){
  const rows=diff+3;                    // 3, 4, 5
  const maxV=[20,40,60][diff];
  const templates=DP_TEMPLATES[diff];

  for(let att=0;att<30000;att++){
    const bottom=Array.from({length:rows},()=>ri(1,maxV));
    const pyramid=dpBuild(bottom);
    if(!pyramid)continue;
    const allV=pyramid.flat();
    if(new Set(allV).size!==allV.length)continue; // require all-distinct values

    // Pick a random template for this attempt
    const tmpl=templates[att%templates.length];
    const given=pyramid.map(row=>row.map(()=>false));
    for(const[r,c]of tmpl)given[r][c]=true;

    if(dpSolve(pyramid,given,rows)===1)return{pyramid,given,rows,diff};
  }
  return null;
}

function renderDiffPyramid(p,isKey){
  const{pyramid,given,rows,diff}=p;

  // Scale cell size to pyramid height so each level fills the card nicely
  const CW=[68,60,52][diff];
  const CH=[54,46,40][diff];
  const GAP=[10,8,7][diff];

  const bottomLen=rows; // bottom row has `rows` cells
  const svgW=bottomLen*CW+(bottomLen-1)*GAP;
  const svgH=rows*CH+(rows-1)*GAP;

  // Helper: get the pixel-center of cell (ri2, ci)
  function cellCenter(ri2,ci){
    const visualRow=(rows-1)-ri2;
    const rowLen=pyramid[ri2].length;
    const rowW=rowLen*CW+(rowLen-1)*GAP;
    const xOff=(svgW-rowW)/2;
    return{
      x:xOff+ci*(CW+GAP)+CW/2,
      y:visualRow*(CH+GAP)+CH/2
    };
  }

  let svg=`<svg width="${svgW}" height="${svgH}" xmlns="http://www.w3.org/2000/svg">`;

  // ── Draw connector lines first (so they sit under the cells) ──
  for(let ri2=1;ri2<rows;ri2++){
    const parRow=pyramid[ri2];
    for(let ci=0;ci<parRow.length;ci++){
      const par=cellCenter(ri2,ci);
      const parBottom={x:par.x, y:par.y+CH/2};
      const childL=cellCenter(ri2-1,ci);
      const childR=cellCenter(ri2-1,ci+1);
      const childLTop={x:childL.x, y:childL.y-CH/2};
      const childRTop={x:childR.x, y:childR.y-CH/2};
      svg+=`<line x1="${parBottom.x}" y1="${parBottom.y}" x2="${childLTop.x}" y2="${childLTop.y}" stroke="#C8CDD8" stroke-width="1.5"/>`;
      svg+=`<line x1="${parBottom.x}" y1="${parBottom.y}" x2="${childRTop.x}" y2="${childRTop.y}" stroke="#C8CDD8" stroke-width="1.5"/>`;
    }
  }

  // ── Draw cells ──
  for(let ri2=rows-1;ri2>=0;ri2--){
    const row=pyramid[ri2];
    for(let ci=0;ci<row.length;ci++){
      const ctr=cellCenter(ri2,ci);
      const x=ctr.x-CW/2, y=ctr.y-CH/2;
      const isGiv=given[ri2][ci];
      const val=row[ci];
      const rx=7;
      const fs=val>=100?Math.round(CW*0.22):val>=10?Math.round(CW*0.28):Math.round(CW*0.34);

      if(isGiv){
        svg+=`<rect x="${x}" y="${y}" width="${CW}" height="${CH}" rx="${rx}" fill="#ECEEF2" stroke="#9BA3B2" stroke-width="2"/>`;
        svg+=`<text x="${ctr.x}" y="${ctr.y+1}" text-anchor="middle" dominant-baseline="central" font-family="Nunito,Arial,sans-serif" font-weight="800" font-size="${fs}" fill="#1a1a1a">${val}</text>`;
      }else if(isKey){
        svg+=`<rect x="${x}" y="${y}" width="${CW}" height="${CH}" rx="${rx}" fill="#fff8f5" stroke="#FF4F00" stroke-width="2"/>`;
        svg+=`<text x="${ctr.x}" y="${ctr.y+1}" text-anchor="middle" dominant-baseline="central" font-family="Nunito,Arial,sans-serif" font-weight="800" font-size="${fs}" fill="#b83000">${val}</text>`;
      }else{
        svg+=`<rect x="${x}" y="${y}" width="${CW}" height="${CH}" rx="${rx}" fill="#ffffff" stroke="#BDC2CC" stroke-width="2"/>`;
      }
    }
  }
  svg+='</svg>';

  // ── Use list ──
  const useNums=[];
  for(let r=0;r<rows;r++)
    for(let c=0;c<pyramid[r].length;c++)
      if(!given[r][c])useNums.push(pyramid[r][c]);
  useNums.sort((a,b)=>a-b);

  const chipFs=[13,12,11][diff];
  const chips=useNums.map(n=>`<span style="display:inline-flex;align-items:center;justify-content:center;background:#EBF0FF;border:1.5px solid #C5D3F7;border-radius:5px;font-family:Nunito,Arial,sans-serif;font-weight:800;font-size:${chipFs}px;color:#1B4FCC;padding:2px 8px;margin:2px">${n}</span>`).join('');

  return`<div style="display:flex;flex-direction:column;align-items:center;gap:10px">
    <div style="line-height:0">${svg}</div>
    <div style="display:flex;flex-wrap:wrap;align-items:center;justify-content:center;gap:2px">
      <span style="font-family:Archivo,sans-serif;font-size:9px;font-weight:700;letter-spacing:.9px;text-transform:uppercase;color:#8A94A0;margin-right:2px;white-space:nowrap">Use:</span>${chips}
    </div>
  </div>`;
}

// ─── PRODUCT PLACEMENT ───────────────────────────────────────
// Returns digits LSB-first: ppD(58) → [8,5], ppD(350) → [0,5,3]
function ppD(n){if(n===0)return[0];const d=[];while(n>0){d.push(n%10);n=Math.floor(n/10);}return d;}

function genProductPlacement(diff){
  // diff 0=Beginner (2-dig, hide mult only)
  // diff 1=Intermediate (2-dig, show mult, hide 1 top digit + all partial sig digits)
  // diff 2=Challenge (3-dig, hide mult + 1 top digit + all partial sig digits)
  const nd=diff===2?3:2;
  const[lo,hi]=diff===2?[112,987]:[12,98];
  for(let att=0;att<4000;att++){
    const top=ri(lo,hi);
    const mult=ri(2,9);
    const topD=ppD(top);
    // Avoid any zero digit in top number to keep layout clean
    if(topD.some(d=>d===0))continue;
    // For 3-digit, ensure all three digits are non-zero
    if(nd===3&&topD.length<3)continue;
    const total=top*mult;
    const totalD=ppD(total);
    const nc=totalD.length; // number of columns (= digits in total)

    // Build row arrays. Each cell: {v:digit, t:'d'|'z'|'e', h:bool}
    // 'd'=digit (hideable), 'z'=trailing zero (always shown), 'e'=empty spacer
    // Index 0 = ones column (rightmost)
    const topRow=Array.from({length:nc},(_,col)=>
      col<topD.length?{v:topD[col],t:'d',h:false}:{t:'e'});
    const multRow=Array.from({length:nc},(_,col)=>
      col===0?{v:mult,t:'d',h:false}:{t:'e'});
    const partRows=topD.map((d,i)=>{
      const sig=ppD(d*mult);
      return Array.from({length:nc},(_,col)=>{
        if(col<i)return{v:0,t:'z'};       // trailing zero for this place value
        const sp=col-i;
        if(sp<sig.length)return{v:sig[sp],t:'d',h:false};
        return{t:'e'};
      });
    });
    const totRow=Array.from({length:nc},(_,col)=>
      col<totalD.length?{v:totalD[col],t:'d',h:false}:{t:'e'});

    // Apply hiding
    if(diff===0){
      // Beginner: hide multiplier only
      multRow[0].h=true;
    }else if(diff===1){
      // Intermediate: multiplier visible; hide 1 random top digit + all partial sig digits
      topRow[ri(0,topD.length-1)].h=true;
      partRows.forEach(row=>row.forEach(c=>{if(c.t==='d')c.h=true;}));
    }else{
      // Challenge: hide mult + 1 random top digit + all partial sig digits
      multRow[0].h=true;
      topRow[ri(0,topD.length-1)].h=true;
      partRows.forEach(row=>row.forEach(c=>{if(c.t==='d')c.h=true;}));
    }

    return{topRow,multRow,partRows,totRow,nc,top,mult,total};
  }
  return null;
}

function renderProductPlacement(p,isKey){
  const{topRow,multRow,partRows,totRow,nc}=p;
  const CW=36,CH=42,OW=28; // column width, row height, operator column width

  function cell(c){
    if(!c||c.t==='e')return`<td style="width:${CW}px;height:${CH}px"></td>`;
    if(c.t==='z')return`<td style="width:${CW}px;height:${CH}px;text-align:center;vertical-align:middle;font-size:23px;font-weight:800;color:#1a1a1a">0</td>`;
    // 'd' — potentially hidden digit
    if(!c.h)return`<td style="width:${CW}px;height:${CH}px;text-align:center;vertical-align:middle;font-size:23px;font-weight:800;color:#1a1a1a">${c.v}</td>`;
    const box=isKey
      ?`<span style="display:inline-flex;align-items:center;justify-content:center;width:26px;height:30px;background:#fff8f5;border:2px solid #FF4F00;border-radius:4px;font-size:17px;font-weight:800;color:#b83000">${c.v}</span>`
      :`<span style="display:inline-block;width:26px;height:30px;border:2px solid #555;border-radius:4px;background:#f5f5f5"></span>`;
    return`<td style="width:${CW}px;height:${CH}px;text-align:center;vertical-align:middle">${box}</td>`;
  }

  function row(cells,op){
    // Display columns right-to-left (highest place on left)
    const rev=[...cells].reverse();
    return`<tr>
      <td style="width:${OW}px;height:${CH}px;text-align:right;padding-right:5px;font-size:22px;font-weight:800;color:#999;vertical-align:middle">${op}</td>
      ${rev.map(cell).join('')}
    </tr>`;
  }

  function bar(){
    const totalW=OW+nc*CW;
    return`<tr><td colspan="${nc+1}" style="padding:1px 0 3px">
      <div style="border-top:2.5px solid #1a1a1a;margin-left:${OW}px"></div>
    </td></tr>`;
  }

  let h=`<div style="display:inline-block"><table style="border-collapse:collapse;line-height:1">`;
  h+=row(topRow,'');
  h+=row(multRow,'×');
  h+=bar();
  partRows.forEach((r,i)=>{h+=row(r,i>0?'+':'');});
  h+=bar();
  h+=row(totRow,'');
  h+=`</table></div>`;
  return h;
}

// ─── SKIP-COUNTING PATHS ─────────────────────────────────────
const SCP_COLORS=[
  {bg:'#D0F0DB',bd:'#1A7A3A',tx:'#085041'},
  {bg:'#E6F1FB',bd:'#378ADD',tx:'#0C447C'},
  {bg:'#EEEDFE',bd:'#7F77DD',tx:'#3C3489'},
  {bg:'#FAEEDA',bd:'#EF9F27',tx:'#633806'},
];

function scpShuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

function scpHamPath(N){
  const vis=Array.from({length:N},()=>Array(N).fill(false));
  const path=[];
  const DIRS=[[0,1],[0,-1],[1,0],[-1,0]];
  function dfs(r,c){
    vis[r][c]=true;path.push([r,c]);
    if(path.length===N*N)return true;
    const nbs=scpShuffle(DIRS.map(([dr,dc])=>[r+dr,c+dc]).filter(([nr,nc])=>nr>=0&&nr<N&&nc>=0&&nc<N&&!vis[nr][nc]));
    for(const[nr,nc]of nbs)if(dfs(nr,nc))return true;
    path.pop();vis[r][c]=false;return false;
  }
  // Try random start positions until one finds a full path
  const starts=scpShuffle([...Array(N*N)].map((_,i)=>[Math.floor(i/N),i%N]));
  for(const[r,c]of starts){
    for(let i=0;i<N;i++)for(let j=0;j<N;j++)vis[i][j]=false;
    path.length=0;
    if(dfs(r,c))return path;
  }
  return null;
}

function genSCPaths(diff){
  const cfgs=[
    {N:4,nP:2,sLo:2,sHi:6},
    {N:5,nP:3,sLo:3,sHi:9},
    {N:5,nP:4,sLo:4,sHi:12},
  ];
  const{N,nP,sLo,sHi}=cfgs[diff];
  const total=N*N;

  for(let att=0;att<300;att++){
    const ham=scpHamPath(N);
    if(!ham)continue;

    // Cut ham into nP segments with slight length jitter
    const base=Math.floor(total/nP);
    const cuts=[0];
    for(let i=1;i<nP;i++){
      const ideal=i*base;
      const jitter=ri(-1,1);
      cuts.push(Math.max(cuts[i-1]+3,Math.min(total-3*(nP-i),ideal+jitter)));
    }
    cuts.push(total);
    const pathCells=[];
    for(let p=0;p<nP;p++)pathCells.push(ham.slice(cuts[p],cuts[p+1]));
    if(pathCells.some(pc=>pc.length<3))continue;

    // Pick distinct steps
    const pool=scpShuffle([...Array(sHi-sLo+1)].map((_,i)=>i+sLo));
    if(pool.length<nP)continue;
    const steps=pool.slice(0,nP);

    // Assign values, avoid cross-path collisions at diff<2
    const grid=Array.from({length:N},()=>Array(N).fill(0));
    const pathOf=Array.from({length:N},()=>Array(N).fill(-1));
    const usedVals=new Set();
    let valid=true;
    for(let p=0;p<nP;p++){
      const cells=pathCells[p];
      const step=steps[p];
      const startVal=step*ri(1,3);
      for(let i=0;i<cells.length;i++){
        const v=startVal+i*step;
        if(diff===0&&usedVals.has(v)){valid=false;break;}
        usedVals.add(v);
        const[r,c]=cells[i];
        grid[r][c]=v;pathOf[r][c]=p;
      }
      if(!valid)break;
    }
    if(!valid)continue;

    // Choose clue cells: first 2 + last of each path; +1 interior for beginner
    const clues=new Set();
    for(let p=0;p<nP;p++){
      const cells=pathCells[p];
      clues.add(cells[0].join(','));
      if(cells.length>1)clues.add(cells[1].join(','));
      clues.add(cells[cells.length-1].join(','));
      if(diff===0&&cells.length>3)clues.add(cells[Math.floor(cells.length/2)].join(','));
    }
    return{grid,pathCells,pathOf,clues,steps,N,nP,diff};
  }
  return null;
}

function renderSCPaths(p,isKey){
  const{grid,pathOf,clues,steps,N,nP}=p;
  const csz=N===4?50:44;
  const fsz=N===4?15:13;
  const gap=3;
  const colT=`grid-template-columns:repeat(${N},${csz}px)`;
  let s=`<div style="display:inline-flex;flex-direction:column;align-items:center;gap:8px">`;
  s+=`<div style="display:inline-grid;gap:${gap}px;background:#b0b4b8;padding:${gap}px;border:2px solid #444;border-radius:3px;${colT}">`;
  for(let r=0;r<N;r++){
    for(let c=0;c<N;c++){
      const v=grid[r][c];
      const pIdx=pathOf[r][c];
      const col=SCP_COLORS[pIdx]||SCP_COLORS[0];
      const isClue=clues.has(r+','+c);
      const dynF=v>=100?fsz-1:fsz;
      if(isKey){
        s+=`<div style="width:${csz}px;height:${csz}px;display:flex;align-items:center;justify-content:center;font-family:'Archivo',sans-serif;font-weight:800;font-size:${dynF}px;background:${col.bg};outline:2px solid ${col.bd};outline-offset:-1px;border-radius:2px;color:${col.tx}">${v}</div>`;
      }else if(isClue){
        s+=`<div style="width:${csz}px;height:${csz}px;display:flex;align-items:center;justify-content:center;font-family:'Archivo',sans-serif;font-weight:800;font-size:${dynF}px;background:#ECEEF2;border-radius:2px;color:#1a1a1a">${v}</div>`;
      }else{
        s+=`<div style="width:${csz}px;height:${csz}px;background:#f5f5f5;border-radius:2px;border:1.5px dashed #ccc"></div>`;
      }
    }
  }
  s+='</div>';
  if(isKey){
    s+=`<div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:center">`;
    for(let pi=0;pi<nP;pi++){
      const col=SCP_COLORS[pi];
      s+=`<div style="display:flex;align-items:center;gap:4px;font-family:'Archivo',sans-serif;font-size:9px;font-weight:700;color:#555"><div style="width:10px;height:10px;background:${col.bg};outline:1px solid ${col.bd};border-radius:2px;outline-offset:-1px"></div>×${steps[pi]}</div>`;
    }
    s+='</div>';
  }
  s+='</div>';
  return s;
}

// ─── FENCE 'EM IN ─────────────────────────────────────────────
const FEI_CFG=[
  {N:2,M:6,K:3,A:4,P:10,T:2,maxT:500},
  {N:3,M:4,K:3,A:4,P:10,T:2,maxT:2000},
  {N:4,M:4,K:4,A:4,P:10,T:3,maxT:2000},
];
const FEI_PEN_BG=['#D0F0DB','#E6F1FB','#EEEDFE','#FAEEDA'];
const FEI_PEN_BD=['#1A7A3A','#185FA5','#534AB7','#854F0B'];
const FEI_CRT_COL=['#1A7A3A','#185FA5','#854F0B'];
// 7 animals, rotate across type slots; use index mod 7 → symbol id fei1..fei7
const FEI_ANIMAL_SEQ=[1,2,3,4,5,6,7];
let _feiAnimalOff=0;

function feiShuf(a){for(let i=a.length-1;i>0;i--){const j=ri(0,i);[a[i],a[j]]=[a[j],a[i]];}return a;}

function feiPerim(cells,N,M){
  const s=new Set(cells);let p=0;
  for(const c of cells){
    const r=(c/M)|0,col=c%M;
    if(r===0||!s.has(c-M))p++;if(r===N-1||!s.has(c+M))p++;
    if(col===0||!s.has(c-1))p++;if(col===M-1||!s.has(c+1))p++;
  }return p;
}
function feiNbrs(cell,N,M){
  const r=(cell/M)|0,c=cell%M,res=[];
  if(r>0)res.push(cell-M);if(r<N-1)res.push(cell+M);
  if(c>0)res.push(cell-1);if(c<M-1)res.push(cell+1);
  return res;
}
function feiFindTilings(N,M,K,A,P,maxCount){
  const total=N*M,assign=new Array(total).fill(-1);
  const regCells=Array.from({length:K},()=>[]);const tilings=[];
  function grow(rIdx,frontier,size){
    if(tilings.length>=maxCount)return;
    if(size===A){
      if(feiPerim(regCells[rIdx],N,M)!==P)return;
      if(rIdx===K-1){tilings.push(regCells.map(r=>[...r]));return;}
      let next=-1;for(let i=0;i<total;i++)if(assign[i]===-1){next=i;break;}
      if(next===-1)return;
      assign[next]=rIdx+1;regCells[rIdx+1]=[next];
      const nf=new Set(feiNbrs(next,N,M).filter(n=>assign[n]===-1));
      grow(rIdx+1,nf,1);assign[next]=-1;regCells[rIdx+1]=[];return;
    }
    for(const cell of[...frontier]){
      if(tilings.length>=maxCount)return;
      assign[cell]=rIdx;regCells[rIdx].push(cell);
      const nf=new Set(frontier);nf.delete(cell);
      for(const n of feiNbrs(cell,N,M))if(assign[n]===-1)nf.add(n);
      const rem=total-regCells.reduce((s,r)=>s+r.length,0);
      if(rem>=(K-rIdx-1)*A)grow(rIdx,nf,size+1);
      regCells[rIdx].pop();assign[cell]=-1;
    }
  }
  assign[0]=0;regCells[0]=[0];
  const f=new Set(feiNbrs(0,N,M).filter(n=>assign[n]===-1));
  grow(0,f,1);return tilings;
}
function feiIsCompat(critters,tiling,T){
  for(const region of tiling){
    const s=new Set(region);const types=new Set();
    for(const{cell,type}of critters)if(s.has(cell)){
      if(types.has(type))return false;types.add(type);
    }
    if(types.size!==T)return false;
  }
  return true;
}

// Cache tilings per config so we don't re-enumerate each puzzle
const _feiTilingCache={};
function feiGetTilings(N,M,K,A,P,maxT){
  const key=`${N},${M},${K},${A},${P}`;
  if(!_feiTilingCache[key])_feiTilingCache[key]=feiFindTilings(N,M,K,A,P,maxT);
  return _feiTilingCache[key];
}

function genFenceEmIn(diff){
  const{N,M,K,A,P,T,maxT}=FEI_CFG[diff];
  const tilings=feiGetTilings(N,M,K,A,P,maxT);
  if(!tilings.length)return null;
  // Rotate animal assignment so each puzzle on the sheet uses different animals
  const animalIds=[];
  for(let t=0;t<T;t++)animalIds.push(FEI_ANIMAL_SEQ[(_feiAnimalOff+t)%7]);
  _feiAnimalOff=(_feiAnimalOff+T)%7;
  for(let att=0;att<5000;att++){
    const trueTiling=tilings[ri(0,tilings.length-1)];
    const critters=[];let valid=true;
    for(let p=0;p<K;p++){
      const cells=feiShuf([...trueTiling[p]]);
      if(cells.length<T){valid=false;break;}
      for(let t=0;t<T;t++)critters.push({cell:cells[t],type:t});
    }
    if(!valid)continue;
    let compat=0;
    for(const tiling of tilings){
      if(feiIsCompat(critters,tiling,T)){compat++;if(compat>1)break;}
    }
    if(compat===1){
      const grid=new Array(N*M).fill(-1);
      for(let r=0;r<K;r++)for(const cell of trueTiling[r])grid[cell]=r;
      const cGrid=new Array(N*M).fill(-1);
      for(const{cell,type}of critters)cGrid[cell]=type;
      return{N,M,K,A,P,T,grid,cGrid,tiling:trueTiling,animalIds};
    }
  }
  return null;
}

// ─── DECIMAL NUMBERCROSS ──────────────────────────────────────
function dncBuildCands(pre, post){
  if(post<1) return [];
  const res=[];
  for(let exp=1; exp<=post+1; exp++){
    const denom=Math.pow(10,exp);
    const maxInt=pre===0?0:Math.pow(10,pre)-1;
    for(let intP=0; intP<=maxInt; intP++){
      if(pre>1&&intP<Math.pow(10,pre-1))continue;
      const maxFrac=Math.pow(10,Math.min(exp,post))-1;
      for(let frac=0; frac<=maxFrac; frac++){
        if(frac===0&&intP===0)continue;
        const num=intP*denom+frac*Math.pow(10,exp-Math.min(exp,post));
        const preStr=pre===0?'':String(intP);
        const fracStr=String(frac).padStart(post,'0').padEnd(post,'0').slice(0,post);
        const s=preStr+'.'+fracStr;
        if(s.length!==pre+1+post||s[pre]!=='.')continue;
        const key=num+'/'+denom;
        res.push({str:s,num,denom,key});
      }
    }
  }
  const seen=new Set();
  return res.filter(c=>{if(seen.has(c.key))return false;seen.add(c.key);return true;});
}

function genDNC(diff){
  // Pick random template for this difficulty; alternate between available templates
  const pool=DNC_TEMPLATES.filter(t=>t.diff===diff);
  const tmpl=pool[ri(0,pool.length-1)];
  const rCands=tmpl.rootSlots.map(sl=>dncBuildCands(sl.pre,sl.post));

  for(let att=0;att<8000;att++){
    const rA=[]; const used=new Set(); let ok=true;
    for(let i=0;i<tmpl.rootSlots.length;i++){
      const cs=rCands[i].filter(c=>!used.has(c.key));
      if(!cs.length){ok=false;break;}
      const c=cs[ri(0,cs.length-1)];
      rA.push(c); used.add(c.key);
    }
    if(!ok)continue;

    const dA=[];
    for(const ds of tmpl.derivedSlots){
      const chars=new Array(ds.pre+1+ds.post).fill(null);
      chars[ds.pre]='.';
      for(const{pos,si,ri:ri2}of ds.cons){
        const ch=rA[si].str[ri2];
        if(!ch||ch==='.'){ok=false;break;}
        chars[pos]=ch;
      }
      if(!ok||chars.some(c=>c===null)){ok=false;break;}
      const s=chars.join('');
      if(ds.pre>1&&s[0]==='0'){ok=false;break;}
      if(used.has(s)||dA.find(d=>d.str===s)){ok=false;break;}
      dA.push({str:s});
      used.add(s);
    }
    if(!ok)continue;

    // Build grid
    const grid=Array.from({length:tmpl.N},()=>Array(tmpl.M).fill(null));
    const allSlots=[
      ...tmpl.rootSlots.map((sl,i)=>({...sl,str:rA[i].str})),
      ...tmpl.derivedSlots.map((sl,i)=>({...sl,str:dA[i].str}))
    ];
    for(const sl of allSlots){
      if(!sl.cells)continue;
      sl.cells.forEach((cell,pi)=>{grid[cell[0]][cell[1]]=sl.str[pi];});
    }
    // Fill dot cells from layout
    for(let r=0;r<tmpl.N;r++)for(let c=0;c<tmpl.M;c++){
      if(tmpl.layout[r][c]==='dot')grid[r][c]='.';
      if(tmpl.layout[r][c]==='B')grid[r][c]='B';
    }
    const fracs=allSlots.map(sl=>sl.str);
    // Shuffle frac list for student version (so order doesn't give it away)
    const fracList=[...fracs];
    for(let i=fracList.length-1;i>0;i--){const j=ri(0,i);[fracList[i],fracList[j]]=[fracList[j],fracList[i]];}
    return{grid,tmpl,fracs,fracList};
  }
  return null;
}

function renderDNC(p,isKey){
  const{grid,tmpl,fracs,fracList}=p;
  const csz=36;
  let tbl=`<table class="dnc">`;
  for(let r=0;r<tmpl.N;r++){
    tbl+='<tr>';
    for(let c=0;c<tmpl.M;c++){
      const cell=grid[r][c];
      if(cell==='B'){
        tbl+=`<td class="dnc-black"></td>`;
      } else if(cell==='.'){
        tbl+=`<td class="dnc-dot">·</td>`;
      } else if(isKey){
        tbl+=`<td class="dnc-blank">${cell}</td>`;
      } else {
        tbl+=`<td class="dnc-blank"></td>`;
      }
    }
    tbl+='</tr>';
  }
  tbl+='</table>';
  const showFracs=isKey?fracs:fracList;
  const fracHtml=showFracs.map(f=>`<span class="dnc-frac">${f}</span>`).join('');
  return`<div class="dnc-wrap">${tbl}<div class="dnc-fraclist">${fracHtml}</div></div>`;
}

function loadScript(src){
  return new Promise((res,rej)=>{
    if(document.querySelector(`script[src="${src}"]`)){res();return;}
    const s=document.createElement('script');s.src=src;
    s.onload=res;s.onerror=()=>rej(new Error('Failed to load '+src));
    document.head.appendChild(s);
  });
}

async function downloadPDF(mode){
  const title=document.getElementById('pg-title').value.trim()||PTITLES[TYPE];
  const pbtns=document.querySelectorAll('.pbtn');
  pbtns.forEach(b=>{b.disabled=true;b._txt=b.lastChild.textContent;b.lastChild.textContent='…';});

  try{
    await Promise.all([
      loadScript('https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js'),
      loadScript('https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js'),
    ]);

    const pages=[];
    if(mode!=='key')     pages.push(buildSheet(false));
    if(mode!=='student') pages.push(buildSheet(true));

    // Off-screen render container — same page so all CSS applies
    const wrap=document.createElement('div');
    wrap.style.cssText='position:fixed;left:-9999px;top:0;width:740px;background:#fff;padding:32px;box-sizing:border-box;';
    document.body.appendChild(wrap);

    const{jsPDF}=window.jspdf;
    const pdf=new jsPDF({orientation:'portrait',unit:'pt',format:'letter'});
    const PW=pdf.internal.pageSize.getWidth();   // 612 pt
    const PH=pdf.internal.pageSize.getHeight();  // 792 pt
    const MARGIN=32; // pt
    const CONTENT_W=PW-MARGIN*2;

    for(let i=0;i<pages.length;i++){
      if(i>0) pdf.addPage();
      wrap.innerHTML=pages[i];
      // Let fonts/SVGs settle
      await new Promise(r=>setTimeout(r,300));
      const canvas=await html2canvas(wrap,{
        scale:2,
        useCORS:true,
        allowTaint:true,
        backgroundColor:'#ffffff',
        logging:false,
      });
      const imgW=CONTENT_W;
      const imgH=(canvas.height/canvas.width)*imgW;
      // If taller than page, scale down to fit
      const scale=Math.min(1,(PH-MARGIN*2)/imgH);
      const finalW=imgW*scale, finalH=imgH*scale;
      const offsetX=MARGIN+(CONTENT_W-finalW)/2;
      const offsetY=MARGIN+(PH-MARGIN*2-finalH)/2;
      pdf.addImage(canvas.toDataURL('image/jpeg',0.94),'JPEG',offsetX,offsetY,finalW,finalH);
    }

    document.body.removeChild(wrap);
    const filename=(title.replace(/[^\w\s-]/g,'').trim().replace(/\s+/g,'-')||'puzzle')+'.pdf';
    pdf.save(filename);

  }catch(err){
    alert('PDF generation failed: '+err.message+'\n\nTry allowing pop-ups or use a different browser.');
    console.error(err);
  }finally{
    pbtns.forEach(b=>{b.disabled=false;if(b._txt)b.lastChild.textContent=b._txt;});
  }
}

// ─── UI ──────────────────────────────────────────────────────
function selType(btn){
  document.querySelectorAll('.tbtn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  TYPE=btn.dataset.type; DIFF=0;
  const isHC=TYPE==='honeycomb', isMM=TYPE==='maze', isFB=TYPE==='factorblob';
  document.getElementById('hc-size-row').style.display=isHC?'':'none';
  document.getElementById('hc-size-div').style.display=isHC?'':'none';
  document.getElementById('mm-fact-row').style.display=isMM?'':'none';
  document.getElementById('mm-fact-div').style.display=isMM?'':'none';
  document.getElementById('fb-size-row').style.display=isFB?'':'none';
  document.getElementById('fb-size-div').style.display=isFB?'':'none';
  buildDiffUI(); generate();
}
function selHCSize(btn){
  document.querySelectorAll('[data-size]').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  HC_SIZE=btn.dataset.size; DIFF=0; buildDiffUI(); generate();
}
function selMMK(btn){
  document.querySelectorAll('[data-k]').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  MM_K=+btn.dataset.k; generate();
}
function selFBSize(btn){
  document.querySelectorAll('[data-fbsize]').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  FB_N=+btn.dataset.fbsize; generate();
}
function setView(v){
  SHOW_KEY=v==='key';
  document.getElementById('vt-s').classList.toggle('on',!SHOW_KEY);
  document.getElementById('vt-k').classList.toggle('on',SHOW_KEY);
  refresh();
}
function buildDiffUI(){
  // For honeycomb, show size-specific descriptions from HC_GRIDS
  const diffs = (TYPE==='honeycomb')
    ? HC_GRIDS[HC_SIZE].DIFFS.map((d,i)=>{
        const labels=['Beginner','Intermediate','Challenge'];
        return{l:labels[i], d:`Numbers up to ${d.maxN}, ${d.hide} blanks`};
      })
    : DIFFS[TYPE];
  document.getElementById('diff-opts').innerHTML=diffs.map((d,i)=>`
    <label><input type="radio" name="diff" value="${i}" ${i===DIFF?'checked':''}
      onchange="DIFF=${i};generate()">
    <span><span class="dl">${d.l}</span>&ensp;<span class="dd">${d.d}</span></span></label>`).join('');
}

// Init
buildDiffUI();
document.getElementById('hc-size-row').style.display='';
document.getElementById('hc-size-div').style.display='';
requestAnimationFrame(()=>setTimeout(()=>{cryptoPool=buildCryptoPool();},100));
generate();
</script>
