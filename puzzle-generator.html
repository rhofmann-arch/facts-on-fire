<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Puzzle Generator — Facts on Fire</title>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Archivo:wght@400;500;600;700;800&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#FAFAF7;--surf:#FFF;--ink:#0E1117;--ink2:#3A4150;
  --muted:#8A94A0;--border:#E4E6EA;
  --fire:#FF4F00;--fire2:#FF9000;--ember:#FFF0E8;
  --teal:#007A6E;--teal-lt:#E6F4F2;
  --blue:#1B4FCC;--blue-lt:#EBF0FF;
  --purple:#7C3FA0;--purple-lt:#F2EAF9;
  --r:12px;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Archivo',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh}

/* Header */
header{background:var(--ink);padding:0 28px;border-bottom:3px solid var(--fire);position:sticky;top:0;z-index:100}
.hdr{max-width:1300px;margin:0 auto;display:flex;align-items:center;gap:12px;height:54px}
.logo{font-family:'Archivo Black',sans-serif;font-size:17px;color:#fff;display:flex;align-items:center;gap:7px;text-decoration:none}
.logo em{color:var(--fire);font-style:normal}
.sep{color:#444;font-size:18px}
.sub{font-size:14px;color:#aaa;font-weight:500}
.back{margin-left:auto;color:#aaa;font-size:12px;font-weight:600;text-decoration:none;padding:5px 12px;border:1px solid #333;border-radius:6px;transition:.15s}
.back:hover{color:#fff;border-color:#666}

/* Page layout */
.wrap{max-width:1300px;margin:0 auto;padding:20px;display:grid;grid-template-columns:280px 1fr;gap:20px;align-items:start}

/* Sidebar */
.sb{background:var(--surf);border:1px solid var(--border);border-radius:var(--r);padding:18px 16px;display:flex;flex-direction:column;gap:16px;position:sticky;top:74px}
.sb-label{font-size:10px;font-weight:700;letter-spacing:1.3px;text-transform:uppercase;color:var(--muted);margin-bottom:8px;display:block}

.type-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:5px}
.tbtn{background:var(--bg);border:2px solid var(--border);border-radius:8px;padding:8px 3px;cursor:pointer;text-align:center;transition:.15s;font-family:'Archivo',sans-serif}
.tbtn:hover{border-color:var(--fire);background:var(--ember)}
.tbtn.on{background:var(--ember);border-color:var(--fire)}
.tbtn .ico{font-size:18px;display:block;margin-bottom:3px}
.tbtn .lbl{font-size:9px;font-weight:700;color:var(--ink2);line-height:1.2}
.tbtn.on .lbl{color:var(--fire)}

.diffs{display:flex;flex-direction:column;gap:4px}
.diffs label{display:flex;align-items:flex-start;gap:8px;cursor:pointer;font-size:12.5px;padding:6px 8px;border-radius:7px;transition:.1s;line-height:1.35}
.diffs label:hover{background:var(--bg)}
.diffs input[type=radio]{accent-color:var(--fire);margin-top:2px;flex-shrink:0}
.dl{font-weight:700}.dd{color:var(--muted)}

.title-inp{width:100%;padding:7px 10px;border:1px solid var(--border);border-radius:7px;font-family:'Archivo',sans-serif;font-size:13px;background:var(--bg);color:var(--ink)}
.title-inp:focus{outline:none;border-color:var(--fire)}
.hint{font-size:10.5px;color:var(--muted);margin-top:4px}

.btn-gen{background:var(--fire);color:#fff;border:none;border-radius:9px;padding:12px 16px;font-family:'Archivo Black',sans-serif;font-size:14px;cursor:pointer;width:100%;transition:.15s;letter-spacing:.3px}
.btn-gen:hover{background:#e03900}
.btn-gen:active{transform:scale(.98)}

.pdf-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
.pbtn{padding:9px 4px;border-radius:7px;font-family:'Archivo',sans-serif;font-size:11px;font-weight:700;cursor:pointer;border:2px solid;background:var(--surf);transition:.15s;display:flex;flex-direction:column;align-items:center;gap:3px}
.pbtn:disabled{opacity:.5;cursor:wait}
.pbtn span{font-size:16px}
.pbtn.ps{border-color:var(--teal);color:var(--teal)}.pbtn.ps:hover:not(:disabled){background:var(--teal-lt)}
.pbtn.pk{border-color:var(--blue);color:var(--blue)}.pbtn.pk:hover:not(:disabled){background:var(--blue-lt)}
.pbtn.pb{border-color:var(--purple);color:var(--purple)}.pbtn.pb:hover:not(:disabled){background:var(--purple-lt)}

.size-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
.sbtn{padding:7px 4px;border:2px solid var(--border);border-radius:7px;background:var(--bg);font-family:'Archivo',sans-serif;font-size:11px;font-weight:700;cursor:pointer;transition:.15s;color:var(--ink);text-align:center;line-height:1.3}
.sbtn:hover{border-color:var(--fire)}
.sbtn.on{background:var(--fire);border-color:var(--fire);color:#fff}
.sbtn .sub{font-size:9px;font-weight:500;display:block;opacity:.8}
.sbtn.on .sub{opacity:.9}

.sb-div{border:none;border-top:1px solid var(--border);margin:0 -4px}

/* Preview */
.preview{background:var(--surf);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.pv-top{padding:11px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--bg)}
.pv-top h3{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--ink2)}
.view-tog{display:flex;gap:4px}
.vtbtn{padding:4px 12px;border-radius:5px;font-size:11.5px;font-weight:700;cursor:pointer;border:1.5px solid var(--border);background:#fff;font-family:'Archivo',sans-serif;transition:.1s}
.vtbtn.on{background:var(--ink);color:#fff;border-color:var(--ink)}
.pv-body{padding:24px 20px;background:#E8E8E2;min-height:500px;display:flex;justify-content:center;align-items:flex-start}

/* Puzzle sheet */
.sheet{background:#fff;border:1px solid #ccc;border-radius:3px;padding:28px 32px 32px;box-shadow:0 2px 16px rgba(0,0,0,.12);width:100%;max-width:720px;font-family:'Nunito',sans-serif}
.sh-hdr{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px}
.sh-title{font-size:21px;font-weight:800;color:#1a1a1a}
.sh-src{font-size:11px;font-weight:700;color:#aaa;letter-spacing:.4px}
.sh-dir{font-size:13px;font-weight:700;color:#333;padding-bottom:10px;border-bottom:2px solid #e0e0e0;margin-bottom:18px}
.key-badge{display:inline-block;background:#1B4FCC;color:#fff;font-size:10px;font-weight:800;letter-spacing:.5px;padding:2px 8px;border-radius:3px;margin-left:8px;vertical-align:middle}
.pg{display:grid;gap:16px}
.pc{border:2.5px solid #2a2a2a;border-radius:8px;padding:18px 14px;display:flex;align-items:center;justify-content:center;position:relative;min-height:150px}
.pc-n{font-size:10px;font-weight:800;color:#ccc;position:absolute;top:7px;left:9px}

/* Cross-Number */
table.cn{border-collapse:collapse}
table.cn td{text-align:center;vertical-align:middle;padding:0;height:50px}
.cn-num{width:68px;font-size:22px;font-weight:800;color:#1a1a1a}
.cn-op{width:28px;font-size:22px;font-weight:800;color:#1a1a1a}
/* ⚠️ LOCK: .cn-mop font-size MUST stay 22px — same as .cn-op.
   This controls vertical operator/equals rows in Cross-Number puzzles.
   Do NOT reduce this value. It has been corrected repeatedly. */
.cn-mop{height:24px!important;font-size:22px;font-weight:800;color:#bbb;width:28px} /* LOCK: 22px — do not change */
.cn-given{width:76px;font-size:22px;font-weight:800;color:#1a1a1a}
.cn-miss{width:68px}
.cn-ans{width:76px}
.miss-box{display:inline-block;width:60px;height:36px;border:2px solid #555;border-radius:4px;background:#f5f5f5}
.ans-box{display:inline-block;width:66px;height:36px;border:2px solid #555;border-radius:4px}
.miss-box.show,.ans-box.show{background:#fff8f5;border-color:#FF4F00;display:inline-flex;align-items:center;justify-content:center;font-size:19px;font-weight:800;color:#b83000}

/* Two-Out */
.to-wrap{text-align:center}
table.to{border-collapse:separate;border-spacing:8px;margin:0 auto}
table.to td{width:78px;height:78px;text-align:center;vertical-align:middle;font-size:33px;font-weight:800;border-radius:8px;background:#efefef;position:relative}
table.to td.cx{background:#ffe5e5;color:#ccc}
.cx-mark{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:42px;font-weight:900;color:#cc2200;line-height:1}
.to-target{margin-top:10px;font-size:16px;font-weight:700;color:#555}
.to-target strong{color:#1a1a1a;font-size:19px}

/* Cryptarithm */
.cr-wrap{display:inline-block;text-align:center}
table.cr{border-collapse:collapse;margin:0 auto}
table.cr td{width:30px;height:34px;text-align:center;vertical-align:middle;font-size:21px;font-weight:800;color:#1a1a1a}
.cr-bar{border-top:2.5px solid #1a1a1a;margin:2px auto 0}
.cr-box{display:inline-flex;align-items:center;justify-content:center;width:24px;height:28px;border-radius:3px;font-size:14px;font-weight:800}
.cr-blank{background:#fff;border:1.5px solid #aaa;color:#ccc}
.cr-filled{background:#fff8f5;border:1.5px solid #FF4F00;color:#b83000}
.cr-blanks{margin-top:11px;text-align:center;font-size:12px;font-weight:700}
.cr-eq{margin:0 10px;display:inline-flex;align-items:center;gap:4px}
.cr-line{display:inline-block;width:22px;border-bottom:1.5px solid #333;margin-bottom:1px}

/* Mismo */
.ms-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px}
.ms-cell{display:flex;align-items:center;justify-content:center;height:56px}
.ms-num{width:44px;height:42px;background:#efefef;border-radius:6px;border:1.5px solid #ccc;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:800}
.ms-circ{width:38px;height:38px;border-radius:50%;border:2px solid #666;background:#fff;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:800;color:transparent}
.ms-circ.show{color:#b83000}

/* Mega Mismo */
.mgm-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;width:280px}
.mgm-cell{display:flex;align-items:center;justify-content:center;height:34px}
.mgm-num{width:28px;height:26px;background:#efefef;border-radius:4px;border:1.5px solid #ccc;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800}
.mgm-circ{width:22px;height:22px;border-radius:50%;border:1.5px solid #666;background:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:transparent}
.mgm-circ.show{color:#b83000}

/* Multiple Maze */
.maze-grid{display:inline-grid;gap:var(--mgap,3px);background:#b0b4b8;padding:var(--mgap,3px);border:2px solid #444;border-radius:3px}
.mc{width:var(--mcsz);height:var(--mcsz);display:flex;align-items:center;justify-content:center;font-family:'Archivo',sans-serif;font-weight:800;font-size:var(--mfsz);background:#f5f5f5;border-radius:2px;color:#1a1a1a}
.mc.mc-s{background:#D0F0DB;outline:2.5px solid #1A7A3A;outline-offset:-1px;z-index:1}
.mc.mc-f{background:#FFE2D0;outline:2.5px solid #FF4F00;outline-offset:-1px;z-index:1}
.mc.mc-p{background:#FFF0E0;outline:2px solid #FF9000;outline-offset:-1px}
.mc.mc-d{background:#E8EEFF;outline:1.5px solid #9AAAE0;outline-offset:-1px}
.mleg{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;font-size:9px;font-weight:700;font-family:'Archivo',sans-serif;color:#555;margin-top:6px}
/* X-Out */
.xo-wrap{text-align:center}
table.xo{border-collapse:separate;border-spacing:4px;margin:0 auto}
table.xo td{text-align:center;vertical-align:middle;font-family:'Archivo',sans-serif;font-weight:800;border-radius:5px;background:#efefef;position:relative;border:1.5px solid #ccc}
table.xo td.xo-4{width:56px;height:56px;font-size:22px}
table.xo td.xo-5{width:48px;height:48px;font-size:18px}
table.xo td.crossed{background:#ffe5e5;color:#ccc}
.xo-cxmark{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:30px;font-weight:900;color:#cc2200;line-height:1;pointer-events:none}
.xo-5 .xo-cxmark{font-size:25px}
.xo-target{margin-top:9px;font-size:13px;font-weight:700;color:#555}
.xo-target strong{color:#1a1a1a;font-size:15px}

/* Two Step */
.ts-steps-area{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.ts-steps-label{font-family:'Archivo',sans-serif;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#888;white-space:nowrap}
.ts-steps-box{display:flex;align-items:center;gap:6px;background:#f5f5f2;border:2px solid #2a2a2a;border-radius:8px;padding:7px 13px}
.ts-step-chip{background:#fff;border:1.5px solid #ccc;border-radius:6px;padding:3px 11px;font-size:14px;font-family:'Archivo Black',sans-serif;color:#1a1a1a}

.mli{display:flex;align-items:center;gap:4px}
.msw{width:11px;height:11px;border-radius:2px;flex-shrink:0}
.mm-fact-row{display:grid;grid-template-columns:repeat(4,1fr);gap:5px}
.ffbtn{padding:7px 2px;border:2px solid var(--border);border-radius:7px;background:var(--bg);font-family:'Archivo Black',sans-serif;font-size:13px;cursor:pointer;transition:.15s;color:var(--ink);text-align:center}
.ffbtn:hover{border-color:var(--fire)}
.ffbtn.on{background:var(--fire);border-color:var(--fire);color:#fff}
.ffbtn .xs{display:block;font-family:'Archivo',sans-serif;font-size:8px;font-weight:700;color:var(--muted);line-height:1.1;margin-top:1px}
.ffbtn.on .xs{color:rgba(255,255,255,.75)}
/* Fence Em In */
.fei-wrap{display:inline-flex;flex-direction:column;align-items:center;gap:8px}
.fei-table{border-collapse:collapse;border:2.5px solid #1a1a1a}
.fei-table td{padding:0;text-align:center;vertical-align:middle}
.fei-reminder{font-size:10px;font-weight:700;font-family:'Archivo',sans-serif;color:#666;letter-spacing:.3px}
/* Decimal Numbercross */
.dnc-wrap{display:inline-flex;flex-direction:column;align-items:center;gap:6px}
table.dnc{border-collapse:collapse}
table.dnc td{width:34px;height:34px;text-align:center;vertical-align:middle;font-family:'Archivo Black',sans-serif;font-size:17px;border:1.5px solid #bbb;background:#fff;position:relative}
table.dnc td.dnc-black{background:#1a1a1a;border-color:#1a1a1a}
table.dnc td.dnc-dot{background:#e8f4e8;border:1.5px solid #4a9a5a;font-size:20px;font-weight:900;color:#2a7a3a}
table.dnc td.dnc-blank{background:#fff}
.dnc-fraclist{display:flex;flex-wrap:wrap;gap:5px 12px;justify-content:center;max-width:280px}
.dnc-frac{font-family:'Archivo Black',sans-serif;font-size:13px;background:#f0f8f0;border:1.5px solid #4a9a5a;border-radius:5px;padding:3px 9px;color:#1a1a1a}
</style>
</head>

const ri=(a,b)=>Math.floor(Math.random()*(b-a+1))+a;
const eh=s=>s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

// ─── CROSS-NUMBER ────────────────────────────────────────────
function noReg(a,b){return(a%10)+(b%10)<10&&Math.floor(a/10)+Math.floor(b/10)<10}
function hasReg(a,b){return(a%10)+(b%10)>=10||Math.floor(a/10)+Math.floor(b/10)>=10}

function genCN(lv){
  for(let t=0;t<200000;t++){
    let a,b,c,d;
    if(lv===0){a=ri(1,9);b=ri(1,9);c=ri(1,9);d=ri(1,9);}
    else if(lv===1){
      a=ri(11,48);b=ri(11,48);c=ri(11,48);d=ri(11,48);
      if(!noReg(a,b)||!noReg(c,d)||!noReg(a,c)||!noReg(b,d))continue;
    }else if(lv===2){
      a=ri(13,78);b=ri(13,78);c=ri(13,78);d=ri(13,78);
      if(!hasReg(a,b)&&!hasReg(c,d))continue;
    }else{a=ri(102,450);b=ri(102,450);c=ri(102,450);d=ri(102,450);}
    const R1=a+b,R2=c+d,C1=a+c,C2=b+d,Tot=R1+R2;
    const m=ri(0,3);
    // Give the row sum that directly constrains the missing addend
    let hintSlot;
    if(m===0||m===1)hintSlot='R1';
    else if(m===2)hintSlot='R2';
    else hintSlot='C2';
    return{a,b,c,d,R1,R2,C1,C2,Tot,m,hintSlot};
  }
  return null;
}

// ─── TWO-OUT ─────────────────────────────────────────────────
const VP2=[];
(()=>{for(let r1=0;r1<3;r1++)for(let c1=0;c1<3;c1++)for(let r2=r1+1;r2<3;r2++)for(let c2=0;c2<3;c2++)if(c1!==c2)VP2.push([[r1,c1],[r2,c2]]);})();

function solve2Out(g,T){
  const sols=[];
  for(const[[r1,c1],[r2,c2]]of VP2){
    let ok=true;
    for(let r=0;r<3&&ok;r++){let s=0;for(let c=0;c<3;c++)if(!(r===r1&&c===c1)&&!(r===r2&&c===c2))s+=g[r][c];if(s!==T)ok=false;}
    for(let c=0;c<3&&ok;c++){let s=0;for(let r=0;r<3;r++)if(!(r===r1&&c===c1)&&!(r===r2&&c===c2))s+=g[r][c];if(s!==T)ok=false;}
    if(ok)sols.push([[r1,c1],[r2,c2]]);
  }
  return sols;
}

function gen2Out(lv){
  const cfgs=[[3,8,1,4],[5,14,1,8],[8,20,1,12]];
  const[Tlo,Thi,Vlo,Vhi]=cfgs[lv];
  for(let t=0;t<500000;t++){
    const T=ri(Tlo,Thi);
    const g=Array.from({length:3},()=>Array.from({length:3},()=>ri(Vlo,Vhi)));
    const sols=solve2Out(g,T);
    if(sols.length!==1)continue;
    const cx=new Set(sols[0].map(([r,c])=>`${r},${c}`));
    const rows=new Set();
    for(let r=0;r<3;r++){const k=[0,1,2].filter(c=>!cx.has(`${r},${c}`)).map(c=>g[r][c]).sort().join(',');rows.add(k);}
    if(rows.size<2)continue;
    return{grid:g,T,sol:sols[0]};
  }
  return null;
}

function render2Out(p,key){
  const{grid,T,sol}=p;
  const cx=key?new Set(sol.map(([r,c])=>`${r},${c}`)):new Set();
  let h=`<div class="to-wrap"><table class="to">`;

    }
    h+='</tr>';
  }
  h+=`</table><div class="to-target">Target Sum: <strong>${T}</strong></div></div>`;
  return h;
}

// ─── CRYPTARITHMS ────────────────────────────────────────────
function solveCrypto(top,bot,res){
  const ls=[...new Set([...top,...bot,...res].filter(x=>typeof x==='string'))].sort();
  if(ls.length>2)return[];
  const vr=(row,a)=>row.reduce((n,x)=>n*10+(typeof x==='number'?x:a[x]),0);
  const sols=[];
  for(let d0=0;d0<=9;d0++){
    const try1=(asn)=>{if([top,bot,res].some(r=>typeof r[0]==='string'&&asn[r[0]]===0))return;if(vr(top,asn)+vr(bot,asn)===vr(res,asn))sols.push({...asn});};
    if(ls.length===1){try1({[ls[0]]:d0});}
    else{for(let d1=0;d1<=9;d1++){if(d0!==d1)try1({[ls[0]]:d0,[ls[1]]:d1});}}
  }
  return sols;
}

function buildCryptoPool(){
  const pool=[],seen=new Set();
  function tryAdd(top,bot,res,typ){
    const k=JSON.stringify([top,bot,res]);if(seen.has(k))return;
    const sols=solveCrypto(top,bot,res);if(sols.length!==1)return;
    seen.add(k);pool.push({top,bot,res,assign:sols[0],typ});
  }
  for(let o1=0;o1<=9;o1++)for(let o2=0;o2<=9;o2++)tryAdd(['A',o1],['A',o2],['B','A'],1);
  for(let o1=1;o1<=9;o1++)for(let t2=1;t2<=9;t2++)for(let or=0;or<=9;or++)tryAdd(['A',o1],[t2,'A'],['B',or],2);
  for(let o2=0;o2<=9;o2++)tryAdd(['A','B'],['A',o2],['B','A'],3);
  for(let t2=1;t2<=9;t2++)tryAdd(['A','B'],[t2,'B'],['B','A'],4);
  return pool;
}

function pickCrypto(lv,usedSet){
  if(!cryptoPool)cryptoPool=buildCryptoPool();
  const typs=lv===0?[1]:lv===1?[1,2]:[2,3,4];
  let cands=cryptoPool.filter(p=>typs.includes(p.typ)&&!usedSet.has(JSON.stringify([p.top,p.bot,p.res])));
  if(!cands.length)cands=cryptoPool.filter(p=>!usedSet.has(JSON.stringify([p.top,p.bot,p.res])));
  if(!cands.length)return null;
  const p=cands[ri(0,cands.length-1)];
  usedSet.add(JSON.stringify([p.top,p.bot,p.res]));return p;
}

function renderCrypto(p,key){
  const{top,bot,res,assign}=p;
  const n=Math.max(top.length,bot.length,res.length);

// ─── MISMO ───────────────────────────────────────────────────
const MC=[];
(()=>{
  for(const o00 of['+','-','='])for(const o01 of['+','-','='])
  for(const o10 of['+','-','='])for(const o11 of['+','-','=']){
    if([o00,o01].filter(x=>x==='=').length===1&&[o10,o11].filter(x=>x==='=').length===1&&
       [o00,o10].filter(x=>x==='=').length===1&&[o01,o11].filter(x=>x==='=').length===1)
      MC.push([o00,o01,o10,o11]);
  }
})();
const mET=(a,p,b,q,c)=>p==='='&&q!=='='?a===(q==='+'?b+c:b-c):p!=='='&&q==='='?(p==='+'?a+b:a-b)===c:false;
const mCA=(ops,a,b,c,d,e,f,v1t,v1m,v1b,v2t,v2m,v2b)=>{
  const[o00,o01,o10,o11]=ops;
  return mET(a,o00,b,o01,c)&&mET(d,o10,e,o11,f)&&mET(v1t,o00,v1m,o10,v1b)&&mET(v2t,o01,v2m,o11,v2b);
};

function genMismo(lv){
  const rngs=[[1,5],[1,10],[1,15]];const[lo,hi]=rngs[lv];
  for(let t=0;t<300000;t++){
    const ops=MC[ri(0,MC.length-1)];const[o00,o01,o10,o11]=ops;
    const a=ri(lo,hi),b=ri(lo,hi),d=ri(lo,hi),e=ri(lo,hi);
    let c=o01==='='?(o00==='+'?a+b:a-b):(o01==='+'?a-b:b-a);
    let f=o11==='='?(o10==='+'?d+e:d-e):(o11==='+'?d-e:e-d);
    if(c<lo||c>hi||f<lo||f>hi)continue;
    const v1t=ri(lo,hi),v1m=ri(lo,hi),v2t=ri(lo,hi),v2m=ri(lo,hi);
    let v1b=o10==='='?(o00==='+'?v1t+v1m:v1t-v1m):(o10==='+'?v1t-v1m:v1m-v1t);
    let v2b=o11==='='?(o01==='+'?v2t+v2m:v2t-v2m):(o11==='+'?v2t-v2m:v2m-v2t);
    if(v1b<lo||v1b>hi||v2b<lo||v2b>hi)continue;
    if(!mCA(ops,a,b,c,d,e,f,v1t,v1m,v1b,v2t,v2m,v2b))continue;
    if(MC.some(alt=>!alt.every((op,i)=>op===ops[i])&&mCA(alt,a,b,c,d,e,f,v1t,v1m,v1b,v2t,v2m,v2b)))continue;
    return{ops,a,b,c,d,e,f,v1t,v1m,v1b,v2t,v2m,v2b};
  }
  return null;
}

function renderMismo(p,key){
  const{ops,a,b,c,d,e,f,v1t,v1m,v1b,v2t,v2m,v2b}=p;
  const[o00,o01,o10,o11]=ops;
  const N=v=>`<div class="ms-num">${v}</div>`;
  const C=op=>`<div class="ms-circ${key?' show':''}">${key?(op==='-'?'−':op):''}</div>`;
  const E=()=>`<div></div>`;
  // 5×5 grid: [emp,v1t,emp,v2t,emp], [a,O00,b,O01,c], [emp,v1m,emp,v2m,emp], [d,O10,e,O11,f], [emp,v1b,emp,v2b,emp]
  const rows=[[E(),N(v1t),E(),N(v2t),E()],[N(a),C(o00),N(b),C(o01),N(c)],[E(),N(v1m),E(),N(v2m),E()],[N(d),C(o10),N(e),C(o11),N(f)],[E(),N(v1b),E(),N(v2b),E()]];
  return`<div class="ms-grid" style="width:294px">${rows.flatMap(r=>r.map(cell=>`<div class="ms-cell">${cell}</div>`)).join('')}</div>`;
}

function hcMakePos(R,rows){
  const W=R*Math.sqrt(3),V=R*1.5;
  const M=Math.ceil(R*Math.sqrt(3)/2)+5;
  const pos=[];
  rows.forEach(([count,xOff],rowIdx)=>{
    for(let c=0;c<count;c++) pos.push([M+(xOff+c)*W, M+rowIdx*V]);
  });
  return pos;
}

// Randomised DFS for a Hamiltonian path on given adjacency list
function hcRandPath(adj,N){
  const vis=new Array(N).fill(false),path=[];
  function dfs(cur){
    vis[cur]=true;path.push(cur);
    if(path.length===N)return true;
    const nbs=[...adj[cur]].sort(()=>Math.random()-.5);
    for(const nb of nbs)if(!vis[nb]&&dfs(nb))return true;
    path.pop();vis[cur]=false;return false;
  }
  const starts=[...Array(N).keys()].sort(()=>Math.random()-.5);
  for(const s of starts)if(dfs(s))return path;
  return null;
}

// Count Hamiltonian paths consistent with mustBeAt (Map<cell→position>); stops at 2
let _hcSteps=0;
function hcCountPaths(adj,N,mustBeAt){
  const posReq=new Map();
  for(const[cell,pos]of mustBeAt){
    if(posReq.has(pos))return 99;
    posReq.set(pos,cell);
  }
  let count=0;_hcSteps=0;
  const vis=new Array(N).fill(false);
  function dfs(step,cur){
    if(count>=2||_hcSteps>250000)return;
    _hcSteps++;
    if(step===N){count++;return;}
    const req=posReq.get(step);
    for(const nb of adj[cur]){
      if(vis[nb])continue;
      const nbMust=mustBeAt.get(nb);
      if(nbMust!==undefined&&nbMust!==step)continue;
      if(req!==undefined&&nb!==req)continue;
      vis[nb]=true;dfs(step+1,nb);vis[nb]=false;
      if(count>=2||_hcSteps>250000)return;
    }
  }
  const startReq=posReq.get(0);
  if(startReq!==undefined){vis[startReq]=true;dfs(1,startReq);vis[startReq]=false;}
  else{
    for(let s=0;s<N;s++){
      const sMust=mustBeAt.get(s);
      if(sMust!==undefined&&sMust!==0)continue;
      vis[s]=true;dfs(1,s);vis[s]=false;
      if(count>=2||_hcSteps>250000)break;
    }
  }
  return _hcSteps>250000?99:count;
}

function hcIsUnique(adj,N,clues){
  const given=[];
  for(let c=0;c<N;c++)if(clues[c]!==null)given.push([c,clues[c]]);
  if(!given.length)return false;
  const[refCell,refVal]=given[0];
  let total=0;
  for(let refPos=0;refPos<N;refPos++){
    const sv=refVal-refPos;
    const mustBeAt=new Map();
    let ok=true;
    for(const[c,v]of given){
      const pos=v-sv;
      if(pos<0||pos>=N){ok=false;break;}
      mustBeAt.set(c,pos);
    }
    if(!ok)continue;
    total+=hcCountPaths(adj,N,mustBeAt);
    if(total>=2)return false;
  }
  return total===1;
}

function genHoneycomb(diffIdx){
  const gkey=HC_SIZE;
  const{N,ADJ,DIFFS}=HC_GRIDS[gkey];
  const{maxN,hide}=DIFFS[diffIdx];
  const svMax=Math.max(1,maxN-N+1);
  for(let att=0;att<1200;att++){
    const path=hcRandPath(ADJ,N);
    if(!path)continue;
    const sv=ri(1,svMax);
    const grid=new Array(N);
    for(let i=0;i<N;i++)grid[path[i]]=sv+i;
    const clues=[...grid];
    const order=[...Array(N).keys()].sort(()=>Math.random()-.5);
    let hidden=0;
    for(const cell of order){
      if(hidden>=hide)break;
      const bak=clues[cell];clues[cell]=null;
      if(hcIsUnique(ADJ,N,clues))hidden++;
      else clues[cell]=bak;
    }
    if(hidden>=hide-1)return{grid,path,sv,clues,gkey};
  }
  return null;
}

// ─── MULTIPLE MAZE ───────────────────────────────────────────
function mmNbrs(r,c,R,C){
  const o=[];
  if(r>0)   o.push([r-1,c]);
  if(r<R-1) o.push([r+1,c]);
  if(c>0)   o.push([r,c-1]);
  if(c<C-1) o.push([r,c+1]);
  return o;
}
function mmShuffle(a){
  for(let i=a.length-1;i>0;i--){const j=ri(0,i);[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

function mmBuildPath(R,C,start,finish){
  const total=R*C;
  const minLen=R>=7 ? R+C-1 : Math.max(R+C-1, Math.floor(total*0.38));
  const maxLen=Math.floor(total*0.62);
  const [fr,fc]=finish;
  const vis=Array.from({length:R},()=>new Array(C).fill(false));
  const path=[];
  const [sr,sc]=start;
  vis[sr][sc]=true; path.push([sr,sc]);
  const stack=[{nbs:mmShuffle(mmNbrs(sr,sc,R,C)), ni:0}];
  while(stack.length>0){
    const frame=stack[stack.length-1];
    const [cr,cc]=path[path.length-1];
    if(cr===fr&&cc===fc){
      if(path.length>=minLen) return path;
      vis[cr][cc]=false; path.pop(); stack.pop(); continue;
    }
    if(path.length>maxLen){ vis[cr][cc]=false; path.pop(); stack.pop(); continue; }
    let pushed=false;
    while(frame.ni<frame.nbs.length){
      const [nr,nc]=frame.nbs[frame.ni++];
      if(vis[nr][nc]) continue;
      vis[nr][nc]=true; path.push([nr,nc]);
      stack.push({nbs:mmShuffle(mmNbrs(nr,nc,R,C)), ni:0});
      pushed=true; break;
    }
    if(!pushed){ vis[cr][cc]=false; path.pop(); stack.pop(); }
  }
  return null;
}

function mmCountPaths(R,C,isMult,start,finish){
  const [fr,fc]=finish;
  let count=0, steps=0;
  const stepLimit=60000;
  const vis=Array.from({length:R},()=>new Array(C).fill(false));
  const [sr,sc]=start;
  vis[sr][sc]=true;
  const fNbs=(r,c)=>mmNbrs(r,c,R,C).filter(([nr,nc])=>isMult[nr][nc]);
  const stack=[{r:sr,c:sc,nbs:fNbs(sr,sc),ni:0}];
  while(stack.length>0&&count<2&&steps<stepLimit){
    steps++;
    const frame=stack[stack.length-1];
    let pushed=false;
    while(frame.ni<frame.nbs.length){
      const [nr,nc]=frame.nbs[frame.ni++];
      if(vis[nr][nc]) continue;
      if(nr===fr&&nc===fc){ count++; continue; }
      vis[nr][nc]=true;
      stack.push({r:nr,c:nc,nbs:fNbs(nr,nc),ni:0});
      pushed=true; break;
    }
    if(!pushed){ vis[frame.r][frame.c]=false; stack.pop(); }
  }
  return steps>=stepLimit?99:count;
}

function mmPickDistractors(k,n,used){
  // For even k, keep distractors even so wrong choices aren't obvious
  const evenOnly=k%2===0;
  const out=[];
  let guard=0;
  while(out.length<n&&guard++<3000){
    const m=k*ri(1,20);
    // offset: ±1 or ±2, but for even k use ±2 only (stays even, not a multiple)
    const off=evenOnly?(ri(0,1)===0?-2:2):([-1,1,-2,2,-3,3][ri(0,5)]);
    const c=m+off;
    if(c>0&&c%k!==0&&!used.has(c)){ used.add(c); out.push(c); }
  }
  // Fallback: small non-multiples with correct parity
  let fb=evenOnly?2:3;
  while(out.length<n){
    while(fb%k===0||used.has(fb)) fb+=evenOnly?2:1;
    used.add(fb); out.push(fb); fb+=evenOnly?2:1;
  }
  return out;
}

// Grid size config per DIFF level (0=4x4, 1=5x5, 2=6x6, 3=8x8)
const MM_CFG=[
  {R:4,C:4,count:4,cols:2,csz:52,fsz:15,gap:3},
  {R:5,C:5,count:4,cols:2,csz:45,fsz:14,gap:3},
  {R:6,C:6,count:2,cols:2,csz:44,fsz:13,gap:2},
  {R:8,C:8,count:1,cols:1,csz:50,fsz:13,gap:2},
];

async function genMaze(R,C,k,maxVal=k*24){
  const allMults=[];
  for(let m=k;m<=maxVal;m+=k) allMults.push(m);
  const deadMin=R<=4?2:R<=5?3:4;   // minimum dead-ends required
  const deadMax=R<=4?3:R<=5?5:7;   // cap to avoid cluttering grid
  const deadline=Date.now()+9000;
  for(let att=0;att<800;att++){
    if(att%20===0){
      await new Promise(r=>setTimeout(r,0));
      if(Date.now()>deadline) return null;
    }
    let start,finish;
    if(Math.random()<.5) start=[0,ri(0,C-1)]; else start=[ri(0,R-1),0];
    if(Math.random()<.5) finish=[R-1,ri(0,C-1)]; else finish=[ri(0,R-1),C-1];
    if(start[0]===finish[0]&&start[1]===finish[1]) continue;
    const md=Math.abs(start[0]-finish[0])+Math.abs(start[1]-finish[1]);
    if(md<Math.floor((R+C)/2)) continue;
    const path=mmBuildPath(R,C,start,finish);
    if(!path||path.length<4) continue;
    if(path.length>allMults.length) continue;
    const pLen=path.length;
    const mPool=mmShuffle([...allMults]);
    const grid  =Array.from({length:R},()=>new Array(C).fill(0));
    const isMult=Array.from({length:R},()=>new Array(C).fill(false));
    const isPath=Array.from({length:R},()=>new Array(C).fill(false));
    const used  =new Set();
    for(let i=0;i<pLen;i++){
      const [r,c]=path[i];
      grid[r][c]=mPool[i]; isMult[r][c]=true; isPath[r][c]=true; used.add(mPool[i]);
    }
    if(mmCountPaths(R,C,isMult,start,finish)!==1) continue;

    // Dead-ends: cells adjacent to the path that accept a multiple without
    // creating an alternative complete route to finish
    const adjSeen=new Set();
    const pathAdj=[];
    for(const [pr,pc] of path){
      for(const [nr,nc] of mmNbrs(pr,pc,R,C)){
        if(isPath[nr][nc]) continue;
        const key=nr*C+nc;
        if(adjSeen.has(key)) continue;
        adjSeen.add(key); pathAdj.push([nr,nc]);
      }
    }
    mmShuffle(pathAdj);
    let midx=pLen, deadAdded=0;
    for(const [r,c] of pathAdj){
      if(deadAdded>=deadMax||midx>=mPool.length) break;
      const val=mPool[midx];
      isMult[r][c]=true; grid[r][c]=val; used.add(val);
      if(mmCountPaths(R,C,isMult,start,finish)===1){
        deadAdded++; midx++;
      } else {
        isMult[r][c]=false; grid[r][c]=0; used.delete(val);
      }
    }
    if(deadAdded<deadMin) continue;  // not enough dead-ends — try again

    // Fill all remaining non-multiple cells with distractors
    const empties=[];
    for(let r=0;r<R;r++) for(let c=0;c<C;c++) if(!grid[r][c]) empties.push([r,c]);
    const distr=mmPickDistractors(k,empties.length,used);
    for(let i=0;i<empties.length;i++){ const [r,c]=empties[i]; grid[r][c]=distr[i]; }
    return {grid,path,isMult,isPath,start,finish,k,R,C};
  }
  return null;
}

// ─── 100-TRIANGLES ───────────────────────────────────────────
// Nodes: vals[0]=A(top), [1]=B(BL), [2]=C(BR), [3]=p(left-mid), [4]=q(bottom-mid), [5]=r(right-mid)
// Sides: A+p+B=100 → [0,1,3]; B+q+C=100 → [1,2,4]; A+r+C=100 → [0,2,5]
// Invalid show-3 configs: {A,B,p}=[0,1,3], {A,C,r}=[0,2,5], {B,C,q}=[1,2,4], {p,q,r}=[3,4,5]
const TRI_SIDES=[[0,1,3],[1,2,4],[0,2,5]];
const TRI_CFGS=(()=>{
  const deg=new Set(['0,1,3','0,2,5','1,2,4','3,4,5']);
  const out=[];
  for(let i=0;i<6;i++)for(let j=i+1;j<6;j++)for(let k=j+1;k<6;k++){
    if(!deg.has([i,j,k].join(',')))out.push([i,j,k]);
  }
  return out; // 16 valid configs
})();

function triSolve(vals,shown){
  // vals = full 6-element array; shown = indices visible to student
  const s=vals.map((v,i)=>shown.includes(i)?v:null);
  let ch=true;
  while(ch){ch=false;for(const[x,y,z]of TRI_SIDES){
    const kn=[x,y,z].filter(i=>s[i]!==null);
    if(kn.length===2){const u=[x,y,z].find(i=>s[i]===null);s[u]=100-kn.reduce((t,i)=>t+s[i],0);ch=true;}
  }}
  return s.every(v=>v!==null)?s:null;
}

function genTriangle(diff){
  const ok=diff===0?(v=>v%10===0):diff===1?(v=>v%2===0||v%5===0):(v=>v>0);
  const maxC=diff===0?40:diff===1?45:49;
  for(let t=0;t<60000;t++){
    const A=ri(1,maxC),B=ri(1,maxC),C=ri(1,maxC);
    const p=100-A-B,q=100-B-C,r=100-A-C;
    if(p<=0||q<=0||r<=0||p>=100||q>=100||r>=100) continue;
    const vals=[A,B,C,p,q,r];
    // Pick a random valid config
    const cfg=TRI_CFGS[ri(0,TRI_CFGS.length-1)];
    const blanks=[0,1,2,3,4,5].filter(i=>!cfg.includes(i));
    if(!blanks.every(i=>ok(vals[i]))) continue;
    if(blanks.map(i=>vals[i]).every(v=>v===vals[blanks[0]])) continue; // all-same blanks trivial
    return{vals,shown:cfg};
  }
  return null;
}

function renderTriangle(puz,key){

  const ax=98,ay=18, bx=18,by=158, cx=178,cy=158;

    } else {
      return`<circle cx="${x}" cy="${y}" r="${rad}" fill="#fff" stroke="#333" stroke-width="2"/>`;
    }
  };

  let s=`<svg viewBox="0 0 196 176" width="196" height="176" xmlns="http://www.w3.org/2000/svg">`;
  s+=`<line x1="${ax}" y1="${ay}" x2="${bx}" y2="${by}" stroke="#666" stroke-width="2.5"/>`;

  for(const i of [3,4,5]) s+=node(i);

// ─── X-OUT ───────────────────────────────────────────────────
const XO_CFGS=[
  {N:4,lo:1,hi:9},
  {N:4,lo:2,hi:12},
  {N:5,lo:1,hi:9},
];
function genXOut(diff){
  const{N,lo,hi}=XO_CFGS[diff];
  for(let att=0;att<50000;att++){
    const perm=Array.from({length:N},(_,i)=>i);
    for(let i=N-1;i>0;i--){const j=ri(0,i);[perm[i],perm[j]]=[perm[j],perm[i]];}
    const Tmin=Math.ceil(lo*(N-1)+(hi-lo)*(N-1)*0.25);
    const Tmax=Math.floor(hi*(N-1)-(hi-lo)*(N-1)*0.25);
    if(Tmin>Tmax)continue;
    const T=ri(Tmin,Tmax);
    const grid=Array.from({length:N},()=>new Array(N).fill(0));
    let ok=true;
    for(let r=0;r<N&&ok;r++){
      const free=Array.from({length:N},(_,c)=>c).filter(c=>c!==perm[r]);
      const M=N-1;
      let tries=0,rowOk=false;
      while(tries++<500&&!rowOk){
        const used=new Set(),vals=[];
        let rem=T,ok2=true;
        for(let i=0;i<M-1;i++){
          const vhi=Math.min(hi,rem-lo*(M-1-i));
          if(lo>vhi){ok2=false;break;}
          let v,t2=0;
          do{v=ri(lo,vhi);}while(used.has(v)&&++t2<40);
          if(used.has(v)){ok2=false;break;}
          used.add(v);vals.push(v);rem-=v;
        }
        if(!ok2||rem<lo||rem>hi||used.has(rem))continue;
        vals.push(rem);
        for(let i=0;i<M;i++)grid[r][free[i]]=vals[i];
        rowOk=true;
      }
      if(!rowOk){ok=false;}
    }
    if(!ok)continue;
    let colOk=true;
    for(let c=0;c<N&&colOk;c++){
      const cs=grid.reduce((s,row,r)=>r===perm.indexOf(c)?s:s+row[c],0);
      if(cs!==T)colOk=false;
    }
    if(!colOk)continue;
    for(let r=0;r<N;r++){
      const fv=Array.from({length:N},(_,c)=>c).filter(c=>c!==perm[r]).map(c=>grid[r][c]);
      const avg=Math.round(fv.reduce((a,b)=>a+b,0)/(N-1));
      grid[r][perm[r]]=ri(Math.max(lo,avg-2),Math.min(hi,avg+2));
    }
    const sol=new Array(N);
    for(let r=0;r<N;r++)sol[perm[r]]=r;
    const rowSums=grid.map(row=>row.reduce((s,v)=>s+v,0));
    let altFound=false;
    const colUsed=new Array(N).fill(false),altPerm=new Array(N).fill(-1);
    function bt(r){
      if(altFound)return;
      if(r===N){
        for(let c=0;c<N;c++){const cs=grid.reduce((s,row,ri)=>ri===altPerm[c]?s:s+row[c],0);if(cs!==T)return;}
        for(let c=0;c<N;c++)if(altPerm[c]!==sol[c]){altFound=true;return;}
        return;
      }
      const need=rowSums[r]-T;
      for(let c=0;c<N;c++){
        if(!colUsed[c]&&grid[r][c]===need){
          colUsed[c]=true;altPerm[c]=r;bt(r+1);colUsed[c]=false;altPerm[c]=-1;if(altFound)return;
        }
      }
    }
    bt(0);
    if(altFound)continue;
    return{grid,T,N,sol};
  }
  return null;
}
function renderXOut(puz,key){
  const{grid,T,N,sol}=puz;
  const sz=N===4?'xo-4':'xo-5';
  let h=`<div class="xo-wrap"><table class="xo">`;
  for(let r=0;r<N;r++){
    h+='<tr>';
    for(let c=0;c<N;c++){
      const isCrossed=key&&sol[c]===r;
      h+=`<td class="${sz}${isCrossed?' crossed':''}">`;
      h+=grid[r][c];
      if(isCrossed)h+=`<span class="xo-cxmark">✕</span>`;
      h+='</td>';
    }
    h+='</tr>';
  }
  h+=`</table><div class="xo-target">Target Sum: <strong>${T}</strong></div></div>`;
  return h;
}


// ─── MEGA MISMO ──────────────────────────────────────────────
// 7×7 display grid: operators O[i][j] at (2i+1, 2j+1), i,j∈{0,1,2}
// Each row equation i: RN[i][0..3] with ops O[i][0], O[i][1], O[i][2]
// Each col equation j: CN[j][0..3] with ops O[0][j], O[1][j], O[2][j]
// Constraint: O forms a permutation of '=' — exactly one '=' per row and col

const MGM_PERMS=[[0,1,2],[0,2,1],[1,0,2],[1,2,0],[2,0,1],[2,1,0]];
const MGM_OPS=(()=>{
  const out=[];
  for(const perm of MGM_PERMS)for(let bits=0;bits<64;bits++){
    const O=[[],[],[]];let bit=0;
    for(let i=0;i<3;i++)for(let j=0;j<3;j++){
      if(j===perm[i])O[i][j]='=';else{O[i][j]=(bits>>bit)&1?'-':'+';bit++;}
    }
    out.push(O);
  }
  return out; // 384 valid operator matrices
})();

function mgmEval(a,b,c,d,ops){
  const eq=ops.indexOf('=');
  if(eq===0){const mid=ops[1]==='+'?b+c:b-c;return a===(ops[2]==='+'?mid+d:mid-d);}
  if(eq===1){const L=ops[0]==='+'?a+b:a-b,R=ops[2]==='+'?c+d:c-d;return L===R;}
  const mid=ops[0]==='+'?a+b:a-b;return(ops[1]==='+'?mid+c:mid-c)===d;
}
function mgmDerive(a,b,c,ops){
  const eq=ops.indexOf('=');
  if(eq===0){const mid=ops[1]==='+'?b+c:b-c;return ops[2]==='+'?a-mid:mid-a;}
  if(eq===1){const L=ops[0]==='+'?a+b:a-b;return ops[2]==='+'?L-c:c-L;}
  const mid=ops[0]==='+'?a+b:a-b;return ops[1]==='+'?mid+c:mid-c;
}
function mgmIsUnique(RN,CN){
  let count=0;
  for(const O of MGM_OPS){
    let ok=true;
    for(let i=0;i<3&&ok;i++) if(!mgmEval(RN[i][0],RN[i][1],RN[i][2],RN[i][3],O[i])) ok=false;
    for(let j=0;j<3&&ok;j++) if(!mgmEval(CN[j][0],CN[j][1],CN[j][2],CN[j][3],[O[0][j],O[1][j],O[2][j]])) ok=false;
    if(ok){count++;if(count>1)return false;}
  }
  return count===1;
}

const MGM_RNGS=[[1,12],[1,20],[1,30]];
function genMegaMismo(diff){
  const[lo,hi]=MGM_RNGS[diff];
  for(let t=0;t<60000;t++){
    const O=MGM_OPS[ri(0,MGM_OPS.length-1)];
    const RN=[];let rowOk=true;
    for(let i=0;i<3;i++){
      let a,b,c,d,ok=false;
      for(let tr=0;tr<60;tr++){
        a=ri(lo,hi);b=ri(lo,hi);c=ri(lo,hi);d=mgmDerive(a,b,c,O[i]);
        if(d>=lo&&d<=hi){ok=true;break;}
      }
      if(!ok){rowOk=false;break;}
      RN.push([a,b,c,d]);
    }
    if(!rowOk) continue;
    const CN=[];let colOk=true;
    for(let j=0;j<3;j++){
      const cops=[O[0][j],O[1][j],O[2][j]];
      let a,b,c,d,ok=false;
      for(let tr=0;tr<60;tr++){
        a=ri(lo,hi);b=ri(lo,hi);c=ri(lo,hi);d=mgmDerive(a,b,c,cops);
        if(d>=lo&&d<=hi){ok=true;break;}
      }
      if(!ok){colOk=false;break;}
      CN.push([a,b,c,d]);
    }
    if(!colOk) continue;
    if(!mgmIsUnique(RN,CN)) continue;
    return{RN,CN,O};
  }
  return null;
}

function renderMegaMismo(puz,key){
  const{RN,CN,O}=puz;
  const N=v=>`<div class="mgm-num">${v}</div>`;
  const C=op=>`<div class="mgm-circ${key?' show':''}">${key?(op==='-'?'\u2212':op):''}</div>`;
  const E=()=>`<div></div>`;
  const cells=[];
  for(let dr=0;dr<7;dr++){
    for(let dc=0;dc<7;dc++){
      if(dr%2===1&&dc%2===1)      cells.push(C(O[(dr-1)/2][(dc-1)/2]));
      else if(dr%2===1&&dc%2===0) cells.push(N(RN[(dr-1)/2][dc/2]));
      else if(dr%2===0&&dc%2===1) cells.push(N(CN[(dc-1)/2][dr/2]));
      else                         cells.push(E());
    }
  }
  return`<div class="mgm-grid">${cells.map(c=>`<div class="mgm-cell">${c}</div>`).join('')}</div>`;
}


// ─── FACTOR BLOB ─────────────────────────────────────────────
const FB_TARGET_POOLS=[
  [12,15,18,20,24,28,30],
  [24,30,36,40,42,48,60],
  [36,48,60,72,80,90],
];
function fbNbrs(pos,N){const r=pos/N|0,c=pos%N,o=[];if(r>0)o.push(pos-N);if(r<N-1)o.push(pos+N);if(c>0)o.push(pos-1);if(c<N-1)o.push(pos+1);return o;}
function fbFactorSets(n,k,minV){if(minV===undefined)minV=2;if(k===1)return n>=minV?[[n]]:[];const res=[];for(let d=minV;d<=n;d++)if(n%d===0)for(const r of fbFactorSets(n/d,k-1,d))res.push([d,...r]);return res;}
function fbSolve(grid,N,T,limit){
  if(limit===undefined)limit=400000;
  const total=N*N,assign=new Array(total).fill(-1),bProd=[],bSz=[];
  let sols=0,steps=0,firstSol=null;
  function bt(pos){
    if(sols>=2||++steps>limit)return;
    if(pos===total){if(bSz.every((sz,i)=>sz>=2&&bProd[i]===T)){if(!firstSol)firstSol=assign.slice();sols++;}return;}
    const v=grid[pos];if(T%v!==0)return;
    const tried=new Set();
    for(const n of fbNbrs(pos,N)){const bid=assign[n];if(bid<0||tried.has(bid))continue;tried.add(bid);if(bProd[bid]===T)continue;const np=bProd[bid]*v;if(np>T||T%np!==0)continue;bProd[bid]=np;bSz[bid]++;assign[pos]=bid;bt(pos+1);assign[pos]=-1;bSz[bid]--;bProd[bid]/=v;if(sols>=2)return;}
    bProd.push(v);bSz.push(1);assign[pos]=bProd.length-1;bt(pos+1);assign[pos]=-1;bProd.pop();bSz.pop();
  }
  bt(0);return{sols:steps>=limit?99:sols,firstSol};
}
function fbGenPartition(N){
  const total=N*N,assign=new Array(total).fill(-1),blobs=[];
  const seeds=Array.from({length:total},(_,i)=>i);for(let i=seeds.length-1;i>0;i--){const j=ri(0,i);[seeds[i],seeds[j]]=[seeds[j],seeds[i]];}
  for(const seed of seeds){
    if(assign[seed]!==-1)continue;
    const bid=blobs.length,blob=[seed];assign[seed]=bid;blobs.push(blob);
    const target=ri(2,4);
    for(let g=0;g<target-1;g++){const cands=[];for(const c of blob)for(const n of fbNbrs(c,N))if(assign[n]===-1)cands.push(n);if(!cands.length)break;const next=cands[ri(0,cands.length-1)];blob.push(next);assign[next]=bid;}
  }
  for(let bid=0;bid<blobs.length;bid++){if(!blobs[bid]||blobs[bid].length!==1)continue;const cell=blobs[bid][0];let bestBid=-1;for(const n of fbNbrs(cell,N)){const nb=assign[n];if(nb!==bid&&blobs[nb]&&blobs[nb].length<=4){bestBid=nb;break;}}if(bestBid<0)return null;blobs[bestBid].push(cell);assign[cell]=bestBid;blobs[bid]=null;}
  return blobs.filter(Boolean);
}
function genFactorBlob(diff){
  const N=FB_N, pool=FB_TARGET_POOLS[diff];
  const targets=[...pool];for(let i=targets.length-1;i>0;i--){const j=ri(0,i);[targets[i],targets[j]]=[targets[j],targets[i]];}
  for(const T of targets){
    for(let att=0;att<300;att++){
      const blobs=fbGenPartition(N);if(!blobs)continue;
      const grid=new Array(N*N).fill(0);let ok=true;
      for(const blob of blobs){
        const choices=fbFactorSets(T,blob.length,2);if(!choices.length){ok=false;break;}
        const choice=[...choices[ri(0,choices.length-1)]];for(let i=choice.length-1;i>0;i--){const j=ri(0,i);[choice[i],choice[j]]=[choice[j],choice[i]];}
        const blobS=[...blob];for(let i=blobS.length-1;i>0;i--){const j=ri(0,i);[blobS[i],blobS[j]]=[blobS[j],blobS[i]];}
        for(let i=0;i<blob.length;i++)grid[blobS[i]]=choice[i];
      }
      if(!ok)continue;
      const{sols,firstSol}=fbSolve(grid,N,T);
      if(sols===1)return{grid,N,T,solAssign:firstSol};
    }
  }
  return null;
}
function renderFactorBlob(puz,key){

  const fsz=N<=3?22:N<=4?18:N<=5?15:13;
  const totalPx=N*csz,STROKE=3.5,HALF=STROKE/2;
  const membership=key?solAssign:null;
  let cells='';
  for(let r=0;r<N;r++)for(let c=0;c<N;c++){
    const pos=r*N+c,v=grid[pos],x=c*csz,y=r*csz,fsize=v>=100?fsz-2:fsz;
    cells+=`<rect x="${x}" y="${y}" width="${csz}" height="${csz}" fill="#f8f8f8" stroke="#ddd" stroke-width="0.8"/>`;

  }
  let blobLines='';
  if(key&&membership){
    const BW=4,BC='#1B4FCC';
    for(let r=0;r<N;r++)for(let c=0;c<N;c++){
      const pos=r*N+c,bid=membership[pos],x=c*csz,y=r*csz,h=BW/2;
      if(r===0||membership[(r-1)*N+c]!==bid) blobLines+=`<line x1="${x+h}" y1="${y+h}" x2="${x+csz-h}" y2="${y+h}" stroke="${BC}" stroke-width="${BW}" stroke-linecap="round"/>`;
      if(r===N-1||membership[(r+1)*N+c]!==bid) blobLines+=`<line x1="${x+h}" y1="${y+csz-h}" x2="${x+csz-h}" y2="${y+csz-h}" stroke="${BC}" stroke-width="${BW}" stroke-linecap="round"/>`;
      if(c===0||membership[r*N+(c-1)]!==bid) blobLines+=`<line x1="${x+h}" y1="${y+h}" x2="${x+h}" y2="${y+csz-h}" stroke="${BC}" stroke-width="${BW}" stroke-linecap="round"/>`;
      if(c===N-1||membership[r*N+(c+1)]!==bid) blobLines+=`<line x1="${x+csz-h}" y1="${y+h}" x2="${x+csz-h}" y2="${y+csz-h}" stroke="${BC}" stroke-width="${BW}" stroke-linecap="round"/>`;
    }

  const outer=`<rect x="${HALF}" y="${HALF}" width="${totalPx-STROKE}" height="${totalPx-STROKE}" fill="none" stroke="#2a2a2a" stroke-width="${STROKE}"/>`;

}

// ─── DON STEWARD PRODUCT PUZZLES ─────────────────────────────
function genProductPuzzle(){
  const MIN=2, MAX=9;
  const seen=new Set();
  for(let attempt=0;attempt<2000;attempt++){
    const a=ri(MIN,MAX), b=ri(MIN,MAX), c=ri(MIN,MAX), d=ri(MIN,MAX);
    const R1=a*b, R2=c*d, C1=a*c, C2=b*d;
    const key=[R1,R2,C1,C2].join(',');
    if(seen.has(key)) continue;
    seen.add(key);
    // Count solutions
    let sols=0;
    for(let p=MIN;p<=MAX;p++){
      if(R1%p!==0) continue;
      const q=R1/p; if(q<MIN||q>MAX) continue;
      if(C1%p!==0) continue;
      const r=C1/p; if(r<MIN||r>MAX) continue;
      if(R2%r!==0) continue;
      const s=R2/r; if(s<MIN||s>MAX) continue;
      if(q*s===C2) sols++;
    }
    if(sols===1) return{R1,R2,C1,C2,a,b,c,d};
  }
  return null;
}

function renderProductPuzzle(p,key){
  const cell=(v)=>`<td style="width:54px;height:54px;border:1.5px solid #2a2a2a;text-align:center;vertical-align:middle;font-size:26px;font-weight:800;font-family:'Nunito',sans-serif;color:#1a1a1a">${v}</td>`;
  const rowLabel=(v)=>`<td style="padding-left:10px;font-size:22px;font-weight:800;font-family:'Nunito',sans-serif;color:#1a1a1a;vertical-align:middle">${v}</td>`;
  const a=key?p.a:'', b=key?p.b:'', c=key?p.c:'', d=key?p.d:'';
  return`<table style="border-collapse:collapse;margin:auto">
    <tr>${cell(a)}${cell(b)}${rowLabel(p.R1)}</tr>
    <tr>${cell(c)}${cell(d)}${rowLabel(p.R2)}</tr>
    <tr>
      <td style="text-align:center;font-size:22px;font-weight:800;font-family:'Nunito',sans-serif;color:#1a1a1a;padding-top:8px">${p.C1}</td>
      <td style="text-align:center;font-size:22px;font-weight:800;font-family:'Nunito',sans-serif;color:#1a1a1a;padding-top:8px">${p.C2}</td>
      <td></td>
    </tr>
  </table>`;
}

// ─── KENKEN ──────────────────────────────────────────────────
const KK_CFG=[{N:3},{N:4},{N:5},{N:6}];
// Max acceptable × product per grid size (keeps targets classroom-friendly)
const KK_MAX_PROD=[0,0,0,9,24,60,120];

function kkLatinSquare(N){
  // Generate base shifted square, then shuffle rows/cols/labels
  let sq=Array.from({length:N},(_,i)=>Array.from({length:N},(_,j)=>(i+j)%N+1));
  for(let i=N-1;i>0;i--){const j=ri(0,i);[sq[i],sq[j]]=[sq[j],sq[i]];}
  const cp=Array.from({length:N},(_,i)=>i);
  for(let i=N-1;i>0;i--){const j=ri(0,i);[cp[i],cp[j]]=[cp[j],cp[i]];}
  sq=sq.map(row=>cp.map(c=>row[c]));
  const lp=Array.from({length:N},(_,i)=>i+1);
  for(let i=N-1;i>0;i--){const j=ri(0,i);[lp[i],lp[j]]=[lp[j],lp[i]];}
  return sq.map(row=>row.map(v=>lp[v-1]));
}

function kkPartition(N){
  const assigned=Array.from({length:N},()=>new Array(N).fill(-1));
  const cages=[];
  const order=[];
  for(let r=0;r<N;r++)for(let c=0;c<N;c++)order.push([r,c]);
  for(let i=order.length-1;i>0;i--){const j=ri(0,i);[order[i],order[j]]=[order[j],order[i]];}
  for(const[sr,sc]of order){
    if(assigned[sr][sc]!==-1)continue;
    const bid=cages.length;
    const cage=[[sr,sc]];
    assigned[sr][sc]=bid;
    // 3×3: mix of 1- and 2-cell cages for better uniqueness; larger: 2-3 cells
    const maxSz=N<=3?(Math.random()<0.45?1:2):ri(2,3);
    for(let g=0;g<maxSz-1;g++){
      const cands=[];
      for(const[r,c]of cage)
        for(const[nr,nc]of[[r-1,c],[r+1,c],[r,c-1],[r,c+1]])
          if(nr>=0&&nr<N&&nc>=0&&nc<N&&assigned[nr][nc]===-1)cands.push([nr,nc]);
      if(!cands.length)break;
      const pick=cands[ri(0,cands.length-1)];
      cage.push(pick);
      assigned[pick[0]][pick[1]]=bid;
    }
    cages.push(cage);
  }
  return cages;
}

function kkMakeCages(sq,N,diff){
  const allowMult=diff>=2;
  const maxProd=KK_MAX_PROD[N]||N*N;
  const cages=[];
  for(const cells of kkPartition(N)){
    cells.sort((a,b)=>a[0]!==b[0]?a[0]-b[0]:a[1]-b[1]);
    const vals=cells.map(([r,c])=>sq[r][c]);
    let op,target;
    if(cells.length===1){
      op=null; target=vals[0];
    } else if(cells.length===2){
      // 2-cell cages: +, −, or × (if allowed and product is reasonable)
      const sum=vals[0]+vals[1];
      const dif=Math.abs(vals[0]-vals[1]);
      const prod=vals[0]*vals[1];
      const choices=['+','-'];
      if(allowMult&&prod<=maxProd)choices.push('×');
      op=choices[ri(0,choices.length-1)];
      if(op==='+')target=sum;
      else if(op==='-')target=dif;
      else{op='×';target=prod;}
    } else {
      // 3+ cells: + or × only (no subtraction for multi-cell)
      const prod=vals.reduce((a,v)=>a*v,1);
      const sum=vals.reduce((a,v)=>a+v,0);
      if(allowMult&&prod<=maxProd&&Math.random()<0.4){op='×';target=prod;}
      else{op='+';target=sum;}
    }
    cages.push({cells,op,target});
  }
  return cages;
}

function kkSolve(N,cages,limit=600000){
  const cageOf=Array.from({length:N},()=>new Array(N).fill(-1));
  for(let ci=0;ci<cages.length;ci++)
    for(const[r,c]of cages[ci].cells)cageOf[r][c]=ci;
  const rowUsed=Array.from({length:N},()=>new Set());
  const colUsed=Array.from({length:N},()=>new Set());
  const cageFilled=new Array(cages.length).fill(0);
  // acc init: 0 for +/−, 1 for ×
  const cageAcc=cages.map(cg=>cg.op==='×'?1:0);
  let count=0,steps=0;
  function bt(idx){
    if(count>=2||++steps>limit)return;
    if(idx===N*N){count++;return;}
    const r=idx/N|0,c=idx%N;
    const ci=cageOf[r][c],cage=cages[ci];
    // given cell
    if(cage.op===null){
      const v=cage.target;
      if(!rowUsed[r].has(v)&&!colUsed[c].has(v)){
        rowUsed[r].add(v);colUsed[c].add(v);
        bt(idx+1);
        rowUsed[r].delete(v);colUsed[c].delete(v);
      }
      return;
    }
    const isLast=cageFilled[ci]+1===cage.cells.length;
    for(let v=1;v<=N;v++){
      if(rowUsed[r].has(v)||colUsed[c].has(v))continue;
      const prev=cageAcc[ci];
      let acc,ok=true;
      if(cage.op==='+'){
        acc=prev+v;
        if(acc>cage.target)ok=false;
        else if(isLast&&acc!==cage.target)ok=false;
      } else if(cage.op==='×'){
        acc=prev*v;
        if(acc>cage.target||cage.target%acc!==0)ok=false;
        else if(isLast&&acc!==cage.target)ok=false;
      } else {
        // subtraction: always 2-cell; acc stores first value, check on isLast
        if(!isLast){
          acc=v; // store first placed value
        } else {
          if(Math.abs(prev-v)!==cage.target)ok=false;
          acc=v; // value doesn't matter after isLast
        }
      }
      if(!ok)continue;
      rowUsed[r].add(v);colUsed[c].add(v);
      cageFilled[ci]++;cageAcc[ci]=acc;
      bt(idx+1);
      cageFilled[ci]--;cageAcc[ci]=prev;
      rowUsed[r].delete(v);colUsed[c].delete(v);
      if(count>=2)return;
    }
  }
  bt(0);
  return steps>limit?99:count;
}

async function genKenKen(diff){
  const N=KK_CFG[diff].N;
  const maxAttempts=N<=3?600:400;
  const deadline=Date.now()+9000;
  for(let attempt=0;attempt<maxAttempts;attempt++){
    if(attempt%8===0){
      await new Promise(r=>setTimeout(r,0));
      if(Date.now()>deadline)return null;
    }
    const sq=kkLatinSquare(N);
    const cages=kkMakeCages(sq,N,diff);
    const sols=kkSolve(N,cages);
    if(sols===1)return{N,sq,cages};
  }
  return null;
}

function renderKenKen(puz,key){
  const{N,sq,cages}=puz;
  const csz=N<=3?78:N<=4?70:N<=5?60:52;
  const totalPx=N*csz;
  const OUTER=4,THICK=3.5,THIN=0.8;

  // Build cage-membership map
  const cageOf=Array.from({length:N},()=>new Array(N).fill(-1));
  for(let ci=0;ci<cages.length;ci++)
    for(const[r,c]of cages[ci].cells)cageOf[r][c]=ci;

  const vfsz=Math.round(csz*0.44);
  const lblfsz=Math.round(csz*0.215);
  const lblPad=Math.round(csz*0.07)+1;
  const oh=OUTER/2;

  let svg=`<svg width="${totalPx}" height="${totalPx}" xmlns="http://www.w3.org/2000/svg" style="display:block;margin:auto">`;

  // Cell backgrounds
  for(let r=0;r<N;r++)for(let c=0;c<N;c++)
    svg+=`<rect x="${c*csz}" y="${r*csz}" width="${csz}" height="${csz}" fill="#fafafa"/>`;

  // Thin background grid
  for(let r=1;r<N;r++)
    svg+=`<line x1="0" y1="${r*csz}" x2="${totalPx}" y2="${r*csz}" stroke="#ddd" stroke-width="${THIN}"/>`;
  for(let c=1;c<N;c++)
    svg+=`<line x1="${c*csz}" y1="0" x2="${c*csz}" y2="${totalPx}" stroke="#ddd" stroke-width="${THIN}"/>`;

  // Thick cage boundaries — horizontal edges
  for(let r=1;r<N;r++){
    let segStart=-1;
    for(let c=0;c<=N;c++){
      const boundary=c<N&&cageOf[r][c]!==cageOf[r-1][c];
      if(boundary&&segStart<0){segStart=c;}
      else if(!boundary&&segStart>=0){
        svg+=`<line x1="${segStart*csz}" y1="${r*csz}" x2="${c*csz}" y2="${r*csz}" stroke="#1a1a1a" stroke-width="${THICK}" stroke-linecap="square"/>`;
        segStart=-1;
      }
    }
  }
  // Thick cage boundaries — vertical edges
  for(let c=1;c<N;c++){
    let segStart=-1;
    for(let r=0;r<=N;r++){
      const boundary=r<N&&cageOf[r][c]!==cageOf[r][c-1];
      if(boundary&&segStart<0){segStart=r;}
      else if(!boundary&&segStart>=0){
        svg+=`<line x1="${c*csz}" y1="${segStart*csz}" x2="${c*csz}" y2="${r*csz}" stroke="#1a1a1a" stroke-width="${THICK}" stroke-linecap="square"/>`;
        segStart=-1;
      }
    }
  }

  // Outer border (drawn last so it's clean)
  svg+=`<rect x="${oh}" y="${oh}" width="${totalPx-OUTER}" height="${totalPx-OUTER}" fill="none" stroke="#1a1a1a" stroke-width="${OUTER}" stroke-linejoin="miter"/>`;

  // Cage labels (top-left cell of each cage, cells[0] is reading-order first)
  for(let ci=0;ci<cages.length;ci++){
    const cage=cages[ci];
    const[lr,lc]=cage.cells[0];
    const x=lc*csz+lblPad, y=lr*csz+lblPad;
    const txt=cage.op===null?`${cage.target}`:`${cage.target}${cage.op==='×'?'×':cage.op==='-'?'−':'+'}`;
    svg+=`<text x="${x}" y="${y+lblfsz}" font-family="Archivo,sans-serif" font-weight="800" font-size="${lblfsz}" fill="#555">${txt}</text>`;
  }

  // Values: in key mode fill all; always show given (1-cell) cells in student mode
  for(let r=0;r<N;r++)for(let c=0;c<N;c++){
    const ci=cageOf[r][c],cage=cages[ci],isGiven=cage.op===null;
    if(key||isGiven){
      const fill=isGiven&&!key?'#1B4FCC':'#1a1a1a';
      svg+=`<text x="${c*csz+csz/2}" y="${r*csz+csz/2+1}" text-anchor="middle" dominant-baseline="middle" font-family="Nunito,sans-serif" font-weight="800" font-size="${vfsz}" fill="${fill}">${sq[r][c]}</text>`;
    }
  }

  svg+='</svg>';
  return svg;
}

// ─── TWO STEP PUZZLES ─────────────────────────────────────────
function tsApply(x,s){
  if(s.op==='+')return x+s.val;
  if(s.op==='-')return x-s.val;
  if(s.op==='×')return x*s.val;
  if(s.op==='÷')return(x%s.val===0)?x/s.val:null;
  return null;
}
function tsLabel(s){return`${s.op==='×'?'×':s.op==='÷'?'÷':s.op}${s.val}`;}

function tsCountSols(out1,out2,steps){
  let n=0;
  for(let si=0;si<steps.length;si++){
    for(let sj=0;sj<steps.length;sj++){
      if(si===sj)continue;
      const sA=steps[si],sB=steps[sj];
      let x=null;
      if(sA.op==='+')x=out1-sA.val;
      else if(sA.op==='-')x=out1+sA.val;
      else if(sA.op==='×'){if(out1%sA.val===0)x=out1/sA.val;}
      else if(sA.op==='÷')x=out1*sA.val;
      if(x===null||x<=0||!Number.isInteger(x))continue;
      if(tsApply(x,sB)===out2)n++;
    }
  }
  return n;
}

function tsMakeAddSubSteps(){
  for(let t=0;t<2000;t++){
    const a1=ri(1,9),a2=ri(2,12),s1=ri(1,9),s2=ri(2,12);
    if(new Set([a1,a2,s1,s2]).size<4)continue;
    return[{op:'+',val:a1},{op:'+',val:a2},{op:'-',val:s1},{op:'-',val:s2}];
  }
}
function tsMakeFullSteps(){
  for(let t=0;t<2000;t++){
    const add=ri(2,9),mul=ri(2,6),sub=ri(2,9),div=ri(2,5);
    if(add===sub)continue;
    return[{op:'+',val:add},{op:'×',val:mul},{op:'-',val:sub},{op:'÷',val:div}];
  }
}
function tsGenOne(steps,usedInputs){
  const pairs=[];
  for(let i=0;i<steps.length;i++)for(let j=0;j<steps.length;j++)if(i!==j)pairs.push([i,j]);
  for(let t=0;t<4000;t++){
    const x=ri(3,30);
    if(usedInputs.has(x))continue;
    const pp=[...pairs];
    for(let i=pp.length-1;i>0;i--){const j=ri(0,i);[pp[i],pp[j]]=[pp[j],pp[i]];}
    for(const[si,sj]of pp){
      const sA=steps[si],sB=steps[sj];
      const out1=tsApply(x,sA),out2=tsApply(x,sB);
      if(out1===null||out2===null)continue;
      if(out1<=0||out2<=0)continue;
      if(!Number.isInteger(out1)||!Number.isInteger(out2))continue;
      if(out1>99||out2>99)continue;
      if(out1===x||out2===x)continue;
      if(out1===out2)continue;
      if(tsCountSols(out1,out2,steps)!==1)continue;
      return{input:x,b1:{step:sA,out:out1},b2:{step:sB,out:out2}};
    }
  }
  return null;
}
function genTwoStepSet(diff){
  for(let attempt=0;attempt<300;attempt++){
    const steps=diff===0?tsMakeAddSubSteps():tsMakeFullSteps();
    if(!steps)continue;
    const puzzles=[],usedInputs=new Set();
    for(let i=0;i<4;i++){
      const p=tsGenOne(steps,usedInputs);
      if(!p)break;
      puzzles.push(p);
      usedInputs.add(p.input);
    }
    if(puzzles.length===4)return{steps,puzzles};
  }
  return null;
}

function renderTwoStep(puz,isKey){
  const W=310,H=150;
  const inX=8,inY=42,inW=68,inH=62,inRx=13;
  const inCX=inX+inW/2,inCY=inY+inH/2;
  const outW=70,outH=52,outRx=13;
  const out1X=228,out1Y=8,out1CY=out1Y+outH/2;
  const out2X=228,out2Y=88,out2CY=out2Y+outH/2;
  const ax=inX+inW;
  const tagW=52,tagH=22,tagRx=6;
  const a1ex=out1X-6,a1ey=out1CY;
  const a2ex=out2X-6,a2ey=out2CY;
  const t1mx=(ax+a1ex)/2,t1my=(inCY+a1ey)/2;
  const t2mx=(ax+a2ex)/2,t2my=(inCY+a2ey)/2;
  const tag1x=t1mx-tagW/2,tag1y=t1my-tagH-5;
  const tag2x=t2mx-tagW/2,tag2y=t2my+5;
  function pullBack(x1,y1,x2,y2,d){
    const dx=x2-x1,dy=y2-y1,len=Math.sqrt(dx*dx+dy*dy),t=(len-d)/len;
    return[x1+dx*t,y1+dy*t];
  }
  function arrowHead(x1,y1,x2,y2){
    const dx=x2-x1,dy=y2-y1,len=Math.sqrt(dx*dx+dy*dy),ux=dx/len,uy=dy/len;
    const px=-uy,py=ux,sz=9,hw=4.5;
    return`<polygon points="${x2},${y2} ${x2-ux*sz+px*hw},${y2-uy*sz+py*hw} ${x2-ux*sz-px*hw},${y2-uy*sz-py*hw}" fill="#1a1a1a"/>`;
  }
  const[l1ex,l1ey]=pullBack(ax,inCY,a1ex,a1ey,10);
  const[l2ex,l2ey]=pullBack(ax,inCY,a2ex,a2ey,10);
  function tag(tx,ty,step){
    if(isKey)return`<rect x="${tx}" y="${ty}" width="${tagW}" height="${tagH}" rx="${tagRx}" fill="#FFF0E8" stroke="#FF4F00" stroke-width="2"/>
      <text x="${tx+tagW/2}" y="${ty+tagH/2+1}" text-anchor="middle" dominant-baseline="middle" font-family="Archivo Black,sans-serif" font-size="12" fill="#FF4F00">${tsLabel(step)}</text>`;
    return`<rect x="${tx}" y="${ty}" width="${tagW}" height="${tagH}" rx="${tagRx}" fill="#fafafa" stroke="#bbb" stroke-width="1.5" stroke-dasharray="4 2.5"/>`;
  }
  function outBox(ox,oy,val){
    return`<rect x="${ox}" y="${oy}" width="${outW}" height="${outH}" rx="${outRx}" fill="#fff" stroke="#1a1a1a" stroke-width="2.5"/>
    <text x="${ox+outW/2}" y="${oy+outH/2+1}" text-anchor="middle" dominant-baseline="middle" font-family="Nunito,sans-serif" font-weight="900" font-size="26" fill="#1a1a1a">${val}</text>`;
  }
  const inFill=isKey?'#FFF8F5':'#fafafa';
  const inDash=isKey?'':'stroke-dasharray="6 3"';
  const inVal=isKey?`<text x="${inCX}" y="${inCY+1}" text-anchor="middle" dominant-baseline="middle" font-family="Nunito,sans-serif" font-weight="900" font-size="28" fill="#1a1a1a">${puz.input}</text>`:'';
  return`<svg width="${W}" height="${H}" xmlns="http://www.w3.org/2000/svg" style="display:block;overflow:visible">
    <line x1="${ax}" y1="${inCY}" x2="${l1ex}" y2="${l1ey}" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round"/>
    ${arrowHead(ax,inCY,a1ex,a1ey)}
    <line x1="${ax}" y1="${inCY}" x2="${l2ex}" y2="${l2ey}" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round"/>
    ${arrowHead(ax,inCY,a2ex,a2ey)}

    ${tag(tag2x,tag2y,puz.b2.step)}
    <rect x="${inX}" y="${inY}" width="${inW}" height="${inH}" rx="${inRx}" fill="${inFill}" stroke="#1a1a1a" stroke-width="2.5" ${inDash}/>
    ${inVal}
    ${outBox(out1X,out1Y,puz.b1.out)}
    ${outBox(out2X,out2Y,puz.b2.out)}

}

// ─── MULTIPLICATION SEARCH ───────────────────────────────────
function genMultSearch(diff){
  const cfgs=[{gs:8,maxF:5},{gs:10,maxF:10},{gs:10,maxF:12}];
  const{gs,maxF}=cfgs[diff];
  const grid=Array.from({length:gs},()=>Array(gs).fill(null));
  const factsPlaced=[];
  // Build full fact list (a×b including both orders for variety)
  const allFacts=[];
  for(let a=1;a<=maxF;a++) for(let b=1;b<=maxF;b++) allFacts.push([a,b,a*b]);
  // shuffle
  for(let i=allFacts.length-1;i>0;i--){const j=ri(0,i);[allFacts[i],allFacts[j]]=[allFacts[j],allFacts[i]];}
  // Directions: [dr, dc] — horizontal, vertical, diag↘, diag↙
  const dirs=[[0,1],[1,0],[1,1],[1,-1]];
  let fi=0, attempts=0;
  const target=Math.floor(gs*gs*0.40);
  while(fi<allFacts.length && attempts<1200 && factsPlaced.length<target){
    attempts++;
    const[a,b,c]=allFacts[fi];
    const[dr,dc]=dirs[ri(0,3)];
    // valid start range so all 3 cells stay in bounds
    const rMin=dr<0?2:0, rMax=gs-1-Math.max(0,dr)*2;
    const cMin=dc<0?2:0, cMax=gs-1-Math.max(0,dc)*2;
    if(rMin>rMax||cMin>cMax){fi++;continue;}
    const r0=ri(rMin,rMax), c0=ri(cMin,cMax);
    const cells=[[r0,c0],[r0+dr,c0+dc],[r0+2*dr,c0+2*dc]];
    if(cells.some(([r,cc])=>r<0||r>=gs||cc<0||cc>=gs)){fi++;continue;}
    const vals=[a,b,c];
    let ok=true;
    for(let i=0;i<3&&ok;i++){const[r,cc]=cells[i];if(grid[r][cc]!==null&&grid[r][cc]!==vals[i])ok=false;}
    if(!ok){fi++;continue;}
    for(let i=0;i<3;i++){const[r,cc]=cells[i];grid[r][cc]=vals[i];}
    factsPlaced.push({cells,fact:[a,b,c],dir:[dr,dc]});
    fi++;
  }
  // Fill remaining cells
  for(let r=0;r<gs;r++) for(let c=0;c<gs;c++) if(grid[r][c]===null) grid[r][c]=ri(1,Math.min(maxF*maxF,99));
  // Pick 2 pre-circled facts (first 2 placed)
  const preCircled=factsPlaced.slice(0,Math.min(2,factsPlaced.length));
  return{grid,factsPlaced,preCircled,gs,maxF};
}

function renderMultSearch(p,isKey){
  const{grid,factsPlaced,preCircled,gs}=p;
  const csz=gs<=8?52:44;
  const W=csz*gs, H=csz*gs;
  let svg=`<svg width="${W}" height="${H}" xmlns="http://www.w3.org/2000/svg" style="display:block">`;
  // Border
  svg+=`<rect x="0" y="0" width="${W}" height="${H}" fill="#fff" stroke="#2a2a2a" stroke-width="2"/>`;
  // Grid lines
  for(let i=1;i<gs;i++){
    svg+=`<line x1="${i*csz}" y1="0" x2="${i*csz}" y2="${H}" stroke="#ccc" stroke-width="0.5"/>`;
    svg+=`<line x1="0" y1="${i*csz}" x2="${W}" y2="${i*csz}" stroke="#ccc" stroke-width="0.5"/>`;
  }
  // Key highlights
  if(isKey){
    factsPlaced.forEach(f=>f.cells.forEach(([r,cc])=>{
      svg+=`<rect x="${cc*csz+1}" y="${r*csz+1}" width="${csz-2}" height="${csz-2}" fill="#EBF0FF"/>`;
    }));
  }
  // Cell values
  for(let r=0;r<gs;r++) for(let c=0;c<gs;c++){
    const v=grid[r][c];
    const cx=c*csz+csz/2, cy=r*csz+csz/2;
    const fs=v>=100?10:v>=10?15:18;
    svg+=`<text x="${cx}" y="${cy+1}" text-anchor="middle" dominant-baseline="middle" font-family="Nunito,sans-serif" font-weight="800" font-size="${fs}" fill="#1a1a1a">${v}</text>`;
  }
  // Draw ovals: pre-circled always shown; all facts shown in key
  const toCircle=isKey?factsPlaced:preCircled;
  toCircle.forEach(f=>{
    const[r0,c0]=f.cells[0],[r2,c2]=f.cells[2];
    const x0=c0*csz+csz/2, y0=r0*csz+csz/2;
    const x2=c2*csz+csz/2, y2=r2*csz+csz/2;
    const mx=(x0+x2)/2, my=(y0+y2)/2;
    const dx=x2-x0, dy=y2-y0;
    const len=Math.sqrt(dx*dx+dy*dy)+csz*0.55;
    const angle=Math.atan2(dy,dx)*180/Math.PI;
    const rw=len/2, rh=csz*0.37, rxv=rh;
    svg+=`<rect x="${mx-rw}" y="${my-rh}" width="${len}" height="${rh*2}" rx="${rxv}" fill="none" stroke="#1a1a1a" stroke-width="2" transform="rotate(${angle},${mx},${my})"/>`;
  });
  svg+='</svg>';
  return svg;
}
