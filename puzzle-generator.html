  if(TYPE==='maze'&&PUZZLES[0]){
    const cfg=MM_CFG.find(x=>x.R===PUZZLES[0].R)||MM_CFG[0];
    gridCols=cfg.cols===1?'1fr':'repeat(2,1fr)';
    minH=0; mazePadding=cfg.R>=8?'14px 10px':'12px 8px';
  }
  const cells=PUZZLES.map((p,i)=>`<div class="pc" style="min-height:${minH}px;padding:${mazePadding}"><div class="pc-n">${i+1}</div>${renderPuz(p,isKey)}</div>`).join('');
  // Two Step: steps bank sits between directions and puzzle grid
  const tsStepsHTML=(TYPE==='twostep'&&TS_SET)
    ?`<div class="ts-steps-area"><span class="ts-steps-label">Steps:</span><div class="ts-steps-box">${TS_SET.steps.map(s=>`<span class="ts-step-chip">${tsLabel(s)}</span>`).join('')}</div></div>`
    :'';
  return`<div class="sheet">
    <div class="sh-hdr"><div class="sh-title">${eh(title)}${badge}</div><div class="sh-src">M.I.N.D. — Facts on Fire</div></div>
    <div class="sh-dir">${dir}</div>
    ${tsStepsHTML}
    <div class="pg" style="grid-template-columns:${gridCols}">${cells}</div>
  </div>`;
}

// ─── SKIP-COUNTING CROSSWORDS ────────────────────────────────
// Each puzzle: {cells, rows, cols}
// cells map 'r,c' -> {v:number, given:bool}; missing keys = void/spacer cell
function sc_ri(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function sc_pick(arr){return arr[sc_ri(0,arr.length-1)];}

// PLUS: horizontal row at row=2, vertical col at col=2, 5×5
function scGenPlus(diff){
  const SKIP=[[2,5],[3,8],[4,12]][diff];
  for(let t=0;t<60;t++){
    const rs=sc_ri(SKIP[0],SKIP[1]),cs=sc_ri(SKIP[0],SKIP[1]);
    const rStart=sc_ri(1,4)*rs,inter=rStart+2*rs,cStart=inter-2*cs;
    if(cStart<=0)continue;
    const cells={};
    for(let j=0;j<5;j++)cells[`2,${j}`]={v:rStart+j*rs,given:false};
    for(let i=0;i<5;i++)if(i!==2)cells[`${i},2`]={v:cStart+i*cs,given:false};
    if(diff===0)[[2,0],[2,1],[0,2],[1,2]].forEach(([r,c])=>cells[`${r},${c}`].given=true);
    else if(diff===1)[[2,0],[2,4],[0,2],[4,2]].forEach(([r,c])=>cells[`${r},${c}`].given=true);
    else[[2,0],[2,2],[0,2],[3,2]].forEach(([r,c])=>cells[`${r},${c}`].given=true);
    return{cells,rows:5,cols:5};
  }return null;
}
// T-DOWN: row at row=0 (len 5), col from (0,2) to (3,2)
function scGenTDown(diff){
  const SKIP=[[2,5],[3,8],[4,12]][diff];
  for(let t=0;t<60;t++){
    const rs=sc_ri(SKIP[0],SKIP[1]),cs=sc_ri(SKIP[0],SKIP[1]);
    const rStart=sc_ri(1,4)*rs,inter=rStart+2*rs,cStart=inter;
    const cells={};
    for(let j=0;j<5;j++)cells[`0,${j}`]={v:rStart+j*rs,given:false};
    for(let i=1;i<4;i++)cells[`${i},2`]={v:cStart+i*cs,given:false};
    if(diff===0)[[0,0],[0,1],[1,2],[2,2]].forEach(([r,c])=>cells[`${r},${c}`].given=true);
    else[[0,0],[0,4],[1,2],[3,2]].forEach(([r,c])=>cells[`${r},${c}`].given=true);
    return{cells,rows:4,cols:5};
  }return null;
}
// L-RIGHT: row at row=0 (len 5), col at col=4 rows 0-3
function scGenLRight(diff){
  const SKIP=[[2,5],[3,8]][Math.min(diff,1)];
  for(let t=0;t<60;t++){
    const rs=sc_ri(SKIP[0],SKIP[1]),cs=sc_ri(SKIP[0],SKIP[1]);
    const rStart=sc_ri(1,3)*rs,inter=rStart+4*rs,cStart=inter;
    const cells={};
    for(let j=0;j<5;j++)cells[`0,${j}`]={v:rStart+j*rs,given:false};
    for(let i=1;i<4;i++)cells[`${i},4`]={v:cStart+i*cs,given:false};
    if(diff===0)[[0,0],[0,1],[1,4],[2,4]].forEach(([r,c])=>cells[`${r},${c}`].given=true);
    else[[0,0],[0,2],[2,4],[3,4]].forEach(([r,c])=>cells[`${r},${c}`].given=true);
    return{cells,rows:4,cols:5};
  }return null;
}
// L-BOTTOM: col at col=0 rows 0-3, row at row=3 len 5
function scGenLBottom(diff){
  const SKIP=[[2,5],[3,8]][Math.min(diff,1)];
  for(let t=0;t<60;t++){
    const rs=sc_ri(SKIP[0],SKIP[1]),cs=sc_ri(SKIP[0],SKIP[1]);
    const cStart=sc_ri(2,5)*cs,inter=cStart+3*cs,rStart=inter;
    const cells={};
    for(let i=0;i<4;i++)cells[`${i},0`]={v:cStart+i*cs,given:false};
    for(let j=1;j<5;j++)cells[`3,${j}`]={v:rStart+j*rs,given:false};
    if(diff===0)[[0,0],[1,0],[3,2],[3,3]].forEach(([r,c])=>cells[`${r},${c}`].given=true);
    else[[0,0],[2,0],[3,1],[3,4]].forEach(([r,c])=>cells[`${r},${c}`].given=true);
    return{cells,rows:4,cols:5};
  }return null;
}
// DOUBLE-T: row0+col(rows1-3)+row4, two row/col intersections
function scGenDoubleT(diff){
  const SKIP=diff===1?[3,8]:[4,11];
  for(let t=0;t<100;t++){
    const r0s=sc_ri(SKIP[0],SKIP[1]),r4s=sc_ri(SKIP[0],SKIP[1]),cs=sc_ri(SKIP[0],SKIP[1]);
    const r0Start=sc_ri(1,3)*r0s,inter0=r0Start+2*r0s,cStart=inter0;
    const inter4=cStart+4*cs,r4Start=inter4-2*r4s;
    if(r4Start<=0)continue;
    const cells={};
    for(let j=0;j<5;j++)cells[`0,${j}`]={v:r0Start+j*r0s,given:false};
    for(let i=1;i<4;i++)cells[`${i},2`]={v:cStart+i*cs,given:false};
    for(let j=0;j<5;j++)cells[`4,${j}`]={v:(j===2?inter4:r4Start+j*r4s),given:false};
    if(diff===1)[[0,0],[0,1],[2,2],[3,2],[4,3],[4,4]].forEach(([r,c])=>cells[`${r},${c}`].given=true);
    else[[0,0],[0,4],[1,2],[3,2],[4,0],[4,4]].forEach(([r,c])=>cells[`${r},${c}`].given=true);
    return{cells,rows:5,cols:5};
  }return null;
}
// STEP-3: 3-row staircase, v(i,j)=A+i*dr+j*dc+i*j*k
function scGenStep3(diff){
  const SKIP=diff===1?[2,5]:[3,8];
  for(let t=0;t<80;t++){
    const k=sc_ri(1,2),dr=sc_ri(SKIP[0],SKIP[1]),dc=sc_ri(SKIP[0],SKIP[1]),A=sc_ri(1,8);
    const active=[[0,0],[0,1],[0,2],[1,1],[1,2],[1,3],[2,2],[2,3],[2,4]];
    const cells={};let ok=true;
    for(const[i,j]of active){const v=A+i*dr+j*dc+i*j*k;if(v<=0||v>150){ok=false;break;}cells[`${i},${j}`]={v,given:false};}
    if(!ok)continue;
    [[0,0],[0,2],[1,1],[1,3],[2,2],[2,4]].forEach(([r,c])=>cells[`${r},${c}`].given=true);
    return{cells,rows:3,cols:5};
  }return null;
}
// RECT 3×4: full rectangle, v(i,j)=A+i*dr+j*dc+i*j*k
function scGenRect3x4(diff){
  for(let t=0;t<80;t++){
    const k=sc_ri(1,3),dr=sc_ri(2,6),dc=sc_ri(2,6),A=sc_ri(2,12);
    const cells={};let ok=true;
    for(let i=0;i<3;i++){for(let j=0;j<4;j++){const v=A+i*dr+j*dc+i*j*k;if(v<=0||v>200){ok=false;break;}cells[`${i},${j}`]={v,given:false};}if(!ok)break;}
    if(!ok)continue;
    [[0,0],[0,1],[1,0],[1,1],[2,0]].forEach(([r,c])=>cells[`${r},${c}`].given=true);
    return{cells,rows:3,cols:4};
  }return null;
}
// RECT 4×4: full rectangle, v(i,j)=A+i*dr+j*dc+i*j*k
function scGenRect4x4(diff){
  for(let t=0;t<80;t++){
    const k=sc_ri(1,2),dr=sc_ri(2,5),dc=sc_ri(2,5),A=sc_ri(2,10);
    const cells={};let ok=true;
    for(let i=0;i<4;i++){for(let j=0;j<4;j++){const v=A+i*dr+j*dc+i*j*k;if(v<=0||v>200){ok=false;break;}cells[`${i},${j}`]={v,given:false};}if(!ok)break;}
    if(!ok)continue;
    [[0,0],[0,1],[1,0],[1,1],[2,0],[3,0]].forEach(([r,c])=>cells[`${r},${c}`].given=true);
    return{cells,rows:4,cols:4};
  }return null;
}
function genSkipCross(diff){
  const pools=[
    [scGenPlus,scGenTDown,scGenLRight,scGenLBottom],
    [scGenPlus,scGenTDown,scGenDoubleT,scGenStep3],
    [scGenRect3x4,scGenRect4x4,scGenDoubleT,scGenStep3],
  ];
  for(let t=0;t<60;t++){const p=sc_pick(pools[diff])(diff);if(p)return p;}
  return null;
}
function renderSkipCross(puzzle,isKey){
  const{cells,rows,cols}=puzzle;
  const csz=48,W=cols*csz,H=rows*csz;
  let svg=`<svg width="${W}" height="${H}" xmlns="http://www.w3.org/2000/svg">`;
  for(let r=0;r<rows;r++){
    for(let c=0;c<cols;c++){
      const cell=cells[`${r},${c}`];if(!cell)continue;
      const x=c*csz,y=r*csz,p=1.5,fs=cell.v>=100?13:cell.v>=10?15:17;
      if(cell.given){
        svg+=`<rect x="${x+p}" y="${y+p}" width="${csz-2*p}" height="${csz-2*p}" rx="5" fill="#d8f3dc" stroke="#40916c" stroke-width="2.5"/>`;
        svg+=`<text x="${x+csz/2}" y="${y+csz/2}" text-anchor="middle" dominant-baseline="central" font-family="Nunito,Arial,sans-serif" font-weight="800" font-size="${fs}" fill="#1b4332">${cell.v}</text>`;
      }else if(isKey){
        svg+=`<rect x="${x+p}" y="${y+p}" width="${csz-2*p}" height="${csz-2*p}" rx="5" fill="#fff8f5" stroke="#FF4F00" stroke-width="2"/>`;
        svg+=`<text x="${x+csz/2}" y="${y+csz/2}" text-anchor="middle" dominant-baseline="central" font-family="Nunito,Arial,sans-serif" font-weight="800" font-size="${fs}" fill="#b83000">${cell.v}</text>`;
      }else{
        svg+=`<rect x="${x+p}" y="${y+p}" width="${csz-2*p}" height="${csz-2*p}" rx="5" fill="#ffffff" stroke="#bbbbbb" stroke-width="2"/>`;
      }
    }
  }
  svg+='</svg>';
  return`<div style="line-height:0">${svg}</div>`;
}

// ─── DIFFERENCE PYRAMIDS ─────────────────────────────────────
// pyramid[0]=bottom row (longest), pyramid[rows-1]=top (single cell)
// given[r][c]: true = pre-filled for student
// Rule: pyramid[r][c] = |pyramid[r-1][c] − pyramid[r-1][c+1]|

// Multiple clue templates per difficulty — picked randomly so every puzzle looks different.
// Each entry is an array of [row,col] pairs to mark as given (row 0 = bottom).
const DP_TEMPLATES=[
  // ── Beginner (3 rows, 6 cells total) — 3 given, 3 blank ──
  [
    [[2,0],[0,0],[0,2]],       // top + both bottom corners
    [[2,0],[1,0],[0,1]],       // top + mid-left + bottom-center
    [[2,0],[1,1],[0,1]],       // top + mid-right + bottom-center
    [[2,0],[0,0],[1,1]],       // top + bottom-left + mid-right
    [[2,0],[0,2],[1,0]],       // top + bottom-right + mid-left
  ],
  // ── Intermediate (4 rows, 10 cells total) — 5 given, 5 blank ──
  [
    [[3,0],[2,0],[2,1],[0,0],[0,3]],   // top + row2-left-pair + bottom corners
    [[3,0],[2,1],[2,0],[0,1],[0,2]],   // top + row2-left-pair + bottom inner pair
    [[3,0],[1,0],[1,1],[1,2],[0,0]],   // top + full row1 + bottom-left
    [[3,0],[2,0],[2,1],[0,2],[0,3]],   // top + row2-left-pair + bottom right-pair
    [[3,0],[1,0],[1,2],[0,0],[0,3]],   // top + row1 outer + bottom corners
  ],
  // ── Challenge (5 rows, 15 cells total) — 8 given, 7 blank ──
  [
    [[4,0],[3,0],[3,1],[2,0],[2,1],[2,2],[0,0],[0,4]],  // top + row3 left + row2 left-3 + bottom corners
    [[4,0],[3,0],[3,1],[1,0],[1,1],[1,2],[1,3],[0,0]],  // top + row3 left + full row1 + bottom-left
    [[4,0],[3,0],[2,0],[2,1],[2,2],[1,0],[1,1],[0,4]],  // top + left-spine + row2 left + row1 left + bottom-right
    [[4,0],[3,1],[2,1],[2,2],[1,1],[1,2],[1,3],[0,2]],  // top + right-leaning spine
    [[4,0],[3,0],[3,1],[2,0],[2,2],[1,0],[1,3],[0,2]],  // top + row3 + outer row2 + outer row1 + bottom-center
  ],
];

function dpBuild(bottom){
  const rows=bottom.length;
  const pyramid=[bottom.slice()];
  for(let r=1;r<rows;r++){
    const prev=pyramid[r-1],row=[];
    for(let c=0;c<prev.length-1;c++){
      const d=Math.abs(prev[c]-prev[c+1]);
      if(d===0)return null;
      row.push(d);
    }
    pyramid.push(row);
  }
  return pyramid;
}

function dpSolve(pyramid,given,rows){
  // Returns solution count, capped at 2 for speed.
  const grid=pyramid.map(r=>r.slice());
  // Order blanks top-first for tightest constraint propagation.
  const blanks=[];
  for(let r=rows-1;r>=0;r--)
    for(let c=0;c<pyramid[r].length;c++)
      if(!given[r][c])blanks.push([r,c]);
  const useVals=blanks.map(([r,c])=>pyramid[r][c]).sort((a,b)=>a-b);
  for(const[r,c]of blanks)grid[r][c]=0;

  function ok(r,c,v){
    // Parent above: grid[r+1][c] = |grid[r][c] − grid[r][c+1]|
    if(r+1<rows){
      const par=grid[r+1][c];
      if(par){const sib=grid[r][c+1];if(sib&&Math.abs(v-sib)!==par)return false;}
    }
    // Left-parent above: grid[r+1][c-1] = |grid[r][c-1] − grid[r][c]|
    if(r+1<rows&&c>0){
      const par=grid[r+1][c-1];
      if(par){const sib=grid[r][c-1];if(sib&&Math.abs(sib-v)!==par)return false;}
    }
    // Child below: grid[r-1][c] = |grid[r][c] − grid[r][c+1]| (only if both children known)
    if(r>0){
      const L=grid[r-1][c],R=grid[r-1][c+1];
      if(L&&R&&Math.abs(L-R)!==v)return false;
    }
    return true;
  }

  let solCount=0;
  function bt(idx,rem){
    if(solCount>1)return;
    if(idx===blanks.length){solCount++;return;}
    const[r,c]=blanks[idx];
    for(let i=0;i<rem.length;i++){
      const v=rem[i];
      if(!ok(r,c,v))continue;
      grid[r][c]=v;
      const next=[...rem.slice(0,i),...rem.slice(i+1)];
      bt(idx+1,next);
      grid[r][c]=0;
      if(solCount>1)return;
    }
  }
  bt(0,useVals);
  return solCount;
}

function genDiffPyramid(diff){
  const rows=diff+3;                    // 3, 4, 5
  const maxV=[20,40,60][diff];
  const templates=DP_TEMPLATES[diff];

  for(let att=0;att<30000;att++){
    const bottom=Array.from({length:rows},()=>ri(1,maxV));
    const pyramid=dpBuild(bottom);
    if(!pyramid)continue;
    const allV=pyramid.flat();
    if(new Set(allV).size!==allV.length)continue; // require all-distinct values

    // Pick a random template for this attempt
    const tmpl=templates[att%templates.length];
    const given=pyramid.map(row=>row.map(()=>false));
    for(const[r,c]of tmpl)given[r][c]=true;

    if(dpSolve(pyramid,given,rows)===1)return{pyramid,given,rows,diff};
  }
  return null;
}

function renderDiffPyramid(p,isKey){
  const{pyramid,given,rows,diff}=p;

  // Scale cell size to pyramid height so each level fills the card nicely
  const CW=[68,60,52][diff];
  const CH=[54,46,40][diff];
  const GAP=[10,8,7][diff];

  const bottomLen=rows; // bottom row has `rows` cells
  const svgW=bottomLen*CW+(bottomLen-1)*GAP;
  const svgH=rows*CH+(rows-1)*GAP;

  // Helper: get the pixel-center of cell (ri2, ci)
  function cellCenter(ri2,ci){
    const visualRow=(rows-1)-ri2;
    const rowLen=pyramid[ri2].length;
    const rowW=rowLen*CW+(rowLen-1)*GAP;
    const xOff=(svgW-rowW)/2;
    return{
      x:xOff+ci*(CW+GAP)+CW/2,
      y:visualRow*(CH+GAP)+CH/2
    };
  }

  let svg=`<svg width="${svgW}" height="${svgH}" xmlns="http://www.w3.org/2000/svg">`;

  // ── Draw connector lines first (so they sit under the cells) ──
  for(let ri2=1;ri2<rows;ri2++){
    const parRow=pyramid[ri2];
    for(let ci=0;ci<parRow.length;ci++){
      const par=cellCenter(ri2,ci);
      const parBottom={x:par.x, y:par.y+CH/2};
      const childL=cellCenter(ri2-1,ci);
      const childR=cellCenter(ri2-1,ci+1);
      const childLTop={x:childL.x, y:childL.y-CH/2};
      const childRTop={x:childR.x, y:childR.y-CH/2};
      svg+=`<line x1="${parBottom.x}" y1="${parBottom.y}" x2="${childLTop.x}" y2="${childLTop.y}" stroke="#C8CDD8" stroke-width="1.5"/>`;
      svg+=`<line x1="${parBottom.x}" y1="${parBottom.y}" x2="${childRTop.x}" y2="${childRTop.y}" stroke="#C8CDD8" stroke-width="1.5"/>`;
    }
  }

  // ── Draw cells ──
  for(let ri2=rows-1;ri2>=0;ri2--){
    const row=pyramid[ri2];
    for(let ci=0;ci<row.length;ci++){
      const ctr=cellCenter(ri2,ci);
      const x=ctr.x-CW/2, y=ctr.y-CH/2;
      const isGiv=given[ri2][ci];
      const val=row[ci];
      const rx=7;
      const fs=val>=100?Math.round(CW*0.22):val>=10?Math.round(CW*0.28):Math.round(CW*0.34);

      if(isGiv){
        svg+=`<rect x="${x}" y="${y}" width="${CW}" height="${CH}" rx="${rx}" fill="#ECEEF2" stroke="#9BA3B2" stroke-width="2"/>`;
        svg+=`<text x="${ctr.x}" y="${ctr.y+1}" text-anchor="middle" dominant-baseline="central" font-family="Nunito,Arial,sans-serif" font-weight="800" font-size="${fs}" fill="#1a1a1a">${val}</text>`;
      }else if(isKey){
        svg+=`<rect x="${x}" y="${y}" width="${CW}" height="${CH}" rx="${rx}" fill="#fff8f5" stroke="#FF4F00" stroke-width="2"/>`;
        svg+=`<text x="${ctr.x}" y="${ctr.y+1}" text-anchor="middle" dominant-baseline="central" font-family="Nunito,Arial,sans-serif" font-weight="800" font-size="${fs}" fill="#b83000">${val}</text>`;
      }else{
        svg+=`<rect x="${x}" y="${y}" width="${CW}" height="${CH}" rx="${rx}" fill="#ffffff" stroke="#BDC2CC" stroke-width="2"/>`;
      }
    }
  }
  svg+='</svg>';

  // ── Use list ──
  const useNums=[];
  for(let r=0;r<rows;r++)
    for(let c=0;c<pyramid[r].length;c++)
      if(!given[r][c])useNums.push(pyramid[r][c]);
  useNums.sort((a,b)=>a-b);

  const chipFs=[13,12,11][diff];
  const chips=useNums.map(n=>`<span style="display:inline-flex;align-items:center;justify-content:center;background:#EBF0FF;border:1.5px solid #C5D3F7;border-radius:5px;font-family:Nunito,Arial,sans-serif;font-weight:800;font-size:${chipFs}px;color:#1B4FCC;padding:2px 8px;margin:2px">${n}</span>`).join('');

  return`<div style="display:flex;flex-direction:column;align-items:center;gap:10px">
    <div style="line-height:0">${svg}</div>
    <div style="display:flex;flex-wrap:wrap;align-items:center;justify-content:center;gap:2px">
      <span style="font-family:Archivo,sans-serif;font-size:9px;font-weight:700;letter-spacing:.9px;text-transform:uppercase;color:#8A94A0;margin-right:2px;white-space:nowrap">Use:</span>${chips}
    </div>
  </div>`;
}

// ─── Generate ────────────────────────────────────────────────
async function generate(){
  const btn=document.querySelector('.btn-gen');
  if(TYPE==='crypto'&&!cryptoPool){
    document.getElementById('out').innerHTML=`<div style="padding:60px;text-align:center;color:#888;font-weight:600">Building puzzle bank…</div>`;
    cryptoPool=buildCryptoPool();
  }
  if(TYPE==='factorblob'){
    const fbCount=FB_N<=4?4:2;
    if(btn)btn.disabled=true;
    PUZZLES=[];
    for(let i=0;i<fbCount;i++){
      document.getElementById('out').innerHTML=`<div style="padding:60px;text-align:center;color:#888;font-weight:600">Generating puzzle ${i+1} of ${fbCount}…</div>`;
      await new Promise(r=>setTimeout(r,0));
      const p=genFactorBlob(DIFF);
      if(p)PUZZLES.push(p);
    }
    if(btn)btn.disabled=false;
    refresh();return;
  }
  if(TYPE==='maze'){
    const cfg=MM_CFG[DIFF]||MM_CFG[0];
    const {R,C,count}=cfg;
    if(btn) btn.disabled=true;
    PUZZLES=[];
    for(let i=0;i<count;i++){
      document.getElementById('out').innerHTML=`<div style="padding:60px;text-align:center;color:#888;font-weight:600">Generating puzzle ${i+1} of ${count}…</div>`;
      await new Promise(r=>setTimeout(r,20));
      const p=await genMaze(R,C,MM_K);
      if(p) PUZZLES.push(p);
    }
    if(btn) btn.disabled=false;
    refresh(); return;
  }
  if(TYPE==='kenken'){
    if(btn)btn.disabled=true;
    PUZZLES=[];
    for(let i=0;i<4;i++){
      document.getElementById('out').innerHTML=`<div style="padding:60px;text-align:center;color:#888;font-weight:600">Generating puzzle ${i+1} of 4…</div>`;
      await new Promise(r=>setTimeout(r,20));
      const p=await genKenKen(DIFF);
      if(p)PUZZLES.push(p);
    }
    if(btn)btn.disabled=false;
    refresh();return;
  }
  if(TYPE==='diffpyramid'){
    const dpCount=DIFF===2?2:4; // Challenge pyramids are large — 2 per page; others 4
    if(btn)btn.disabled=true;
    PUZZLES=[];
    for(let i=0;i<dpCount;i++){
      document.getElementById('out').innerHTML=`<div style="padding:60px;text-align:center;color:#888;font-weight:600">Generating puzzle ${i+1} of ${dpCount}…</div>`;
      await new Promise(r=>setTimeout(r,10));
      const p=genDiffPyramid(DIFF);
      if(p)PUZZLES.push(p);
    }
    if(btn)btn.disabled=false;
    refresh();return;
  }
  if(TYPE==='twostep'){
    if(btn)btn.disabled=true;
    document.getElementById('out').innerHTML=`<div style="padding:60px;text-align:center;color:#888;font-weight:600">Generating puzzles…</div>`;
    await new Promise(r=>setTimeout(r,20));
    TS_SET=genTwoStepSet(DIFF);
    PUZZLES=TS_SET?TS_SET.puzzles:[];
    if(btn)btn.disabled=false;
    refresh();return;
  }
  if(TYPE==='multisearch'){
    const p=genMultSearch(DIFF);
    PUZZLES=p?[p]:[];
    refresh();return;
  }
  const cnt=(TYPE==='triangle')?4:(TYPE==='productpuzzle')?6:(TYPE==='honeycomb'||TYPE==='mismo'||TYPE==='twoout')?3:COUNT;
  const used=new Set();
  PUZZLES=[];
  for(let i=0;i<cnt;i++){
    let p=null;
    if(TYPE==='crossnumber')p=genCN(DIFF);
    else if(TYPE==='twoout')p=gen2Out(DIFF);
    else if(TYPE==='xout')p=genXOut(DIFF);
    else if(TYPE==='crypto')p=pickCrypto(DIFF,used);
    else if(TYPE==='mismo')p=genMismo(DIFF);
    else if(TYPE==='megamismo')p=genMegaMismo(DIFF);
    else if(TYPE==='honeycomb')p=genHoneycomb(DIFF);
    else if(TYPE==='triangle')p=genTriangle(DIFF);
    else if(TYPE==='productpuzzle')p=genProductPuzzle();
    else if(TYPE==='skipcross')p=genSkipCross(DIFF);
    if(p)PUZZLES.push(p);
  }
  refresh();
}

function refresh(){
  document.getElementById('out').innerHTML=PUZZLES.length
    ?buildSheet(SHOW_KEY)
    :`<div style="padding:60px;text-align:center;color:#888;font-weight:600">No puzzles generated — try again.</div>`;
}

// ─── Download PDF ────────────────────────────────────────────
// ─── Print / Save PDF ────────────────────────────────────────
// ─── Download PDF ────────────────────────────────────────────
function loadScript(src){
  return new Promise((res,rej)=>{
    if(document.querySelector(`script[src="${src}"]`)){res();return;}
    const s=document.createElement('script');s.src=src;
    s.onload=res;s.onerror=()=>rej(new Error('Failed to load '+src));
    document.head.appendChild(s);
  });
}

async function downloadPDF(mode){
  const title=document.getElementById('pg-title').value.trim()||PTITLES[TYPE];
  const pbtns=document.querySelectorAll('.pbtn');
  pbtns.forEach(b=>{b.disabled=true;b._txt=b.lastChild.textContent;b.lastChild.textContent='…';});

  try{
    await Promise.all([
      loadScript('https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js'),
      loadScript('https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js'),
    ]);

    const pages=[];
    if(mode!=='key')     pages.push(buildSheet(false));
    if(mode!=='student') pages.push(buildSheet(true));

    // Off-screen render container — same page so all CSS applies
    const wrap=document.createElement('div');
    wrap.style.cssText='position:fixed;left:-9999px;top:0;width:740px;background:#fff;padding:32px;box-sizing:border-box;';
    document.body.appendChild(wrap);

    const{jsPDF}=window.jspdf;
    const pdf=new jsPDF({orientation:'portrait',unit:'pt',format:'letter'});
    const PW=pdf.internal.pageSize.getWidth();   // 612 pt
    const PH=pdf.internal.pageSize.getHeight();  // 792 pt
    const MARGIN=32; // pt
    const CONTENT_W=PW-MARGIN*2;

    for(let i=0;i<pages.length;i++){
      if(i>0) pdf.addPage();
      wrap.innerHTML=pages[i];
      // Let fonts/SVGs settle
      await new Promise(r=>setTimeout(r,300));
      const canvas=await html2canvas(wrap,{
        scale:2,
        useCORS:true,
        allowTaint:true,
        backgroundColor:'#ffffff',
        logging:false,
      });
      const imgW=CONTENT_W;
      const imgH=(canvas.height/canvas.width)*imgW;
      // If taller than page, scale down to fit
      const scale=Math.min(1,(PH-MARGIN*2)/imgH);
      const finalW=imgW*scale, finalH=imgH*scale;
      const offsetX=MARGIN+(CONTENT_W-finalW)/2;
      const offsetY=MARGIN+(PH-MARGIN*2-finalH)/2;
      pdf.addImage(canvas.toDataURL('image/jpeg',0.94),'JPEG',offsetX,offsetY,finalW,finalH);
    }

    document.body.removeChild(wrap);
    const filename=(title.replace(/[^\w\s-]/g,'').trim().replace(/\s+/g,'-')||'puzzle')+'.pdf';
    pdf.save(filename);

  }catch(err){
    alert('PDF generation failed: '+err.message+'\n\nTry allowing pop-ups or use a different browser.');
    console.error(err);
  }finally{
    pbtns.forEach(b=>{b.disabled=false;if(b._txt)b.lastChild.textContent=b._txt;});
  }
}

  document.getElementById('hc-size-row').style.display=isHC?'':'none';
  document.getElementById('hc-size-div').style.display=isHC?'':'none';
  document.getElementById('mm-fact-row').style.display=isMM?'':'none';
  document.getElementById('mm-fact-div').style.display=isMM?'':'none';
  document.getElementById('fb-size-row').style.display=isFB?'':'none';
  document.getElementById('fb-size-div').style.display=isFB?'':'none';

}

function selMMK(btn){

function setView(v){
  SHOW_KEY=v==='key';
  document.getElementById('vt-s').classList.toggle('on',!SHOW_KEY);
  document.getElementById('vt-k').classList.toggle('on',SHOW_KEY);
  refresh();
}
function buildDiffUI(){
  // For honeycomb, show size-specific descriptions from HC_GRIDS
  const diffs = (TYPE==='honeycomb')
    ? HC_GRIDS[HC_SIZE].DIFFS.map((d,i)=>{
        const labels=['Beginner','Intermediate','Challenge'];
        return{l:labels[i], d:`Numbers up to ${d.maxN}, ${d.hide} blanks`};
      })
    : DIFFS[TYPE];
  document.getElementById('diff-opts').innerHTML=diffs.map((d,i)=>`
    <label><input type="radio" name="diff" value="${i}" ${i===DIFF?'checked':''}
      onchange="DIFF=${i};generate()">
    <span><span class="dl">${d.l}</span>&ensp;<span class="dd">${d.d}</span></span></label>`).join('');
}

// Init
buildDiffUI();
document.getElementById('hc-size-row').style.display='';
document.getElementById('hc-size-div').style.display='';
requestAnimationFrame(()=>setTimeout(()=>{cryptoPool=buildCryptoPool();},100));
