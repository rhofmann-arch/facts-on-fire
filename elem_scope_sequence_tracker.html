<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elementary Automaticity — Scope & Sequence Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Archivo:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --fire: #FF4F00; --ember: #FFF0EB;
    --ink: #1A1A1A; --muted: #6B7280;
    --surf: #FFFFFF; --bg: #F5F4F1; --border: #E2E0DB;
    --done-bg: #ECFDF5; --done-border: #10B981;
    --prog-bg: #FFFBEB; --prog-border: #F59E0B;
    --wb-color: #1B4FCC; --puz-color: #7C3AED; --int-color: #92400E;
    --font-head: 'Archivo Black', sans-serif;
    --font-body: 'Archivo', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); font-family: var(--font-body); color: var(--ink); min-height: 100vh; }

  .topbar {
    background: var(--ink); color: #fff; padding: 14px 24px;
    display: flex; align-items: center; gap: 16px;
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,.25);
  }
  .topbar-title { font-family: var(--font-head); font-size: 16px; color: #fff; }
  .topbar-sub { font-size: 12px; color: #aaa; font-weight: 500; }
  .topbar-spacer { flex: 1; }
  .btn-mgr {
    color: #fff; border: 1.5px solid rgba(255,255,255,.3); background: transparent;
    padding: 6px 14px; border-radius: 7px; font-family: var(--font-body);
    font-size: 12px; font-weight: 700; cursor: pointer; transition: .15s;
    text-decoration: none; display: inline-flex; align-items: center; gap: 5px;
  }
  .btn-mgr:hover { border-color: #fff; background: rgba(255,255,255,.1); }
  .legend { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: #ccc; font-weight: 500; }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

  .statsbar {
    background: var(--surf); border-bottom: 1px solid var(--border);
    padding: 10px 24px; display: flex; gap: 24px; align-items: center; flex-wrap: wrap;
  }
  .stat { display: flex; align-items: center; gap: 8px; }
  .stat-val { font-family: var(--font-head); font-size: 20px; color: var(--ink); }
  .stat-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); line-height: 1.2; }
  .stat-bar { width: 80px; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
  .stat-fill { height: 100%; border-radius: 3px; transition: width .4s; }

  .controls {
    padding: 10px 24px; display: flex; gap: 10px; align-items: center;
    flex-wrap: wrap; background: var(--bg); border-bottom: 1px solid var(--border);
  }
  .grade-tabs { display: flex; gap: 4px; }
  .grade-tab {
    padding: 5px 14px; border: 1.5px solid var(--border); border-radius: 20px;
    background: var(--surf); font-family: var(--font-body); font-size: 12px;
    font-weight: 700; cursor: pointer; transition: .15s; color: var(--muted);
  }
  .grade-tab:hover { border-color: var(--fire); color: var(--fire); }
  .grade-tab.active { background: var(--ink); border-color: var(--ink); color: #fff; }
  .filter-select, .search-input {
    padding: 5px 10px; border: 1.5px solid var(--border); border-radius: 6px;
    font-family: var(--font-body); font-size: 12px; font-weight: 600;
    background: var(--surf); color: var(--ink); outline: none;
  }
  .filter-select:focus, .search-input:focus { border-color: var(--fire); }
  .search-input { width: 180px; }
  .controls-spacer { flex: 1; }
  .btn-reset {
    padding: 5px 14px; border: 1.5px solid #E5E7EB; border-radius: 6px;
    background: transparent; font-family: var(--font-body); font-size: 12px;
    font-weight: 700; cursor: pointer; color: var(--muted); transition: .15s;
  }
  .btn-reset:hover { border-color: #EF4444; color: #EF4444; }

  .grid-wrap { padding: 16px 24px 60px; }
  .all-grid { display: grid; grid-template-columns: 36px repeat(5, 1fr); gap: 4px; }
  .week-label {
    font-family: var(--font-head); font-size: 10px; color: var(--muted);
    display: flex; align-items: center; justify-content: center; padding-top: 4px;
  }
  .grid-header { padding: 6px 10px; border-radius: 6px 6px 0 0; font-family: var(--font-head); font-size: 12px; text-align: center; }

  .skill-cell {
    background: var(--surf); border: 1.5px solid var(--border); border-radius: 7px;
    padding: 7px 8px 6px; cursor: pointer; transition: border-color .15s, box-shadow .15s;
    position: relative; user-select: none;
  }
  .skill-cell:hover { border-color: #9CA3AF; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
  .skill-cell.inprog { background: var(--prog-bg); border-color: var(--prog-border); }
  .skill-cell.done   { background: var(--done-bg); border-color: var(--done-border); }
  .skill-cell.hidden { opacity: 0; pointer-events: none; }
  .skill-cell.dragging { opacity: .4; }
  .skill-cell.drag-over { border-color: var(--fire) !important; box-shadow: 0 0 0 2px var(--ember); }
  .drag-handle { position: absolute; top: 4px; right: 5px; font-size: 11px; color: #CBD5E1; cursor: grab; }
  .skill-row { display: flex; align-items: flex-start; gap: 6px; margin-bottom: 4px; }
  .status-btn {
    width: 11px; height: 11px; border-radius: 50%; flex-shrink: 0; margin-top: 2px;
    border: 1.5px solid #9CA3AF; background: #E5E7EB; cursor: pointer; transition: .15s;
  }
  .skill-cell.inprog .status-btn { background: #F59E0B; border-color: #D97706; }
  .skill-cell.done   .status-btn { background: #10B981; border-color: #059669; }
  .skill-name-text { font-size: 11px; font-weight: 600; line-height: 1.3; color: var(--ink); flex: 1; }
  .skill-meta { display: flex; align-items: center; gap: 4px; flex-wrap: wrap; }
  .badge { font-size: 9px; font-weight: 800; padding: 1px 5px; border-radius: 3px; letter-spacing: .04em; text-transform: uppercase; }
  .badge-wk  { background: #F3F4F6; color: #6B7280; border: 1px solid #E5E7EB; }
  .badge-wb  { background: #DBEAFE; color: var(--wb-color); border: 1px solid #BFDBFE; }
  .badge-puz { background: #EDE9FE; color: var(--puz-color); border: 1px solid #DDD6FE; }
  .badge-int { background: #FFFBEB; color: var(--int-color); border: 1px solid #FDE68A; }
  .badge-game{ background: #ECFDF5; color: #065F46; border: 1px solid #A7F3D0; }
  .mark-done-btn {
    font-size: 9px; font-weight: 700; padding: 1px 5px; border-radius: 3px;
    border: 1.5px solid #10B981; color: #10B981; background: transparent;
    cursor: pointer; margin-left: auto; transition: .12s; white-space: nowrap;
  }
  .mark-done-btn:hover { background: #ECFDF5; }
  .skill-cell.done .mark-done-btn { display: none; }

  .single-grid { max-width: 640px; }
  .single-row { display: flex; gap: 10px; align-items: flex-start; margin-bottom: 4px; }
  .single-wk-label { font-family: var(--font-head); font-size: 10px; color: var(--muted); width: 36px; padding-top: 10px; text-align: center; flex-shrink: 0; }
  .single-cell { flex: 1; }
  .empty-cell { background: var(--bg); border: 1.5px dashed var(--border); border-radius: 7px; min-height: 54px; opacity: .5; }
  .empty-cell.drag-over { border-color: var(--fire); background: var(--ember); opacity: 1; }

  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.5);
    z-index: 200; display: flex; align-items: center; justify-content: center; padding: 20px;
  }
  .modal-overlay.hidden { display: none; }
  .modal { background: var(--surf); border-radius: 12px; padding: 24px; width: 100%; max-width: 460px; box-shadow: 0 8px 32px rgba(0,0,0,.2); }
  .modal-title { font-family: var(--font-head); font-size: 17px; margin-bottom: 2px; }
  .modal-sub { font-size: 12px; color: var(--muted); margin-bottom: 10px; }
  .modal-grade-badge { display: inline-block; font-size: 11px; font-weight: 700; padding: 2px 10px; border-radius: 20px; margin-bottom: 14px; }
  .modal-status { display: flex; gap: 8px; margin-bottom: 16px; }
  .status-opt { flex: 1; padding: 8px; border: 1.5px solid var(--border); border-radius: 7px; text-align: center; font-size: 12px; font-weight: 700; cursor: pointer; transition: .15s; color: var(--muted); }
  .status-opt:hover { border-color: var(--muted); }
  .status-opt.sel-notstarted { border-color: #9CA3AF; background: #F3F4F6; }
  .status-opt.sel-inprog { border-color: #F59E0B; background: #FFFBEB; color: #92400E; }
  .status-opt.sel-done   { border-color: #10B981; background: #ECFDF5; color: #065F46; }
  .modal-section { margin-bottom: 16px; }
  .modal-field-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .07em; color: var(--muted); display: block; margin-bottom: 8px; }
  .modal-textarea { width: 100%; padding: 8px 10px; border: 1.5px solid var(--border); border-radius: 7px; font-family: var(--font-body); font-size: 13px; background: var(--surf); color: var(--ink); outline: none; resize: vertical; min-height: 80px; }
  .modal-textarea:focus { border-color: var(--fire); }
  .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
  .btn-primary { flex: 1; padding: 10px; background: var(--fire); color: #fff; border: none; border-radius: 8px; font-family: var(--font-body); font-size: 13px; font-weight: 700; cursor: pointer; }
  .btn-primary:hover { background: #e04400; }
  .btn-secondary { padding: 10px 18px; background: transparent; border: 1.5px solid var(--border); border-radius: 8px; font-family: var(--font-body); font-size: 13px; font-weight: 700; cursor: pointer; color: var(--muted); }
  .btn-secondary:hover { border-color: var(--muted); color: var(--ink); }

  .res-chip-row { display: flex; flex-wrap: wrap; gap: 5px; }
  .res-chip { font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 4px; }
  .res-chip-puz  { background: #EDE9FE; color: var(--puz-color); border: 1px solid #DDD6FE; }
  .res-chip-int  { background: #FFFBEB; color: var(--int-color); border: 1px solid #FDE68A; }
  .res-chip-game { background: #ECFDF5; color: #065F46; border: 1px solid #A7F3D0; }
  .res-empty { font-size: 12px; color: var(--muted); font-style: italic; line-height: 1.5; }
  .mgr-link { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; font-weight: 700; color: var(--fire); text-decoration: none; margin-top: 8px; }
  .mgr-link:hover { text-decoration: underline; }

  @media (max-width: 800px) { .all-grid { grid-template-columns: 28px repeat(3, 1fr); } .legend { display: none; } }
  @media (max-width: 560px) { .all-grid { grid-template-columns: 28px repeat(2, 1fr); } }
</style>
</head>
<body>

<div class="topbar">
  <div>
    <div class="topbar-title">Elementary Automaticity — Scope &amp; Sequence</div>
    <div class="topbar-sub">Grades K–4 · 30 Weeks · Progress Tracker</div>
  </div>
  <div class="topbar-spacer"></div>
  <a class="btn-mgr" href="elem_skill_resource_manager.html">⚙ Manage Resources</a>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:#E5E7EB;border:1.5px solid #9CA3AF"></div>Not started</div>
    <div class="legend-item"><div class="legend-dot" style="background:#F59E0B"></div>In progress</div>
    <div class="legend-item"><div class="legend-dot" style="background:#10B981"></div>Complete</div>
    <div class="legend-item"><span class="badge badge-wb">WB</span>Workbook</div>
    <div class="legend-item"><span class="badge badge-puz">PUZ</span>Puzzle</div>
    <div class="legend-item"><span class="badge badge-int">INT</span>Intervention</div>
  </div>
</div>

<div class="statsbar" id="statsbar"></div>

<div class="controls">
  <div class="grade-tabs">
    <button class="grade-tab active" onclick="setView('all')">All Grades</button>
    <button class="grade-tab" onclick="setView('K')" style="border-color:#FFD0B5;color:#C04000">Grade K</button>
    <button class="grade-tab" onclick="setView('1')" style="border-color:#99DBD5;color:#005A52">Grade 1</button>
    <button class="grade-tab" onclick="setView('2')" style="border-color:#BFDBFE;color:#1E40AF">Grade 2</button>
    <button class="grade-tab" onclick="setView('3')" style="border-color:#FDE68A;color:#92400E">Grade 3</button>
    <button class="grade-tab" onclick="setView('4')" style="border-color:#DDD6FE;color:#5B21B6">Grade 4</button>
  </div>
  <select class="filter-select" id="filter-status" onchange="applyFilters()">
    <option value="">All statuses</option>
    <option value="notstarted">Not started</option>
    <option value="inprog">In progress</option>
    <option value="done">Done</option>
  </select>
  <select class="filter-select" id="filter-resource" onchange="applyFilters()">
    <option value="">All resources</option>
    <option value="has">Has linked resources</option>
    <option value="none">No resources yet</option>
  </select>
  <input type="text" class="search-input" id="search-input" placeholder="Search skills…" oninput="applyFilters()">
  <div class="controls-spacer"></div>
  <button class="btn-reset" onclick="confirmReset()">Reset All Progress</button>
</div>

<div class="grid-wrap" id="grid-wrap"></div>

<div class="modal-overlay hidden" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-title" id="modal-title"></div>
    <div class="modal-sub"   id="modal-sub"></div>
    <div id="modal-grade-badge" class="modal-grade-badge"></div>

    <div class="modal-section">
      <div class="modal-status">
        <div class="status-opt" id="opt-notstarted" onclick="setModalStatus('notstarted')">⚪ Not Started</div>
        <div class="status-opt" id="opt-inprog"     onclick="setModalStatus('inprog')">🟡 In Progress</div>
        <div class="status-opt" id="opt-done"       onclick="setModalStatus('done')">🟢 Complete</div>
      </div>
    </div>

    <div class="modal-section">
      <label class="modal-field-label">Linked Resources</label>
      <div id="modal-res-display"></div>
      <a class="mgr-link" href="elem_skill_resource_manager.html">⚙ Add or edit in Resource Manager →</a>
    </div>

    <div class="modal-section">
      <label class="modal-field-label">Notes</label>
      <textarea class="modal-textarea" id="modal-notes" placeholder="Add notes, links, ideas…"></textarea>
    </div>

    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn-primary"   onclick="saveModal()">Save</button>
    </div>
  </div>
</div>

  [13,'4','3-Digit Subtraction, With Regrouping','multidigit'],[14,'4','3-Digit Subtraction, With Regrouping (cont.)','multidigit'],
  [15,'4','Mixed multidigit add/sub','multidigit'],[16,'4','Mixed multidigit add/sub (beat score)','multidigit'],
  [17,'4','Long multiplication','multidigit'],[18,'4','Long multiplication (continued)','multidigit'],
  [19,'4','Long multiplication (beat score)','multidigit'],[20,'4','Long division','multidigit'],
  [21,'4','Long division (continued)','multidigit'],[22,'4','Long division (beat score)','multidigit'],
  [23,'4','Mixed multidigit computation','multidigit'],[24,'4','Mixed multidigit computation (beat score)','multidigit'],
  [25,'4','Multiplication facts to 400 (mastery)','multdiv'],[26,'4','Division facts to 400 (mastery)','multdiv'],
  [27,'4','Multidigit addition — fluency review','multidigit'],[28,'4','Multidigit subtraction — fluency review','multidigit'],
  [29,'4','Mixed review — all operations','multdiv'],[30,'4','Mixed review — all operations (beat score)','multdiv'],
];

const SKILLS = SKILLS_RAW.map((s, i) => ({
  id: `s${i}`, week: s[0], grade: s[1], name: s[2], pool: s[3],
  status: 'notstarted', notes: '', customWeek: s[0], customGrade: s[1],
}));

const GRADE_COLORS = {
  'K': { bg:'#FFF0E8', border:'#FFD0B5', hdr:'#C04000' },
  '1': { bg:'#E6F4F2', border:'#99DBD5', hdr:'#005A52' },
  '2': { bg:'#DBEAFE', border:'#BFDBFE', hdr:'#1E40AF' },
  '3': { bg:'#FEF3C7', border:'#FDE68A', hdr:'#92400E' },
  '4': { bg:'#EDE9FE', border:'#DDD6FE', hdr:'#5B21B6' },
};

// ─── STATE ────────────────────────────────────────────────────────────────────
// trackerState  — status / notes / ordering — saved to 'elem_tracker_state'
// resData       — puzzle/intervention linkages — read-only from 'elem_skill_resources_v1'
let trackerState = {};
let resData = { resources: {}, puzzleReg: {}, interventionReg: {}, gameReg: {} };
let currentView = 'all';
let modalSkillId = null;
let dragSrcId = null;

function skillKey(g, w) { return `g${g}w${w}`; }

function getResources(grade, week) {
  return resData.resources[skillKey(grade, week)] || { puzzles:[], games:[], interventions:[] };
}
function hasAnyResource(grade, week) {
  const r = getResources(grade, week);
  return r.puzzles.length > 0 || r.games.length > 0 || r.interventions.length > 0;
}

// ─── STORAGE ──────────────────────────────────────────────────────────────────
async function loadState() {
  // 1. Load tracker progress
  try {
    const r = await window.storage.get('elem_tracker_state');
    if (r && r.value) trackerState = JSON.parse(r.value);
  } catch(e) { trackerState = {}; }

  SKILLS.forEach(s => {
    const saved = trackerState[s.id];
    if (saved) {
      s.status      = saved.status      || 'notstarted';
      s.notes       = saved.notes       || '';
      s.customWeek  = saved.customWeek  != null ? saved.customWeek  : s.week;
      s.customGrade = saved.customGrade != null ? saved.customGrade : s.grade;
    }
  });

  // 2. Read resource linkages from resource manager's key (this file never writes to it)
  try {
    const r = await window.storage.get('elem_skill_resources_v1');
    if (r && r.value) resData = JSON.parse(r.value);
  } catch(e) { /* no data yet — fine */ }
}

async function saveTrackerState() {
  SKILLS.forEach(s => {
    trackerState[s.id] = { status: s.status, notes: s.notes, customWeek: s.customWeek, customGrade: s.customGrade };
  });
  try { await window.storage.set('elem_tracker_state', JSON.stringify(trackerState)); } catch(e) {}
}

// ─── STATS ────────────────────────────────────────────────────────────────────
function renderStats() {
  const total  = SKILLS.length;
  const done   = SKILLS.filter(s => s.status === 'done').length;
  const inprog = SKILLS.filter(s => s.status === 'inprog').length;
  const hasRes = SKILLS.filter(s => hasAnyResource(s.customGrade, s.customWeek)).length;

  const byGrade = ['K','1','2','3','4'].map(g => {
    const gs = SKILLS.filter(s => s.grade === g);
    const gdone = gs.filter(s => s.status === 'done').length;
    const ginp  = gs.filter(s => s.status === 'inprog').length;
    const c = GRADE_COLORS[g];
    const pct = Math.round(gdone / gs.length * 100);
    return `<div class="stat"><div>
      <div style="font-family:var(--font-head);font-size:13px;color:${c.hdr}">Grade ${g}</div>
      <div class="stat-bar" style="margin-top:3px"><div class="stat-fill" style="width:${pct}%;background:${c.hdr}"></div></div>
      <div style="font-size:10px;color:var(--muted);margin-top:2px">${gdone}/${gs.length} done · ${ginp} in progress</div>
    </div></div>`;
  }).join('');

  document.getElementById('statsbar').innerHTML = `
    <div class="stat"><div class="stat-val">${total}</div><div class="stat-label">Total<br>Skills</div></div>
    <div class="stat"><div class="stat-val" style="color:#10B981">${done}</div><div class="stat-label">Complete</div></div>
    <div class="stat"><div class="stat-val" style="color:#F59E0B">${inprog}</div><div class="stat-label">In Progress</div></div>
    <div class="stat"><div class="stat-val" style="color:var(--puz-color)">${hasRes}</div><div class="stat-label">Have<br>Resources</div></div>
    <div style="width:1px;background:var(--border);height:36px;margin:0 4px"></div>
    ${byGrade}`;
}

// ─── VIEW ─────────────────────────────────────────────────────────────────────
function setView(v) {
  currentView = v;
  ['all','K','1','2','3','4'].forEach((t,i) => document.querySelectorAll('.grade-tab')[i].classList.toggle('active', t===v));
  renderGrid();
}
function getFilters() {
  return {
    status:   document.getElementById('filter-status').value,
    resource: document.getElementById('filter-resource').value,
    search:   document.getElementById('search-input').value.toLowerCase().trim(),
  };
}
function skillVisible(s, f) {
  if (f.status && s.status !== f.status) return false;
  const hasRes = hasAnyResource(s.customGrade, s.customWeek);
  if (f.resource === 'has'  && !hasRes) return false;
  if (f.resource === 'none' &&  hasRes) return false;
  if (f.search && !s.name.toLowerCase().includes(f.search)) return false;
  return true;
}
function applyFilters() { renderGrid(); }

function renderGrid() {
  const wrap = document.getElementById('grid-wrap');
  const f = getFilters();
  if (currentView === 'all') renderAllGrid(wrap, f);
  else renderSingleGrade(wrap, currentView, f);
}

function renderAllGrid(wrap, f) {
  const grades = ['K','1','2','3','4'];
  let html = '<div class="all-grid"><div class="week-label"></div>';
  grades.forEach(g => { const c=GRADE_COLORS[g]; html += `<div class="grid-header" style="background:${c.hdr};color:#fff">Grade ${g}</div>`; });
  for (let w = 1; w <= 30; w++) {
    html += `<div class="week-label">W${w}</div>`;
    grades.forEach(g => {
      const s = SKILLS.find(s => s.customGrade===g && s.customWeek===w);
      html += s ? skillCellHTML(s,f,g,w) :
        `<div class="empty-cell" ondragover="dragOver(event)" ondrop="drop(event,null,'${g}',${w})" ondragleave="dragLeave(event)"></div>`;
    });
  }
  html += '</div>';
  wrap.innerHTML = html;
}

function renderSingleGrade(wrap, grade, f) {
  const c = GRADE_COLORS[grade];
  let html = `<div class="single-grid"><div style="font-family:var(--font-head);font-size:20px;color:${c.hdr};margin-bottom:12px">Grade ${grade}</div>`;
  for (let w = 1; w <= 30; w++) {
    const s = SKILLS.find(s => s.customGrade===grade && s.customWeek===w);
    html += `<div class="single-row"><div class="single-wk-label">Wk ${w}</div><div class="single-cell">`;
    html += s ? skillCellHTML(s,f,grade,w) :
      `<div class="empty-cell" ondragover="dragOver(event)" ondrop="drop(event,null,'${grade}',${w})" ondragleave="dragLeave(event)"></div>`;
    html += `</div></div>`;
  }
  html += '</div>';
  wrap.innerHTML = html;
}

function resLabel(label) {
  const abbrevs = {'Honeycomb Path':'HC','Cross-Number':'CN','Number Maze':'Maze','100 Triangles':'△100','Mismo':'Mismo','Mega Mismo':'Mega','Two-Out':'2-Out','X-Out':'X-Out','Factor Blob':'Blob','Cryptarithms':'Crypt'};
  return abbrevs[label] || label.slice(0,5);
}
function intAbbrev(id) {
  if (resData.interventionReg && resData.interventionReg[id] && resData.interventionReg[id].abbrev)
    return resData.interventionReg[id].abbrev;
  return id.slice(0,3).toUpperCase();
}

function skillCellHTML(s, f, grade, week) {
  const vis = skillVisible(s, f);
  const statusCls = s.status==='done'?'done':s.status==='inprog'?'inprog':'';
  const hidCls = vis ? '' : ' hidden';
  const noteInd = s.notes ? `<span title="${s.notes.replace(/"/g,'&quot;')}" style="font-size:9px;color:var(--muted)">📝</span>` : '';
  const res = getResources(grade, week);
  const resBadges = [
    ...res.puzzles.map(p => `<span class="badge badge-puz" title="${p.label}">${resLabel(p.label)}</span>`),
    ...res.interventions.map(v => `<span class="badge badge-int" title="${v.label}">${intAbbrev(v.id)}</span>`),
    ...res.games.map(g => `<span class="badge badge-game" title="${g.label}">${resLabel(g.label)}</span>`),
  ].join('');

  return `<div class="skill-cell ${statusCls}${hidCls}" id="cell-${s.id}"
    draggable="true"
    ondragstart="dragStart(event,'${s.id}')" ondragover="dragOver(event)"
    ondrop="drop(event,'${s.id}','${grade}',${week})" ondragend="dragEnd(event)"
    ondragleave="dragLeave(event)" ondblclick="openModal('${s.id}')"
    title="Double-click to edit · Drag to reorder">
    <div class="drag-handle">⠿</div>
    <div class="skill-row">
      <div class="status-btn" onclick="event.stopPropagation();cycleStatus('${s.id}')"></div>
      <div class="skill-name-text">${s.name}</div>
    </div>
    <div class="skill-meta">
      <span class="badge badge-wk">Wk ${s.week}</span>
      <span class="badge badge-wb">WB</span>
      ${resBadges}${noteInd}
      <button class="mark-done-btn" onclick="event.stopPropagation();markDone('${s.id}')">✓ Done</button>
    </div>
  </div>`;
}

// ─── STATUS ───────────────────────────────────────────────────────────────────
function cycleStatus(id) {
  const s = SKILLS.find(x => x.id===id); if (!s) return;
  const cycle = {notstarted:'inprog',inprog:'done',done:'notstarted'};
  s.status = cycle[s.status] || 'notstarted';
  saveTrackerState(); renderGrid(); renderStats();
}
function markDone(id) {
  const s = SKILLS.find(x => x.id===id); if (!s||s.status==='done') return;
  s.status = 'done'; saveTrackerState(); renderGrid(); renderStats();
}

// ─── DRAG & DROP ──────────────────────────────────────────────────────────────
function dragStart(e,id) {
  dragSrcId=id; e.dataTransfer.effectAllowed='move';
  setTimeout(()=>{const el=document.getElementById('cell-'+id);if(el)el.classList.add('dragging');},0);
}
function dragEnd(e) {
  document.querySelectorAll('.dragging').forEach(el=>el.classList.remove('dragging'));
  document.querySelectorAll('.drag-over').forEach(el=>el.classList.remove('drag-over'));
}
function dragOver(e) { e.preventDefault(); e.dataTransfer.dropEffect='move'; e.currentTarget.classList.add('drag-over'); }
function dragLeave(e) { e.currentTarget.classList.remove('drag-over'); }
function drop(e, targetId, targetGrade, targetWeek) {
  e.preventDefault(); e.currentTarget.classList.remove('drag-over');
  if (!dragSrcId) return;
  const src = SKILLS.find(s=>s.id===dragSrcId); if (!src) return;
  if (targetId && targetId!==dragSrcId) {
    const tgt = SKILLS.find(s=>s.id===targetId);
    const [tw,tg] = [src.customWeek,src.customGrade];
    src.customWeek=tgt.customWeek; src.customGrade=tgt.customGrade;
    tgt.customWeek=tw; tgt.customGrade=tg;
  } else if (!targetId) {
    src.customWeek=parseInt(targetWeek); src.customGrade=targetGrade;
  }
  dragSrcId=null; saveTrackerState(); renderGrid();
}

// ─── MODAL ────────────────────────────────────────────────────────────────────
function openModal(id) {
  const s = SKILLS.find(x=>x.id===id); if (!s) return;
  modalSkillId = id;
  const c = GRADE_COLORS[s.customGrade||s.grade];
  document.getElementById('modal-title').textContent = s.name;
  document.getElementById('modal-sub').textContent =
    `Grade ${s.grade} · Week ${s.week}` +
    (s.customWeek!==s.week||s.customGrade!==s.grade ? ` (moved to Grade ${s.customGrade} Wk ${s.customWeek})` : '');
  const badge = document.getElementById('modal-grade-badge');
  badge.textContent = `Grade ${s.grade}`;
  badge.style.cssText = `background:${c.bg};color:${c.hdr};border:1.5px solid ${c.border};`;

  // Resource display — read from shared data, no editing here
  const res = getResources(s.customGrade, s.customWeek);
  const chips = [
    ...res.puzzles.map(p => `<span class="res-chip res-chip-puz">🧩 ${p.label}${p.notes?` — ${p.notes}`:''}</span>`),
    ...res.interventions.map(v => `<span class="res-chip res-chip-int">🎯 ${v.label}</span>`),
    ...res.games.map(g => `<span class="res-chip res-chip-game">🎮 ${g.label}</span>`),
  ];
  document.getElementById('modal-res-display').innerHTML = chips.length
    ? `<div class="res-chip-row">${chips.join('')}</div>`
    : `<div class="res-empty">No resources linked yet. Use the Resource Manager to add puzzles, interventions, or games.</div>`;

  document.getElementById('modal-notes').value = s.notes || '';
  setModalStatus(s.status);
  document.getElementById('modal-overlay').classList.remove('hidden');
}
function setModalStatus(status) {
  ['notstarted','inprog','done'].forEach(st => {
    const el = document.getElementById('opt-'+st);
    if (el) { el.className='status-opt'; if(st===status) el.className='status-opt sel-'+st; }
  });
  window._modalStatus = status;
}
function closeModal(e) {
  if (e && e.target!==document.getElementById('modal-overlay')) return;
  document.getElementById('modal-overlay').classList.add('hidden');
  modalSkillId = null;
}
function saveModal() {
  if (!modalSkillId) return;
  const s = SKILLS.find(x=>x.id===modalSkillId);
  s.status = window._modalStatus || s.status;
  s.notes = document.getElementById('modal-notes').value;
  document.getElementById('modal-overlay').classList.add('hidden');
  saveTrackerState(); renderGrid(); renderStats();
  modalSkillId = null;
}

// ─── RESET ────────────────────────────────────────────────────────────────────
function confirmReset() {
  if (!confirm('Reset ALL progress, notes, and reordering?\n\nResource linkages are managed separately and will not be affected.')) return;
  SKILLS.forEach(s => { s.status='notstarted'; s.notes=''; s.customWeek=s.week; s.customGrade=s.grade; });
  trackerState={}; saveTrackerState(); renderGrid(); renderStats();
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
(async function init() {
  await loadState();
  renderStats();
  renderGrid();
})();
</script>
</body>
</html>
